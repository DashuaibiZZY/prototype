<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX 活动中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111827; font-size: 11px; line-height: 1.6; }
        .main-content { max-width: 1360px; margin: 0 auto; padding: 24px; }
        .main-content.page-full { max-width: none; width: 100%; padding: 28px 48px 48px; }
        .home-page, .activity-detail-page, .my-activity-page { display: none; }
        .home-page.active, .activity-detail-page.active, .my-activity-page.active { display: block; }

        .hero-section { background: #fff; border: 1px solid #f3f4f6; border-radius: 8px; padding: 28px; margin-bottom: 20px; display: flex; gap: 28px; }
        .hero-left { flex: 1; }
        .hero-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
        .hero-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
        .hero-stats { display: flex; gap: 12px; margin-bottom: 16px; }
        .hero-stats .stat-item { flex: 1; padding: 14px; border: 1px solid #f3f4f6; border-radius: 6px; text-align: center; }
        .hero-stats .stat-value { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
        .hero-stats .stat-label { font-size: 10px; color: #9ca3af; }
        .my-activities-link { color: #111827; font-weight: 700; font-size: 12px; cursor: pointer; }
        .my-activities-link::after { content: ' ›'; }
        .hero-right { flex: 1; }
        .carousel-container { position: relative; height: 280px; overflow: hidden; }
        .carousel-track { display: flex; transition: transform .35s ease; }
        .carousel-card { min-width: 100%; height: 280px; background: linear-gradient(145deg,#f8fafc,#f1f5f9); border: 1px solid #f3f4f6; border-radius: 8px; padding: 24px; position: relative; }
        .carousel-tag { display: inline-block; background: #f3f4f6; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-bottom: 10px; }
        .carousel-title { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
        .carousel-desc { font-size: 11px; color: #6b7280; margin-bottom: 14px; }
        .carousel-btn { background: #111827; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .carousel-illustration { position: absolute; bottom: 20px; right: 20px; }
        .carousel-icon-wrapper { width: 64px; height: 64px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #f3f4f6; }
        .carousel-icon-inner { width: 36px; height: 36px; border-radius: 6px; }
        .carousel-icon-trophy { background: linear-gradient(135deg,#f59e0b,#fbbf24); }
        .carousel-icon-target { background: linear-gradient(135deg,#059669,#10b981); }
        .carousel-icon-chart { background: linear-gradient(135deg,#2563eb,#60a5fa); }
        .carousel-arrow { position: absolute; right: -14px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; background: #fff; border: 1px solid #e5e7eb; border-radius: 50%; cursor: pointer; z-index: 2; }
        .carousel-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; cursor: pointer; }
        .dot.active { background: #111827; width: 16px; border-radius: 3px; }

        .all-campaigns-title { font-size: 16px; font-weight: 900; margin-bottom: 14px; }
        .filter-row { margin-bottom: 16px; }
        .status-filter { display: inline-flex; gap: 4px; background: #f9fafb; padding: 3px; border-radius: 6px; border: 1px solid #f3f4f6; }
        .status-item { padding: 6px 14px; font-size: 11px; font-weight: 700; color: #9ca3af; cursor: pointer; border-radius: 4px; }
        .status-item.active { background: #fff; color: #111827; box-shadow: 0 1px 2px rgba(0,0,0,.06); }

        .activity-cards-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
        @media (max-width:1024px) { .activity-cards-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width:768px) { .activity-cards-grid { grid-template-columns: 1fr; } }
        .activity-card { background: #fff; border: 1px solid #f3f4f6; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s; }
        .activity-card:hover { border-color: #d1d5db; box-shadow: 0 4px 12px rgba(0,0,0,.06); }
        .activity-card-poster { height: 148px; background-size: cover; background-position: center; }
        .poster-carnival { background-image: linear-gradient(135deg,#111827,#1f2937 40%,#f59e0b); }
        .poster-contest { background-image: linear-gradient(135deg,#1e3a8a,#2563eb 60%,#60a5fa); }
        .poster-newbie { background-image: linear-gradient(135deg,#065f46,#10b981); }
        .poster-social { background-image: linear-gradient(135deg,#5b21b6,#8b5cf6); }
        .poster-challenge { background-image: linear-gradient(135deg,#c2410c,#fb923c); }
        .poster-default { background-image: linear-gradient(135deg,#374151,#6b7280); }
        .activity-reward-mode { margin-top: 8px; }
        .activity-card-body { padding: 14px 16px 16px; }
        .activity-header { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .activity-status { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 4px; }
        .activity-status.ongoing { background: #ecfdf5; color: #059669; }
        .activity-status.ended { background: #f3f4f6; color: #9ca3af; }
        .activity-title { font-size: 14px; font-weight: 900; margin-bottom: 6px; }
        .activity-desc { font-size: 11px; color: #6b7280; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .activity-stats { display: flex; gap: 16px; margin-bottom: 10px; }
        .activity-stats .stat-label { font-size: 10px; color: #9ca3af; display: block; }
        .activity-stats .stat-value { font-size: 13px; font-weight: 900; }
        .activity-meta { margin-bottom: 12px; }
        .activity-countdown { font-size: 11px; font-weight: 700; color: #111827; }
        .activity-countdown .lbl { color: #9ca3af; font-weight: 600; }
        .activity-view-btn { width: 100%; padding: 9px; background: #111827; color: #fff; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .page-head-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .page-head-title { font-size: 20px; font-weight: 900; }
        .page-head-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
        .my-reward-btn { padding: 10px 22px; background: #111827; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.15); display: inline-flex; align-items: center; gap: 6px; }
        .my-reward-btn::before { content: '🎁'; font-size: 14px; }
        .my-reward-btn:hover { opacity: .92; }

        .detail-hero-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px 28px; margin-bottom: 20px; }
        .detail-hero-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
        .detail-hero-desc { font-size: 12px; color: #6b7280; line-height: 1.6; margin-bottom: 0; }
        .detail-stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; padding: 16px 0; border-top: 1px solid #f3f4f6; }
        .detail-action-block { padding-top: 16px; border-top: 1px solid #f3f4f6; }
        .btn-register-block { padding: 10px 24px; background: #111827; color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .joined-info-block { padding-top: 0; }
        .detail-stat-box .val { font-size: 16px; font-weight: 900; }
        .detail-stat-box .val.highlight { color: #2563eb; }
        .detail-stat-box .lbl { font-size: 10px; color: #9ca3af; margin-top: 4px; }
        .detail-progress-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .detail-progress-item .val { font-size: 15px; font-weight: 900; }
        .detail-progress-item .val.highlight { color: #2563eb; }
        .detail-progress-item .lbl { font-size: 10px; color: #9ca3af; margin-top: 2px; }
        .ended-reward-btn { padding: 8px 16px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .pool-unlock-section { margin-bottom: 16px; padding: 16px; background: linear-gradient(135deg,#f8fafc 0%,#fff 100%); border: 1px solid #e5e7eb; border-radius: 8px; }
        .pool-unlock-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .pool-unlock-title { font-size: 13px; font-weight: 900; }
        .pool-unlock-sub { font-size: 10px; color: #6b7280; margin-top: 4px; }
        .pool-unlock-current { text-align: right; }
        .pool-unlock-current .lbl { font-size: 9px; color: #9ca3af; }
        .pool-unlock-current .val { font-size: 16px; font-weight: 900; color: #2563eb; }
        .pool-unlock-current .vol { font-size: 10px; color: #6b7280; margin-top: 2px; }
        .pool-unlock-track { position: relative; height: 8px; background: #e5e7eb; border-radius: 4px; margin-bottom: 18px; overflow: hidden; }
        .pool-unlock-fill { height: 100%; background: linear-gradient(90deg,#60a5fa,#2563eb); border-radius: 4px; transition: width .4s ease; }
        .pool-unlock-milestones { position: absolute; inset: 0; display: flex; justify-content: space-between; pointer-events: none; }
        .pool-unlock-dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; border: 2px solid #d1d5db; margin-top: -1px; transform: translateY(0); }
        .pool-unlock-dot.unlocked { border-color: #2563eb; background: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.2); }
        .pool-unlock-tiers { display: flex; flex-direction: column; gap: 0; }
        .pool-unlock-tier { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6; position: relative; }
        .pool-unlock-tier:last-child { border-bottom: none; padding-bottom: 0; }
        .pool-unlock-tier::before { content: ''; position: absolute; left: 15px; top: 36px; bottom: -12px; width: 2px; background: #e5e7eb; }
        .pool-unlock-tier:last-child::before { display: none; }
        .pool-unlock-tier.unlocked::before { background: #bfdbfe; }
        .pool-unlock-icon { width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; z-index: 1; border: 2px solid #e5e7eb; }
        .pool-unlock-tier.unlocked .pool-unlock-icon { background: #eff6ff; border-color: #2563eb; }
        .pool-unlock-tier.active .pool-unlock-icon { background: #2563eb; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,.15); }
        .pool-unlock-tier.active .pool-unlock-icon span { filter: brightness(10); }
        .pool-unlock-body { flex: 1; }
        .pool-unlock-tier-title { font-size: 11px; font-weight: 700; color: #374151; }
        .pool-unlock-tier.unlocked .pool-unlock-tier-title { color: #111827; }
        .pool-unlock-tier-pool { font-size: 12px; font-weight: 900; color: #9ca3af; margin-top: 2px; }
        .pool-unlock-tier.unlocked .pool-unlock-tier-pool { color: #2563eb; }
        .pool-unlock-tier-tag { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
        .pool-unlock-tier-tag.locked { background: #f3f4f6; color: #9ca3af; }
        .pool-unlock-tier-tag.unlocked { background: #ecfdf5; color: #059669; }
        .pool-unlock-tier-tag.active { background: #eff6ff; color: #2563eb; }

        .detail-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
        .detail-section-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #f3f4f6; }
        .detail-section-title { font-size: 14px; font-weight: 900; }
        .detail-section-sub { font-size: 11px; color: #6b7280; margin-top: 4px; }
        .detail-pool-tag { text-align: right; }
        .detail-pool-tag .lbl { font-size: 10px; color: #9ca3af; }
        .detail-pool-tag .val { font-size: 14px; font-weight: 900; }

        .task-row { display: flex; gap: 14px; align-items: center; padding: 14px 0; border-bottom: 1px solid #f3f4f6; }
        .task-row:last-child { border-bottom: none; }
        .task-num { width: 28px; height: 28px; border-radius: 6px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #6b7280; flex-shrink: 0; }
        .task-body { flex: 1; }
        .task-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
        .task-desc { font-size: 10px; color: #6b7280; margin-bottom: 8px; }
        .task-progress-track { height: 4px; background: #f3f4f6; border-radius: 2px; overflow: hidden; }
        .task-progress-fill { height: 100%; background: #111827; }
        .task-right { text-align: right; flex-shrink: 0; min-width: 120px; }
        .task-reward-line { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .task-reward-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
        .task-reward-tag.single { background: #eff6ff; color: #2563eb; }
        .task-reward-tag.pool { background: #fef3c7; color: #d97706; }
        .task-reward-tag.both { background: #f3e8ff; color: #7c3aed; }
        .task-pts { font-size: 11px; font-weight: 900; color: #111827; }
        .task-pool-note { font-size: 10px; color: #6b7280; font-weight: 600; }
        .task-mode-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .task-mode-legend span { font-size: 9px; color: #6b7280; display: inline-flex; align-items: center; gap: 4px; }
        .task-btn-sm, .task-done-tag { padding: 5px 12px; border-radius: 4px; font-size: 10px; font-weight: 700; border: none; cursor: pointer; margin-top: 6px; }
        .task-btn-sm { background: #111827; color: #fff; }
        .task-done-tag { background: #ecfdf5; color: #059669; }

        .my-status-strip { display: grid; grid-template-columns: repeat(4,1fr) auto; gap: 12px; align-items: center; padding: 14px 16px; background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 6px; margin-bottom: 14px; }
        .my-status-strip .item .val { font-size: 13px; font-weight: 900; }
        .my-status-strip .item .lbl { font-size: 9px; color: #9ca3af; margin-top: 2px; }
        .btn-trade-sm { padding: 7px 14px; background: #111827; color: #fff; border: none; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; }

        .rank-tabs { display: flex; border-bottom: 1px solid #f3f4f6; }
        .rank-tab { padding: 10px 16px; font-size: 11px; font-weight: 700; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .rank-tab.active { color: #111827; border-bottom-color: #111827; }
        .contest-reward-mode { margin-top: 8px; }
        .contest-reward-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
        .contest-reward-tag.proportional { background: #eff6ff; color: #2563eb; }
        .contest-reward-tag.fixed-top3 { background: #fef3c7; color: #d97706; }
        .rank-podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; padding: 28px 24px 0; background: linear-gradient(180deg,#fafafa 0%,#fff 100%); border-bottom: 1px solid #f3f4f6; }
        .podium-item { display: flex; flex-direction: column; align-items: center; width: 132px; }
        .podium-user { text-align: center; margin-bottom: 10px; min-height: 72px; }
        .podium-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 16px; margin: 0 auto 6px; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        .podium-item.first .podium-avatar { width: 48px; height: 48px; border-color: #fbbf24; }
        .podium-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .podium-metric { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
        .podium-reward { font-size: 11px; font-weight: 900; color: #2563eb; }
        .podium-stand { width: 100%; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #fff; }
        .podium-item.first .podium-stand { height: 88px; background: linear-gradient(180deg,#fcd34d,#f59e0b); }
        .podium-item.second .podium-stand { height: 64px; background: linear-gradient(180deg,#e5e7eb,#9ca3af); }
        .podium-item.third .podium-stand { height: 48px; background: linear-gradient(180deg,#fdba74,#ea580c); }
        .rank-table-wrap { border: 1px solid #f3f4f6; border-radius: 6px; overflow: hidden; }
        .rank-table-head, .rank-table-row { display: grid; grid-template-columns: 72px 1fr 140px 120px; padding: 10px 16px; align-items: center; }
        .rank-table-head { background: #f9fafb; font-size: 10px; font-weight: 700; color: #9ca3af; border-bottom: 1px solid #f3f4f6; }
        .rank-table-row { font-size: 11px; border-bottom: 1px solid #f9fafb; }
        .rank-est-reward { font-weight: 900; color: #2563eb; text-align: right; }
        .rank-badge-sm { display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 4px; font-size: 10px; font-weight: 900; color: #fff; }
        .rank-pagination, .modal-pagination { display: flex; justify-content: center; gap: 6px; padding: 12px; border-top: 1px solid #f3f4f6; }
        .rank-page-btn { min-width: 28px; height: 28px; border: 1px solid #e5e7eb; background: #fff; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; color: #6b7280; }
        .rank-page-btn.active { background: #111827; color: #fff; border-color: #111827; }
        .rank-page-btn:disabled { opacity: .4; cursor: not-allowed; }

        .rules-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .rules-list li { display: flex; gap: 10px; font-size: 11px; color: #4b5563; line-height: 1.6; }
        .rules-list .num { width: 20px; height: 20px; border-radius: 4px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #6b7280; flex-shrink: 0; }

        .reward-detail-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
        .reward-detail-modal.active { display: flex; }
        .modal-detail-content { background: #fff; border-radius: 8px; width: 640px; max-width: 92vw; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
        .modal-detail-title { font-size: 16px; font-weight: 900; margin-bottom: 16px; }
        .modal-detail-btn { margin-top: 16px; width: 100%; padding: 10px; background: #111827; color: #fff; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .reward-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .reward-table th { text-align: left; padding: 10px 12px; background: #f9fafb; color: #6b7280; font-weight: 700; border-bottom: 1px solid #e5e7eb; }
        .reward-table td { padding: 12px; border-bottom: 1px solid #f3f4f6; }

        .empty-state { text-align: center; padding: 48px; color: #9ca3af; }
        .empty-icon { font-size: 32px; margin-bottom: 8px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #111827; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 11px; font-weight: 700; z-index: 300; opacity: 0; transition: all .3s; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 1. 導航欄 -->
<nav class="h-10 border-b border-gray-100 flex items-center px-4 justify-between shrink-0 sticky top-0 z-50 bg-white">
    <div class="flex items-center space-x-6">

        </div>
        <!-- 更多下拉菜單（更新內容） -->
        <div class="relative group h-full flex items-center">
            <span class="text-gray-400 hover:text-black cursor-pointer flex items-center text-[12px] font-medium transition-colors">
                更多
                <svg class="w-3 h-3 ml-1 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7" stroke-width="3"/>
                </svg>
            </span>

            currentSlide = (currentSlide + 1) % carouselData.length;
            goToSlide(currentSlide);
        });

        const STATUS_LABEL = { ongoing: '进行中', ended: '已结束' };

        function formatCardCountdown(activity) {
            if (activity.status === 'ended') return activity.date || activity.period || '已结束';
            return `<span class="activity-countdown"><span class="lbl">距离结束：</span>${activity.countdown}</span>`;
        }

        function renderActivityCard(activity) {
            const posterClass = activity.poster || 'poster-default';
            const timeHtml = formatCardCountdown(activity);
            return `
                <div class="activity-card" onclick="handleActivityCardClick('${activity.id}')">
                    <div class="activity-card-poster ${posterClass}"></div>
                    <div class="activity-card-body">
                        <div class="activity-header">
                            <span class="activity-status ${activity.status}">${STATUS_LABEL[activity.status] || activity.status}</span>
                        </div>
                        <h3 class="activity-title">${activity.title}</h3>
                        <p class="activity-desc">${activity.desc}</p>
                        <div class="activity-stats">
                            <div class="stat-item">
                                <span class="stat-label">奖池</span>
                                <span class="stat-value">${activity.rewardPool}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">参与人数</span>
                                <span class="stat-value">${activity.participants}</span>
                            </div>
                        </div>
                        <div class="activity-meta">
                            ${timeHtml}
                        </div>
                        <button class="activity-view-btn" onclick="event.stopPropagation(); handleActivityCardClick('${activity.id}')">查看活动</button>
                    </div>
                </div>
            `;
        }

        function renderDynamicContent() {
            const container = document.getElementById('dynamicContent');
            const list = activities.all[currentStatus] || [];
            if (!list.length) {
                container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p class="empty-text">暂无活动</p></div>`;
                return;
            }
            container.innerHTML = list.map(renderActivityCard).join('');
        }

        function showPage(view) {
            ['homePage', 'activityDetailPage', 'myActivityPage'].forEach(id => {
                document.getElementById(id).classList.toggle('active', (view === 'home' && id === 'homePage') || (view === 'activityDetail' && id === 'activityDetailPage') || (view === 'myActivities' && id === 'myActivityPage'));
            });
        }

        function pushHistory(view, activityId) {
            if (view === 'home') {
                history.pushState({ view: 'home' }, '', '#/');
            } else if (view === 'detail') {
                history.pushState({ view: 'detail', activityId }, '', `#/activity/${activityId}`);
            } else if (view === 'myActivities') {
                history.pushState({ view: 'myActivities' }, '', '#/my-activities');
            }
        }

        function handleActivityCardClick(activityId) {
            showActivityDetail(activityId, true);
        }

        function registerForActivity(activityId) {
            setParticipatedById(activityId);
            showToast(t('registerSuccess'));
            if (currentView === 'activityDetail' && currentActivityId === activityId) {
                renderActivityDetailPage();
            }
        }

        function showActivityDetail(activityId, useHistory) {
            currentView = 'activityDetail';
            currentActivityId = activityId;
            showPage('activityDetail');
            if (useHistory) pushHistory('detail', activityId);
            renderActivityDetailPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToMyActivity(useHistory) {
            currentView = 'myActivities';
            showPage('myActivities');
            if (useHistory) pushHistory('myActivities');
            renderMyActivityCards(myActivityFilter);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBackToHome(useHistory) {
            currentView = 'home';
            showPage('home');
            if (useHistory) pushHistory('home');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('popstate', (e) => {
            const state = e.state || { view: 'home' };
            if (state.view === 'detail' && state.activityId) {
                showActivityDetail(state.activityId, false);
            } else if (state.view === 'myActivities') {
                goToMyActivity(false);
            } else {
                goBackToHome(false);
            }
        });

        function renderProgressBlock(activity) {
            const items = [];
            if (activity.showProgress && activity.completedTasks) {
                items.push(`<div class="detail-progress-item"><div class="val">${activity.completedTasks}</div><div class="lbl">已完成任务</div></div>`);
            }
            if (activity.layout !== 'task' && activity.currentRank) {
                items.push(`<div class="detail-progress-item"><div class="val">${activity.currentRank}</div><div class="lbl">当前排名</div></div>`);
            }
            if (activity.layout !== 'task') {
                const estReward = activity.estContestReward || getEstContestRewardLabel(activity);
                items.push(`<div class="detail-progress-item"><div class="val highlight">${estReward}</div><div class="lbl">交易赛预估奖励</div></div>`);
            }
            if (!items.length) return '';
            return `<div class="detail-progress-row">${items.join('')}</div>`;
        }

        function getEstContestRewardLabel(activity) {
            const userRank = parseInt(String(activity.currentRank || '0').replace(/[^\d]/g, ''), 10) || 0;
            if (!userRank) return '—';
            const leaderboard = buildLeaderboardData(activity);
            const reward = leaderboard.find(item => item.rank === userRank)?.estReward || 0;
            return reward > 0 ? formatUsdt(reward) : '—';
        }

        function formatVolume(amount) {
            if (amount >= 1000000000) return (amount / 1000000000).toFixed(2) + 'B';
            if (amount >= 1000000) return (amount / 1000000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + 'M';
            return amount.toLocaleString('en-US');
        }

        function getPoolUnlockState(activity) {
            const tiers = activity.poolUnlockTiers || [];
            const currentVolume = activity.totalTradeVolume || 0;
            let unlockedPool = 0;
            let unlockedCount = 0;
            let nextTier = null;

            tiers.forEach(tier => {
                const unlocked = currentVolume >= tier.volume;
                if (unlocked) {
                    unlockedPool = tier.pool;
                    unlockedCount += 1;
                } else if (!nextTier) {
                    nextTier = tier;
                }
            });

            const maxVolume = tiers.length ? tiers[tiers.length - 1].volume : 1;
            const progressPct = Math.min((currentVolume / maxVolume) * 100, 100);
            return { tiers, currentVolume, unlockedPool, unlockedCount, nextTier, progressPct, maxVolume };
        }

        function renderPoolUnlockSection(activity) {
            const state = getPoolUnlockState(activity);
            if (!state.tiers.length) return '';

            const nextHint = state.nextTier
                ? `距下一档还差 ${formatVolume(state.nextTier.volume - state.currentVolume)} USDT`
                : '已解锁最高档奖池';

            return `
                <div class="pool-unlock-section">
                    <div class="pool-unlock-head">
                        <div>
                            <div class="pool-unlock-title">奖池解锁进度</div>
                            <div class="pool-unlock-sub">根据活动参与者总交易额解锁交易大赛奖池 · ${nextHint}</div>
                        </div>
                        <div class="pool-unlock-current">
                            <div class="lbl">当前已解锁奖池</div>
                            <div class="val">${formatUsdt(state.unlockedPool)}</div>
                            <div class="vol">总交易额 ${formatVolume(state.currentVolume)} USDT</div>
                        </div>
                    </div>
                    <div class="pool-unlock-track">
                        <div class="pool-unlock-fill" style="width:${state.progressPct}%"></div>
                        <div class="pool-unlock-milestones">
                            ${state.tiers.map((tier, idx) => {
                                const pct = (tier.volume / state.maxVolume) * 100;
                                const unlocked = state.currentVolume >= tier.volume;
                                return `<div class="pool-unlock-dot ${unlocked ? 'unlocked' : ''}" style="position:absolute;left:calc(${pct}% - 5px)"></div>`;
                            }).join('')}
                        </div>
                    </div>
                    <div class="pool-unlock-tiers">
                        ${state.tiers.map((tier, idx) => {
                            const unlocked = state.currentVolume >= tier.volume;
                            const isActive = unlocked && (idx === state.unlockedCount - 1);
                            const isNext = state.nextTier && state.nextTier.volume === tier.volume;
                            const tagCls = isActive ? 'active' : (unlocked ? 'unlocked' : 'locked');
                            const tagText = isActive ? '当前档位' : (unlocked ? '已解锁' : (isNext ? '即将解锁' : '未解锁'));
                            const icon = unlocked ? (isActive ? '🔓' : '✓') : '🔒';
                            return `
                                <div class="pool-unlock-tier ${unlocked ? 'unlocked' : ''} ${isActive ? 'active' : ''}">
                                    <div class="pool-unlock-icon"><span>${icon}</span></div>
                                    <div class="pool-unlock-body">
                                        <div class="pool-unlock-tier-title">交易额达到 ${tier.volume.toLocaleString('en-US')} USDT</div>
                                        <div class="pool-unlock-tier-pool">交易大赛奖池 ${formatUsdt(tier.pool)}</div>
                                    </div>
                                    <span class="pool-unlock-tier-tag ${tagCls}">${tagText}</span>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        const TASK_REWARD_LABELS = {
            single: '单任务奖励',
            pool: '瓜分奖池',
            both: '单任务奖励 + 瓜分奖池'
        };

        const TASK_REWARD_SUBS = {
            single: '本活动采用单任务奖励模式：完成各任务即可获得对应奖励',
            pool: '本活动采用瓜分奖池模式：完成任务参与奖池瓜分，任务本身无单独奖励',
            both: '本活动采用单任务奖励 + 瓜分奖池模式：各任务有固定奖励，同时可参与奖池瓜分'
        };

        const TASK_TEMPLATES = {
            'new-register': { name: '新注册用户', desc: '活动期间新注册 ForX 账户', action: '去注册' },
            'deposit-100': { name: '充值 ≥ 100 USDT', desc: '累计充值达到 100 USDT 及以上', action: '去充值' },
            'trade-100': { name: '交易额 ≥ 100 USDT', desc: '累计合约交易额达到 100 USDT 及以上', action: '去交易' },
            'deposit-and-trade': { name: '充值 100 USDT，并交易额 ≥ 100 USDT', desc: '同时完成充值与交易额门槛', action: '去完成' },
            'x-verify': { name: 'X 认证', desc: '完成 X 账号认证并绑定活动账户', action: '去认证' },
            'x-follow': { name: 'X 关注', desc: '关注 ForX 官方 X 账号', action: '去关注' },
            'tg-verify': { name: 'Telegram 认证', desc: '完成 Telegram 账号认证', action: '去认证' },
            'tg-join': { name: '加入 Telegram 社群', desc: '加入 ForX 官方 Telegram 社群', action: '去加入' }
        };

        function resolveActivityTasks(activity) {
            return (activity.tasks || []).map(task => {
                const tpl = TASK_TEMPLATES[task.template] || {};
                return { ...tpl, ...task };
            });
        }

        function renderTaskRewardHtml(activity, task) {
            const mode = activity.rewardMode || 'single';
            if (mode === 'single') {
                return `<div class="task-reward-line"><span class="task-pts">${task.reward || '—'}</span></div>`;
            }
            if (mode === 'pool') {
                return `<div class="task-reward-line"><span class="task-pool-note">完成任务参与瓜分</span></div>`;
            }
            return `<div class="task-reward-line"><span class="task-pts">${task.reward || '—'}</span><span class="task-pool-note">另可参与奖池瓜分</span></div>`;
        }

        function renderTaskRow(activity, task, index) {
            const actionBtn = task.done
                ? '<span class="task-done-tag">已完成</span>'
                : `<button class="task-btn-sm" onclick="showToast('原型演示：${task.action}')">${task.action || '去完成'}</button>`;
            return `
                <div class="task-row">
                    <div class="task-num">${String(index + 1).padStart(2, '0')}</div>
                    <div class="task-body">
                        <div class="task-name">${task.name}</div>
                        <div class="task-desc">${task.desc}</div>
                        <div class="task-progress-track"><div class="task-progress-fill" style="width:${task.progress || 0}%"></div></div>
                    </div>
                    <div class="task-right">
                        ${renderTaskRewardHtml(activity, task)}
                        ${actionBtn}
                    </div>
                </div>`;
        }

        function renderHeroCard(activity) {
            const joined = hasParticipatedById(activity.id);
            const ended = activity.status === 'ended';

            let actionBlock = '';
            if (ended && activityRewards[activity.id]) {
                actionBlock = `<div class="detail-action-block"><button class="ended-reward-btn" onclick="openActivityRewardModal('${activity.id}')">查看奖励</button></div>`;
            } else if (!ended && !joined) {
                actionBlock = `<div class="detail-action-block"><button class="btn-register-block" onclick="registerForActivity('${activity.id}')">报名活动</button></div>`;
            } else if (joined) {
                actionBlock = `
                    <div class="detail-action-block joined-info-block">
                        ${renderProgressBlock(activity)}
                    </div>`;
            }

            return `
                <div class="detail-hero-card">
                    <h1 class="detail-hero-title">${activity.title}</h1>
                    <p class="detail-hero-desc">${activity.desc}</p>
                    <div class="detail-stats-row">
                        <div class="detail-stat-box"><div class="val highlight">${activity.rewardPool}</div><div class="lbl">总奖池</div></div>
                        <div class="detail-stat-box"><div class="val">${activity.participants}</div><div class="lbl">参与人数</div></div>
                        <div class="detail-stat-box"><div class="val">${activity.period}</div><div class="lbl">活动时间</div></div>
                        <div class="detail-stat-box"><div class="val">${ended ? '已结束' : activity.countdown}</div><div class="lbl">${ended ? '活动状态' : '剩余时间'}</div></div>
                    </div>
                    ${actionBlock}
                </div>`;
        }

        function renderTaskSection(activity) {
            if (activity.layout === 'contest') return '';
            const pool = activity.taskPool || activity.rewardPool;
            const mode = activity.rewardMode || 'single';
            const tasks = resolveActivityTasks(activity);
            const sectionTitle = activity.layout === 'combo' ? '限时任务奖励' : '任务奖励';

            return `
                <div class="detail-section">
                    <div class="detail-section-head">
                        <div>
                            <div class="detail-section-title">${sectionTitle}</div>
                            <div class="detail-section-sub">${TASK_REWARD_SUBS[mode]}</div>
                            <div class="activity-reward-mode"><span class="task-reward-tag ${mode}">${TASK_REWARD_LABELS[mode]}</span></div>
                        </div>
                        <div class="detail-pool-tag"><div class="lbl">奖池</div><div class="val">${pool}</div></div>
                    </div>
                    ${tasks.map((task, i) => renderTaskRow(activity, task, i)).join('')}
                </div>`;
        }

        function renderRankingSection(activity) {
            if (activity.layout === 'task') return '';
            const unlockState = getPoolUnlockState(activity);
            const pool = unlockState.unlockedPool > 0
                ? formatUsdt(unlockState.unlockedPool)
                : (activity.contestPool || activity.rewardPool);
            const mode = activity.contestRewardMode || 'proportional';
            const metricLabel = carnivalCurrentLeaderboardType === 'volume' ? '交易额' : '盈利率';
            const userRank = parseInt((activity.currentRank || '#0').replace('#', '').replace(',', ''), 10) || 0;
            const leaderboard = buildLeaderboardData(activity);
            const userReward = userRank > 0 ? (leaderboard.find(item => item.rank === userRank)?.estReward || 0) : 0;

            return `
                <div class="detail-section">
                    <div class="detail-section-head">
                        <div>
                            <div class="detail-section-title">交易大赛排行榜</div>
                            <div class="detail-section-sub">${CONTEST_REWARD_SUBS[mode]}</div>
                            ${mode === 'fixed-top3' ? `<div class="detail-section-sub" style="margin-top:4px">前三名固定奖励：${(activity.fixedTop3Rewards || []).map(formatUsdt).join(' / ')}</div>` : ''}
                            <div class="contest-reward-mode"><span class="contest-reward-tag ${mode}">${CONTEST_REWARD_LABELS[mode]}</span></div>
                        </div>
                        <div class="detail-pool-tag"><div class="lbl">已解锁奖池</div><div class="val">${pool}</div></div>
                    </div>
                    ${renderPoolUnlockSection(activity)}
                    ${hasParticipatedById(activity.id) ? `<div class="my-status-strip">
                        <div class="item"><div class="val">${activity.currentRank || '#1,240'}</div><div class="lbl">当前排名</div></div>
                        <div class="item"><div class="val">12,450 USDT</div><div class="lbl">我的交易量</div></div>
                        <div class="item"><div class="val">8.5%</div><div class="lbl">我的盈利率</div></div>
                        <div class="item"><div class="val">${activity.estContestReward || formatUsdt(userReward)}</div><div class="lbl">预估奖励</div></div>
                        <button class="btn-trade-sm" onclick="showToast(t('toastGoTrade'))">去交易</button>
                    </div>` : ''}
                    <div class="rank-tabs">
                        <div class="rank-tab ${carnivalCurrentLeaderboardType === 'volume' ? 'active' : ''}" onclick="switchCarnivalLeaderboard('volume')">交易额排名</div>
                        <div class="rank-tab ${carnivalCurrentLeaderboardType === 'profit' ? 'active' : ''}" onclick="switchCarnivalLeaderboard('profit')">盈利率排名</div>
                    </div>
                    <div class="rank-table-wrap">
                        <div id="carnivalPodium"></div>
                        <div class="rank-table-head">
                            <div>排名</div>
                            <div>用户</div>
                            <div>${metricLabel}</div>
                            <div style="text-align:right">预估奖励</div>
                        </div>
                        <div id="carnivalLeaderboardBody"></div>
                        <div class="rank-pagination" id="carnivalPagination"></div>
                    </div>
                </div>`;
        }

        function renderRulesSection() {
            return `
                <div class="detail-section">
                    <div class="detail-section-head" style="margin-bottom:12px;padding-bottom:0;border:none">
                        <div class="detail-section-title">活动规则说明</div>
                    </div>
                    <ul class="rules-list">
                        ${ACTIVITY_RULES.map((rule, i) => `<li><span class="num">${i + 1}</span><span>${rule}</span></li>`).join('')}
                    </ul>
                </div>`;
        }

        function renderActivityDetailPage() {
            const activity = activityCatalog[currentActivityId];
            if (!activity) {
                document.getElementById('activityDetailContent').innerHTML = '<div class="empty-state"><p class="empty-text">活动不存在</p></div>';
                return;
            }
            document.getElementById('activityDetailContent').innerHTML =
                renderHeroCard(activity) +
                renderTaskSection(activity) +
                renderRankingSection(activity) +
                renderRulesSection();
            if (activity.layout !== 'task') renderCarnivalLeaderboard();
        }

        function switchCarnivalLeaderboard(type) {
            carnivalCurrentLeaderboardType = type;
            carnivalCurrentPage = 1;
            renderActivityDetailPage();
        }

        const CONTEST_REWARD_LABELS = {
            proportional: '按交易额/盈利率占比瓜分',
            'fixed-top3': '前三固定 + 占比瓜分'
        };

        const CONTEST_REWARD_SUBS = {
            proportional: 'Top100 用户按交易额或盈利率占比瓜分奖池',
            'fixed-top3': '前三名获得固定奖励，第四名起按交易额或盈利率占比瓜分剩余奖池'
        };

        const PODIUM_MEDALS = { 1: '🥇', 2: '🥈', 3: '🥉' };
        const PODIUM_ORDER = [2, 1, 3];

        function parsePoolAmount(poolStr) {
            return parseFloat(String(poolStr).replace(/[^\d.]/g, '')) || 0;
        }

        function formatUsdt(amount) {
            return amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USDT';
        }

        function buildLeaderboardData(activity) {
            const items = [];
            for (let i = 0; i < 100; i++) {
                const rawValue = carnivalCurrentLeaderboardType === 'volume'
                    ? 2500000 - i * 24000
                    : 128.5 - i * 1.25;
                items.push({
                    rank: i + 1,
                    nickname: nicknames[i % nicknames.length] + (i > 19 ? Math.floor(i / 20) : ''),
                    rawValue,
                    value: carnivalCurrentLeaderboardType === 'volume'
                        ? rawValue.toLocaleString() + ' USDT'
                        : rawValue.toFixed(1) + '%'
                });
            }
            return applyContestRewards(items, activity);
        }

        function applyContestRewards(items, activity) {
            const unlockState = getPoolUnlockState(activity);
            const pool = unlockState.unlockedPool > 0
                ? unlockState.unlockedPool
                : parsePoolAmount(activity.contestPool || activity.rewardPool);
            const mode = activity.contestRewardMode || 'proportional';
            const fixedTop3 = activity.fixedTop3Rewards || [20000, 12000, 8000];

            if (mode === 'proportional') {
                const total = items.reduce((sum, item) => sum + item.rawValue, 0);
                items.forEach(item => {
                    item.estReward = total > 0 ? pool * (item.rawValue / total) : 0;
                });
                return items;
            }

            const fixedTotal = fixedTop3.reduce((sum, val) => sum + val, 0);
            const remainPool = Math.max(pool - fixedTotal, 0);
            const restItems = items.slice(3);
            const restTotal = restItems.reduce((sum, item) => sum + item.rawValue, 0);

            items.forEach((item, idx) => {
                if (idx < 3) {
                    item.estReward = fixedTop3[idx] || 0;
                } else {
                    item.estReward = restTotal > 0 ? remainPool * (item.rawValue / restTotal) : 0;
                }
            });
            return items;
        }

        function renderPodium(top3, metricLabel) {
            const byRank = Object.fromEntries(top3.map(item => [item.rank, item]));
            return `<div class="rank-podium">${PODIUM_ORDER.map(rank => {
                const item = byRank[rank];
                const cls = rank === 1 ? 'first' : rank === 2 ? 'second' : 'third';
                return `
                    <div class="podium-item ${cls}">
                        <div class="podium-user">
                            <div class="podium-avatar">${PODIUM_MEDALS[rank]}</div>
                            <div class="podium-name">${item.nickname}</div>
                            <div class="podium-metric">${metricLabel} ${item.value}</div>
                            <div class="podium-reward">${formatUsdt(item.estReward)}</div>
                        </div>
                        <div class="podium-stand">${rank}</div>
                    </div>`;
            }).join('')}</div>`;
        }

        function renderCarnivalLeaderboard() {
            const activity = activityCatalog[currentActivityId];
            const podium = document.getElementById('carnivalPodium');
            const tbody = document.getElementById('carnivalLeaderboardBody');
            const pagination = document.getElementById('carnivalPagination');
            if (!tbody || !activity) return;

            const data = buildLeaderboardData(activity);
            const metricLabel = carnivalCurrentLeaderboardType === 'volume' ? '交易额' : '盈利率';

            if (podium) {
                podium.innerHTML = renderPodium(data.slice(0, 3), metricLabel);
            }

            const tableData = data.slice(3);
            const totalPages = Math.ceil(tableData.length / 10) || 1;
            if (carnivalCurrentPage > totalPages) carnivalCurrentPage = totalPages;

            const pageData = tableData.slice((carnivalCurrentPage - 1) * 10, carnivalCurrentPage * 10);
            tbody.innerHTML = pageData.map(item => `
                <div class="rank-table-row">
                    <div>${item.rank}</div>
                    <div>${item.nickname}</div>
                    <div>${item.value}</div>
                    <div class="rank-est-reward">${formatUsdt(item.estReward)}</div>
                </div>`).join('');

            let html = `<button class="rank-page-btn" onclick="changeCarnivalPage(${carnivalCurrentPage - 1})" ${carnivalCurrentPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="rank-page-btn ${i === carnivalCurrentPage ? 'active' : ''}" onclick="changeCarnivalPage(${i})">${i}</button>`;
            }
            html += `<button class="rank-page-btn" onclick="changeCarnivalPage(${carnivalCurrentPage + 1})" ${carnivalCurrentPage === totalPages ? 'disabled' : ''}>›</button>`;
            pagination.innerHTML = html;
        }

        function changeCarnivalPage(page) {
            const activity = activityCatalog[currentActivityId];
            if (!activity) return;
            const totalPages = Math.ceil(97 / 10) || 1;
            if (page < 1 || page > totalPages) return;
            carnivalCurrentPage = page;
            renderCarnivalLeaderboard();
        }

        function openActivityRewardModal(activityId) {
            const reward = activityRewards[activityId];
            if (!reward) return;
            const modal = document.getElementById('rewardDetailModal');
            document.getElementById('detailModalTitle').textContent = '活动奖励';
            document.getElementById('detailModalContent').innerHTML = `
                <table class="reward-table">
                    <thead><tr><th>奖励名称</th><th>活动类型</th><th>奖励类型</th><th>发放金额</th></tr></thead>
                    <tbody><tr>
                        <td>${reward.name}</td><td>${reward.activityType}</td><td>${reward.rewardType}</td><td>${reward.amount}</td>
                    </tr></tbody>
                </table>`;
            modal.classList.add('active');
        }

        function renderMyActivityCards(filter = 'ongoing') {
            const container = document.getElementById('myActivityCards');
            const filtered = myJoinedActivities.filter(a => a.status === filter);
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p class="empty-text">该分类下暂无活动</p></div>`;
                return;
            }
            container.innerHTML = filtered.map(renderActivityCard).join('');
        }

        function renderRewardModalPagination() {
            const totalPages = Math.ceil(myRewards.length / REWARD_PAGE_SIZE) || 1;
            let html = `<button class="rank-page-btn" onclick="changeRewardModalPage(${rewardModalPage - 1})" ${rewardModalPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="rank-page-btn ${i === rewardModalPage ? 'active' : ''}" onclick="changeRewardModalPage(${i})">${i}</button>`;
            }
            html += `<button class="rank-page-btn" onclick="changeRewardModalPage(${rewardModalPage + 1})" ${rewardModalPage === totalPages ? 'disabled' : ''}>›</button>`;
            return `<div class="modal-pagination">${html}</div>`;
        }

        function changeRewardModalPage(page) {
            const totalPages = Math.ceil(myRewards.length / REWARD_PAGE_SIZE) || 1;
            if (page < 1 || page > totalPages) return;
            rewardModalPage = page;
            renderMyRewardsModalContent();
        }

        function renderMyRewardsModalContent() {
            const start = (rewardModalPage - 1) * REWARD_PAGE_SIZE;
            const pageData = myRewards.slice(start, start + REWARD_PAGE_SIZE);
            document.getElementById('detailModalContent').innerHTML = `
                <table class="reward-table">
                    <thead><tr><th>奖励名称</th><th>活动类型</th><th>奖励类型</th><th>发放金额</th></tr></thead>
                    <tbody>${pageData.map(r => `<tr><td>${r.name}</td><td>${r.campaign}</td><td>${r.type}</td><td>${r.amount}</td></tr>`).join('')}</tbody>
                </table>
                ${renderRewardModalPagination()}`;
        }

        function openMyRewardsModal() {
            rewardModalPage = 1;
            document.getElementById('detailModalTitle').textContent = '我的奖励';
            renderMyRewardsModalContent();
            document.getElementById('rewardDetailModal').classList.add('active');
        }

        document.getElementById('myActivitiesLink').addEventListener('click', () => goToMyActivity(true));
        document.getElementById('myRewardBtn').addEventListener('click', openMyRewardsModal);
        document.getElementById('closeDetailModal').addEventListener('click', () => {
            document.getElementById('rewardDetailModal').classList.remove('active');
        });
        document.querySelectorAll('#myActivityStatusFilter .status-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#myActivityStatusFilter .status-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                myActivityFilter = item.dataset.status;
                renderMyActivityCards(myActivityFilter);
            });
        });
        document.querySelectorAll('#statusFilter .status-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#statusFilter .status-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentStatus = item.dataset.status;
                renderDynamicContent();
            });
        });

        history.replaceState({ view: 'home' }, '', '#/');
        renderCarousel();
        renderDynamicContent();
    </script>
