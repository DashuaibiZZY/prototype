<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX 活动中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
            font-size: 11px;
            line-height: 1.6;
        }

        :root {
            --primary-purple: #111827;
            --primary-gradient: linear-gradient(90deg, #111827, #374151);
            --bg-page: #ffffff;
            --bg-card: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-weak: #9ca3af;
            --border-color: #f3f4f6;
            --card-radius: 8px;
            --btn-radius: 4px;
        }

        .nav-header {
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1360px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-purple);
            cursor: pointer;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-item {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 0;
            position: relative;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: var(--primary-purple);
        }

        .nav-item.active {
            color: var(--primary-purple);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-purple);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-selector {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .lang-selector:hover {
            background: #F0F0F2;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8E8EA, #D0D0D2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .user-address {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .main-content {
            max-width: 1360px;
            margin: 0 auto;
            padding: 24px;
        }

        .main-content.page-full {
            max-width: none;
            width: 100%;
            padding: 28px 48px 48px;
        }

        .hero-section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            gap: 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(182, 52, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-left {
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .hero-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .hero-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            flex: 1;
            padding: 20px 16px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.25s ease;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            border-color: rgba(182, 52, 246, 0.3);
            box-shadow: 0 4px 16px rgba(182, 52, 246, 0.1);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-weak);
        }

        .my-activities-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--primary-purple);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .my-activities-link:hover {
            opacity: 0.8;
        }

        .my-activities-link::after {
            content: '›';
            font-size: 18px;
        }

        .hero-right {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .carousel-container {
            position: relative;
            height: 340px;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.35s ease;
        }

        .carousel-card {
            min-width: 100%;
            height: 340px;
            background: linear-gradient(145deg, #F8F0FF 0%, #FFF5F8 50%, #F0F5FF 100%);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .carousel-card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(182, 52, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        .carousel-card::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(228, 44, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .carousel-pattern {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            opacity: 0.15;
        }

        .carousel-pattern-dots {
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, var(--primary-purple) 1.5px, transparent 1.5px);
            background-size: 8px 8px;
        }

        .carousel-content {
            position: relative;
            z-index: 1;
        }

        .carousel-tag {
            display: inline-block;
            background: rgba(182, 52, 246, 0.12);
            color: var(--primary-purple);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .carousel-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .carousel-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .carousel-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: fit-content;
        }

        .carousel-illustration {
            position: absolute;
            bottom: 20px;
            right: 24px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .carousel-icon-wrapper {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(182, 52, 246, 0.15);
        }

        .carousel-icon-inner {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .carousel-icon-trophy { background: linear-gradient(135deg, #FFD700, #FFA500); }
        .carousel-icon-target { background: linear-gradient(135deg, #9333EA, #C026D3); }
        .carousel-icon-gift { background: linear-gradient(135deg, #EC4899, #F472B6); }
        .carousel-icon-chart { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
        .carousel-icon-fire { background: linear-gradient(135deg, #EF4444, #F97316); }

        .carousel-arrow {
            position: absolute;
            right: -18px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            font-size: 18px;
            color: var(--text-primary);
        }

        .carousel-arrow:hover {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
            box-shadow: 0 2px 8px rgba(182, 52, 246, 0.2);
        }

        .carousel-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #D0D0D2;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .dot.active {
            background: var(--primary-purple);
            width: 18px;
            border-radius: 3px;
        }

        .section-tabs {
            display: flex;
            gap: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .section-tab {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 0;
            position: relative;
            white-space: nowrap;
            transition: color 0.2s;
        }

        .section-tab:hover {
            color: var(--primary-purple);
        }

        .section-tab.active {
            color: var(--primary-purple);
        }

        .section-tab.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-purple);
        }

        .filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .status-filter {
            display: flex;
            gap: 8px;
            padding: 6px;
            background: #F0F0F2;
            border-radius: 20px;
            width: fit-content;
        }

        .status-item {
            padding: 8px 20px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .status-item.active {
            background: white;
            color: var(--primary-purple);
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .status-item:not(.active) {
            color: var(--text-secondary);
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .share-btn:hover {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
        }

        .task-cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            border-color: var(--primary-purple);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(182, 52, 246, 0.1);
        }

        .task-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #F5F0FF 0%, #FFF0F8 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .task-icon-wrapper {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #F5F0FF 0%, #FFF0F8 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-icon-inner {
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .task-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .task-reward {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-purple);
        }

        .task-status {
            font-size: 11px;
            color: var(--text-weak);
            margin-left: 8px;
        }

        .task-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .task-btn:hover {
            transform: scale(1.05);
        }

        .task-disclaimer {
            background: rgba(182, 52, 246, 0.06);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid rgba(182, 52, 246, 0.15);
        }

        .activity-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .activity-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .activity-cards-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .activity-cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 详情页 */
        .detail-hero-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 24px 28px;
            margin-bottom: 20px;
        }

        .detail-hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-hero-title {
            font-size: 22px;
            font-weight: 900;
            color: #111827;
            margin-bottom: 8px;
        }

        .detail-hero-desc {
            font-size: 12px;
            color: #6b7280;
            max-width: 640px;
            line-height: 1.6;
        }

        .detail-hero-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-register {
            padding: 8px 18px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-register:hover { opacity: 0.9; }

        .badge-joined {
            padding: 6px 12px;
            background: #ecfdf5;
            color: #059669;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        .detail-stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 16px 0;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 16px;
        }

        .detail-stat-box .val {
            font-size: 16px;
            font-weight: 900;
            color: #111827;
        }

        .detail-stat-box .val.highlight { color: #2563eb; }

        .detail-stat-box .lbl {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 4px;
            font-weight: 600;
        }

        .detail-progress-row {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .detail-progress-item .val {
            font-size: 15px;
            font-weight: 900;
            color: #111827;
        }

        .detail-progress-item .lbl {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .detail-section {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .detail-section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid #f3f4f6;
        }

        .detail-section-title {
            font-size: 14px;
            font-weight: 900;
            color: #111827;
        }

        .detail-section-sub {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }

        .detail-pool-tag {
            text-align: right;
        }

        .detail-pool-tag .lbl { font-size: 10px; color: #9ca3af; }
        .detail-pool-tag .val { font-size: 14px; font-weight: 900; color: #111827; }

        .my-status-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            background: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 6px;
            margin-bottom: 14px;
        }

        .my-status-strip .item .val {
            font-size: 13px;
            font-weight: 900;
            color: #111827;
        }

        .my-status-strip .item .lbl {
            font-size: 9px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .btn-trade-sm {
            padding: 7px 14px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .rank-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 0;
        }

        .rank-tab {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .rank-tab.active {
            color: #111827;
            border-bottom-color: #111827;
        }

        .rank-table-wrap {
            border: 1px solid #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
        }

        .rank-table-head, .rank-table-row {
            display: grid;
            grid-template-columns: 72px 1fr 140px;
            align-items: center;
            padding: 10px 16px;
        }

        .rank-table-head {
            background: #f9fafb;
            font-size: 10px;
            font-weight: 700;
            color: #9ca3af;
            border-bottom: 1px solid #f3f4f6;
        }

        .rank-table-row {
            font-size: 11px;
            border-bottom: 1px solid #f9fafb;
        }

        .rank-table-row:last-child { border-bottom: none; }
        .rank-table-row.top3 { background: #fffbeb; }

        .rank-badge-sm {
            display: inline-flex;
            width: 22px;
            height: 22px;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
        }

        .rank-badge-sm.r1 { background: #f59e0b; }
        .rank-badge-sm.r2 { background: #9ca3af; }
        .rank-badge-sm.r3 { background: #d97706; }

        .rank-pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            border-top: 1px solid #f3f4f6;
        }

        .rank-page-btn {
            min-width: 28px;
            height: 28px;
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            color: #6b7280;
        }

        .rank-page-btn.active {
            background: #111827;
            color: #fff;
            border-color: #111827;
        }

        .task-row {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .task-row:last-child { border-bottom: none; }

        .task-num {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #6b7280;
            flex-shrink: 0;
        }

        .task-body { flex: 1; min-width: 0; }

        .task-name {
            font-size: 12px;
            font-weight: 700;

            { tag: '组合活动', title: 'ForX嘉年华交易大赛', desc: '完成任务 + 交易大赛，瓜分 100,000 USDT', iconClass: 'carousel-icon-trophy' },
            { tag: '交易大赛', title: '合约交易争霸赛', desc: 'Top100 按交易额和盈利率瓜分奖池', iconClass: 'carousel-icon-chart' },
            { tag: '任务活动', title: '新手成长任务', desc: '完成 KYC、充值、首笔交易赢取奖励', iconClass: 'carousel-icon-target' }

        const activityCatalog = {

                rewardPool: '100,000 USDT',
                participants: '8,942',
                period: '2026-05-20 至 2026-06-20',
                countdown: '12天 03时 42分',
                status: 'ongoing',

                showProgress: false,

            },
            'newbie-growth': {

                title: '新手成长任务',
                desc: '完成 KYC、充值、首次合约交易，赢取新人奖励',
                rewardPool: '20,000 USDT',
                participants: '2,456',
                period: '2026-05-20 至 2026-06-20',
                countdown: '6天 12时 30分',

                completedTasks: '2 / 3'
            },

                title: '春季合约交易赛',
                desc: '已结束的合约交易大赛',
                rewardPool: '50,000 USDT',
                participants: '5,120',
                period: '2026-03-01 至 2026-03-31',
                date: '2026-03-01 至 2026-03-31',
                status: 'ended',

                showProgress: false
            }

        const activities = {
            all: {
                ongoing: [
                    activityCatalog['forx-carnival-contest'],
                    activityCatalog['contract-contest'],
                    activityCatalog['newbie-growth']
                ],
                ended: [
                    activityCatalog['contract-contest-ended']
                ]
            }
        };

        const activityRewards = {
            'contract-contest-ended': {
                name: '春季合约交易赛奖励',
                activityType: '交易大赛',
                rewardType: 'USDT',
                amount: '86 USDT'
            }
        };

        const myJoinedActivities = [
            activityCatalog['forx-carnival-contest'],
            activityCatalog['contract-contest'],
            activityCatalog['newbie-growth'],
            activityCatalog['contract-contest-ended']
        ];

        const myRewards = [
            { name: '新手任务奖励', campaign: '新手成长任务', type: '体验金', amount: '10 USDT 等值' },
            { name: '合约交易争霸赛奖励', campaign: '合约交易争霸赛', type: 'USDT', amount: '待发放' },
            { name: '春季合约交易赛奖励', campaign: '春季合约交易赛', type: 'USDT', amount: '86 USDT' },
            { name: '嘉年华任务奖励', campaign: 'ForX嘉年华交易大赛', type: 'USDT', amount: '待发放' }
        ];

        let userParticipatedActivities = {};
        let carnivalCurrentLeaderboardType = 'volume';
        let carnivalCurrentPage = 1;
        let currentStatus = 'ongoing';
        let currentSlide = 0;
        let currentView = 'home';
        let currentActivityId = null;
        let myActivityFilter = 'ongoing';

        const nicknames = ['AlphaTrader', 'CryptoFox', 'BlueWhale', 'MoonHunter', 'ChainKing',
                          'LuckyBear', 'FutureMan', 'Web3Tiger', 'ForXStar', 'NightWhale',
                          'TokenMaster', 'CoinHunter', 'BlockWolf', 'TradeNinja', 'HODLKing'];

        function hasParticipatedById(activityId) {
            return !!userParticipatedActivities[activityId];
        }

        function setParticipatedById(activityId) {
            userParticipatedActivities[activityId] = { time: '2026-05-20 12:30:00' };
        }

        const ACTIVITY_RULES = [
            '活动期间的交易数据以平台统计为准，异常交易不计入排名。',
            '排行榜每 5 分钟更新一次，Top100 用户瓜分奖池。',
            '用户需完成报名后方可参与数据统计与奖励结算。',
            '奖励将在活动结束后统一核算并发放至账户。',
            '平台保留对异常账户取消资格及奖励的最终解释权。'
        ];

        /* i18n stub for legacy refs */
        const i18n = { zh: { toastDeposit: '已跳转充值页（原型演示）', toastGoTrade: '已跳转合约交易页（原型演示）', toastActivity: '进入活动详情（原型演示）', registerSuccess: '报名成功' }, en: {} };
        const currentLang = 'zh';
        function t(key) { return i18n.zh[key] || key; }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }


        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const dots = document.getElementById('carouselDots');
            track.innerHTML = carouselData.map((item) => `
                <div class="carousel-card">
                    <div class="carousel-pattern"><div class="carousel-pattern-dots"></div></div>
                    <div class="carousel-content">
                        <span class="carousel-tag">${item.tag}</span>
                        <h3 class="carousel-title">${item.title}</h3>
                        <p class="carousel-desc">${item.desc}</p>
                        <button class="carousel-btn" onclick="showToast(t('toastActivity'))">查看活动</button>
                    </div>
                    <div class="carousel-illustration">
                        <div class="carousel-icon-wrapper">
                            <div class="carousel-icon-inner ${item.iconClass}"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            dots.innerHTML = carouselData.map((_, idx) => `
                <div class="dot ${idx === currentSlide ? 'active' : ''}" onclick="goToSlide(${idx})"></div>
            `).join('');
        }

        function goToSlide(idx) {
            currentSlide = idx;
            document.getElementById('carouselTrack').style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        document.getElementById('carouselArrow').addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % carouselData.length;
            goToSlide(currentSlide);
        });

        const STATUS_LABEL = { ongoing: '进行中', ended: '已结束' };

        function renderActivityCard(activity) {
            const posterClass = activity.poster || 'poster-default';
            const timeLabel = activity.countdown || activity.date || activity.period;
            return `
                <div class="activity-card" onclick="handleActivityCardClick('${activity.id}')">
                    <div class="activity-card-poster ${posterClass}"></div>
                    <div class="activity-card-body">
                        <div class="activity-header">
                            <span class="activity-status ${activity.status}">${STATUS_LABEL[activity.status] || activity.status}</span>
                        </div>
                        <h3 class="activity-title">${activity.title}</h3>
                        <p class="activity-desc">${activity.desc}</p>
                        <div class="activity-stats">
                            <div class="stat-item">
                                <span class="stat-label">奖池</span>
                                <span class="stat-value">${activity.rewardPool}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">参与人数</span>
                                <span class="stat-value">${activity.participants}</span>
                            </div>
                        </div>
                        <div class="activity-meta">
                            <span class="activity-time">${timeLabel}</span>
                        </div>
                        <button class="activity-view-btn" onclick="event.stopPropagation(); handleActivityCardClick('${activity.id}')">查看活动</button>
                    </div>
                </div>
            `;
        }

        function renderDynamicContent() {
            const container = document.getElementById('dynamicContent');
            const list = activities.all[currentStatus] || [];
            if (!list.length) {
                container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p class="empty-text">暂无活动</p></div>`;
                return;
            }
            container.innerHTML = list.map(renderActivityCard).join('');
        }

        function showPage(view) {
            ['homePage', 'activityDetailPage', 'myActivityPage'].forEach(id => {
                document.getElementById(id).classList.toggle('active', (view === 'home' && id === 'homePage') || (view === 'activityDetail' && id === 'activityDetailPage') || (view === 'myActivities' && id === 'myActivityPage'));
            });
        }

        function pushHistory(view, activityId) {
            if (view === 'home') {
                history.pushState({ view: 'home' }, '', '#/');
            } else if (view === 'detail') {
                history.pushState({ view: 'detail', activityId }, '', `#/activity/${activityId}`);
            } else if (view === 'myActivities') {
                history.pushState({ view: 'myActivities' }, '', '#/my-activities');
            }
        }

        function handleActivityCardClick(activityId) {
            showActivityDetail(activityId, true);
        }

        function registerForActivity(activityId) {
            setParticipatedById(activityId);
            showToast(t('registerSuccess'));
            if (currentView === 'activityDetail' && currentActivityId === activityId) {
                renderActivityDetailPage();
            }
        }

        function showActivityDetail(activityId, useHistory) {
            currentView = 'activityDetail';
            currentActivityId = activityId;
            showPage('activityDetail');
            if (useHistory) pushHistory('detail', activityId);
            renderActivityDetailPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToMyActivity(useHistory) {
            currentView = 'myActivities';
            showPage('myActivities');
            if (useHistory) pushHistory('myActivities');
            renderMyActivityCards(myActivityFilter);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBackToHome(useHistory) {
            currentView = 'home';
            showPage('home');
            if (useHistory) pushHistory('home');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('popstate', (e) => {
            const state = e.state || { view: 'home' };
            if (state.view === 'detail' && state.activityId) {
                showActivityDetail(state.activityId, false);
            } else if (state.view === 'myActivities') {
                goToMyActivity(false);
            } else {
                goBackToHome(false);
            }
        });

        function renderHeroCard(activity) {
            const joined = hasParticipatedById(activity.id);
            const ended = activity.status === 'ended';
            const progressHtml = activity.showProgress ? `
                <div class="detail-progress-row">
                    <div class="detail-progress-item"><div class="val">${activity.completedTasks || '—'}</div><div class="lbl">已完成任务</div></div>
                    ${activity.currentRank ? `<div class="detail-progress-item"><div class="val">${activity.currentRank}</div><div class="lbl">当前排名</div></div>` : ''}
                </div>` : '';

            const actionHtml = ended
                ? (activityRewards[activity.id] ? `<button class="ended-reward-btn" onclick="openActivityRewardModal('${activity.id}')">查看奖励</button>` : '')
                : (joined
                    ? `<span class="badge-joined">已报名 · 2026-05-20 12:30</span>`
                    : `<button class="btn-register" onclick="registerForActivity('${activity.id}')">报名活动</button>`);

            return `
                <div class="detail-hero-card">
                    <div class="detail-hero-top">
                        <div>
                            <h1 class="detail-hero-title">${activity.title}</h1>
                            <p class="detail-hero-desc">${activity.desc}</p>
                        </div>
                        <div class="detail-hero-actions">${actionHtml}</div>
                    </div>
                    <div class="detail-stats-row">
                        <div class="detail-stat-box"><div class="val highlight">${activity.rewardPool}</div><div class="lbl">总奖池</div></div>
                        <div class="detail-stat-box"><div class="val">${activity.participants}</div><div class="lbl">参与人数</div></div>
                        <div class="detail-stat-box"><div class="val">${activity.period}</div><div class="lbl">活动时间</div></div>
                        <div class="detail-stat-box"><div class="val">${activity.countdown || '已结束'}</div><div class="lbl">${ended ? '活动状态' : '剩余时间'}</div></div>
                    </div>
                    ${progressHtml}
                </div>`;
        }

        function renderTaskSection(activity) {
            if (activity.layout === 'contest') return '';
            const pool = activity.taskPool || activity.rewardPool;
            const isNewbie = activity.layout === 'task';
            const tasks = isNewbie ? [
                { name: '完成 KYC 认证', desc: '完成身份认证后可参与新人奖励统计', progress: 100, label: '已完成', pts: '+5 USDT', done: true },
                { name: '完成首次充值', desc: '完成任意金额充值即可参与活动', progress: 100, label: '已完成', pts: '+10 USDT', done: true },
                { name: '完成首次合约交易', desc: '完成任意一笔合约交易', progress: 0, label: '0 / 1', pts: '+20 USDT', done: false, action: '去交易' }
            ] : [
                { name: '充值阶梯奖励', desc: '单笔净充值 ≥ 1,000 USDT，最多 5 次', progress: 0, label: '0 / 5', pts: '+100 Pts', done: false, action: '去充值' },
                { name: '高杠杆交易挑战', desc: '完成 3 笔杠杆 ≥ 20X 的永续合约交易', progress: 100, label: '3 / 3', pts: '+250 Pts', done: true }
            ];

            return `
                <div class="detail-section">
                    <div class="detail-section-head">
                        <div>
                            <div class="detail-section-title">${isNewbie ? '任务奖励' : '限时任务奖励'}</div>
                            <div class="detail-section-sub">完成任务即可获得对应奖励</div>
                        </div>
                        <div class="detail-pool-tag"><div class="lbl">奖池</div><div class="val">${pool}</div></div>
                    </div>
                    ${tasks.map((task, i) => `
                        <div class="task-row">
                            <div class="task-num">${String(i + 1).padStart(2, '0')}</div>
                            <div class="task-body">
                                <div class="task-name">${task.name}</div>
                                <div class="task-desc">${task.desc}</div>
                                <div class="task-progress-track"><div class="task-progress-fill" style="width:${task.progress}%"></div></div>
                            </div>
                            <div class="task-right">
                                <div class="task-pts">${task.pts}</div>
                                ${task.done ? `<span class="task-done-tag">已完成</span>` : `<button class="task-btn-sm" onclick="showToast('${task.action === '去充值' ? t('toastDeposit') : t('toastGoTrade')}')">${task.action || '去完成'}</button>`}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderRankingSection(activity) {
            if (activity.layout === 'task') return '';
            const pool = activity.contestPool || activity.rewardPool;
            return `
                <div class="detail-section">
                    <div class="detail-section-head">
                        <div>
                            <div class="detail-section-title">交易大赛排行榜</div>
                            <div class="detail-section-sub">按交易额和盈利率排名，Top100 用户瓜分奖池</div>
                        </div>
                        <div class="detail-pool-tag"><div class="lbl">奖池</div><div class="val">${pool}</div></div>
                    </div>
                    <div class="my-status-strip">
                        <div class="item"><div class="val">${activity.currentRank || '#1,240'}</div><div class="lbl">当前排名</div></div>
                        <div class="item"><div class="val">12,450 USDT</div><div class="lbl">我的交易量</div></div>
                        <div class="item"><div class="val">8.5%</div><div class="lbl">我的盈利率</div></div>
                        <div class="item"><div class="val">0.00 USDT</div><div class="lbl">预估奖励</div></div>
                        <button class="btn-trade-sm" onclick="showToast(t('toastGoTrade'))">去交易</button>
                    </div>
                    <div class="rank-tabs">
                        <div class="rank-tab ${carnivalCurrentLeaderboardType === 'volume' ? 'active' : ''}" onclick="switchCarnivalLeaderboard('volume')">交易额排名</div>
                        <div class="rank-tab ${carnivalCurrentLeaderboardType === 'profit' ? 'active' : ''}" onclick="switchCarnivalLeaderboard('profit')">盈利率排名</div>
                    </div>
                    <div class="rank-table-wrap">
                        <div class="rank-table-head">
                            <div>排名</div>
                            <div>用户</div>
                            <div>${carnivalCurrentLeaderboardType === 'volume' ? '交易额' : '盈利率'}</div>
                        </div>
                        <div id="carnivalLeaderboardBody"></div>
                        <div class="rank-pagination" id="carnivalPagination"></div>
                    </div>
                </div>`;
        }

        function renderRulesSection() {
            return `
                <div class="detail-section">
                    <div class="detail-section-head" style="margin-bottom:12px;padding-bottom:0;border:none">
                        <div class="detail-section-title">活动规则说明</div>
                    </div>
                    <ul class="rules-list">
                        ${ACTIVITY_RULES.map((rule, i) => `<li><span class="num">${i + 1}</span><span>${rule}</span></li>`).join('')}
                    </ul>
                </div>`;
        }

        function renderActivityDetailPage() {
            const activity = activityCatalog[currentActivityId];
            if (!activity) {
                document.getElementById('activityDetailContent').innerHTML = '<div class="empty-state"><p class="empty-text">活动不存在</p></div>';
                return;
            }
            document.getElementById('activityDetailContent').innerHTML =
                renderHeroCard(activity) +
                renderTaskSection(activity) +
                renderRankingSection(activity) +
                renderRulesSection();
            if (activity.layout !== 'task') renderCarnivalLeaderboard();
        }

        function switchCarnivalLeaderboard(type) {
            carnivalCurrentLeaderboardType = type;
            carnivalCurrentPage = 1;
            renderActivityDetailPage();
        }

        function renderCarnivalLeaderboard() {
            const tbody = document.getElementById('carnivalLeaderboardBody');
            const pagination = document.getElementById('carnivalPagination');
            if (!tbody) return;

            let data = [];
            for (let i = 0; i < 100; i++) {
                data.push({
                    rank: i + 1,
                    nickname: nicknames[i % nicknames.length] + (i > 19 ? Math.floor(i / 20) : ''),
                    value: carnivalCurrentLeaderboardType === 'volume'
                        ? (2500000 - i * 24000).toLocaleString() + ' USDT'
                        : ((128.5 - i * 1.25)).toFixed(1) + '%'
                });
            }

            const pageData = data.slice((carnivalCurrentPage - 1) * 10, carnivalCurrentPage * 10);
            tbody.innerHTML = pageData.map(item => {
                let badge = '';
                if (item.rank === 1) badge = '<span class="rank-badge-sm r1">1</span>';
                else if (item.rank === 2) badge = '<span class="rank-badge-sm r2">2</span>';
                else if (item.rank === 3) badge = '<span class="rank-badge-sm r3">3</span>';
                return `<div class="rank-table-row ${item.rank <= 3 ? 'top3' : ''}"><div>${badge || item.rank}</div><div>${item.nickname}</div><div>${item.value}</div></div>`;
            }).join('');

            let html = `<button class="rank-page-btn" onclick="changeCarnivalPage(${carnivalCurrentPage - 1})" ${carnivalCurrentPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let i = 1; i <= 10; i++) {
                html += `<button class="rank-page-btn ${i === carnivalCurrentPage ? 'active' : ''}" onclick="changeCarnivalPage(${i})">${i}</button>`;
            }
            html += `<button class="rank-page-btn" onclick="changeCarnivalPage(${carnivalCurrentPage + 1})" ${carnivalCurrentPage === 10 ? 'disabled' : ''}>›</button>`;
            pagination.innerHTML = html;
        }

        function changeCarnivalPage(page) {
            if (page < 1 || page > 10) return;
            carnivalCurrentPage = page;
            renderCarnivalLeaderboard();
        }

        function openActivityRewardModal(activityId) {
            const reward = activityRewards[activityId];
            if (!reward) return;
            const modal = document.getElementById('rewardDetailModal');
            document.getElementById('detailModalTitle').textContent = '活动奖励';
            document.getElementById('detailModalContent').innerHTML = `
                <table class="reward-table">
                    <thead><tr><th>奖励名称</th><th>活动类型</th><th>奖励类型</th><th>发放金额</th></tr></thead>
                    <tbody><tr>
                        <td>${reward.name}</td><td>${reward.activityType}</td><td>${reward.rewardType}</td><td>${reward.amount}</td>
                    </tr></tbody>
                </table>`;
            modal.classList.add('active');
        }

        function renderMyActivityCards(filter = 'ongoing') {
            const container = document.getElementById('myActivityCards');
            const filtered = myJoinedActivities.filter(a => a.status === filter);
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p class="empty-text">该分类下暂无活动</p></div>`;
                return;
            }
            container.innerHTML = filtered.map(renderActivityCard).join('');
        }

        function openMyRewardsModal() {
            const modal = document.getElementById('rewardDetailModal');
            document.getElementById('detailModalTitle').textContent = '我的奖励';
            document.getElementById('detailModalContent').innerHTML = `
                <table class="reward-table">
                    <thead>
                        <tr><th>奖励名称</th><th>活动类型</th><th>奖励类型</th><th>发放金额</th></tr>
                    </thead>
                    <tbody>
                        ${myRewards.map(r => `<tr><td>${r.name}</td><td>${r.campaign}</td><td>${r.type}</td><td>${r.amount}</td></tr>`).join('')}
                    </tbody>
                </table>`;
            modal.classList.add('active');
        }

        document.getElementById('myActivitiesLink').addEventListener('click', () => goToMyActivity(true));
        document.getElementById('myRewardBtn').addEventListener('click', openMyRewardsModal);
        document.getElementById('closeDetailModal').addEventListener('click', () => {
            document.getElementById('rewardDetailModal').classList.remove('active');
        });
        document.querySelectorAll('#myActivityStatusFilter .status-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#myActivityStatusFilter .status-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                myActivityFilter = item.dataset.status;
                renderMyActivityCards(myActivityFilter);
            });
        });
        document.querySelectorAll('#statusFilter .status-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#statusFilter .status-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentStatus = item.dataset.status;
                renderDynamicContent();
            });
        });

        history.replaceState({ view: 'home' }, '', '#/');
