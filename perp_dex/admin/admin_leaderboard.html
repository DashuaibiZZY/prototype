<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ForX Admin - 排行榜影子调度中心 V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #111827; }
        .sidebar-item-active { background-color: #1e293b; color: #fff; border-left: 4px solid #3b82f6; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-decay { background: #fef3c7; color: #92400e; }
        .status-offline { background: #f1f5f9; color: #475569; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; align-items: center; justify-content: center; display: none; }
        .input-label { block; text-[10px]; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.05em; }
        .search-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 6px 10px; font-size: 11px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-[12px]">

<!-- 侧边栏 -->
<aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
    <div class="p-6 text-white font-black text-xl italic tracking-tighter uppercase">ForX ADMIN</div>
    <nav class="flex-1 px-4 space-y-1">
        <div class="py-4 text-xs font-semibold text-slate-500 uppercase tracking-widest px-4 border-b border-slate-800 mb-2">Operation</div>
        <button class="sidebar-item-active w-full flex items-center px-4 py-3 rounded-lg transition-all text-left">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            排行榜影子配置
        </button>
    </nav>
</aside>

<main class="flex-1 flex flex-col overflow-hidden">
    <!-- 头部 -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
        <h1 class="text-lg font-bold text-slate-800 italic uppercase">排行榜影子配置</h1>
    </header>

    <div class="flex-1 overflow-y-auto p-8 space-y-4">

        <!-- 2. 搜索与过滤条 -->
        <section class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm grid grid-cols-6 gap-3 items-end">
            <div class="col-span-1">
                <label class="input-label">地址模糊搜索</label>
                <input type="text" placeholder="0x..." class="search-input w-full">
            </div>
            <div class="col-span-1">
                <label class="input-label">PnL 目标排名</label>
                <div class="flex items-center space-x-1">
                    <input type="number" placeholder="Min" class="search-input w-full text-center">
                    <span class="text-slate-300">-</span>
                    <input type="number" placeholder="Max" class="search-input w-full text-center">
                </div>
            </div>
            <div class="col-span-1">
                <label class="input-label">ROI 目标排名</label>
                <div class="flex items-center space-x-1">
                    <input type="number" placeholder="Min" class="search-input w-full text-center">
                    <span class="text-slate-300">-</span>
                    <input type="number" placeholder="Max" class="search-input w-full text-center">
                </div>
            </div>
            <div class="col-span-1">
                <label class="input-label">积分目标排名</label>
                <div class="flex items-center space-x-1">
                    <input type="number" placeholder="Min" class="search-input w-full text-center">
                    <span class="text-slate-300">-</span>
                    <input type="number" placeholder="Max" class="search-input w-full text-center">
                </div>
            </div>
            <div>
                <label class="input-label">账户状态</label>
                <select class="search-input w-full bg-white font-bold">
                    <option>全部</option>
                    <option>活跃 (Active)</option>
                    <option>衰退 (Decay)</option>
                    <option>下线 (Offline)</option>
                </select>
            </div>
            <div class="flex space-x-2">
                <button class="flex-1 bg-slate-900 text-white font-bold py-1.5 rounded hover:bg-black transition-all">筛选</button>
                <button class="flex-1 border border-slate-200 text-slate-400 font-bold py-1.5 rounded hover:bg-slate-50 transition-all">重置</button>
            </div>
        </section>

        <!-- 3. 影子账户池列表 -->
        <section class="bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                <div class="flex items-center space-x-4">
                    <h2 class="font-black text-slate-700 uppercase tracking-tighter">影子账户池</h2>
                </div>
                <button onclick="toggleModal('modal-edit-shadow')" class="bg-blue-600 text-white px-4 py-2 rounded-sm font-black hover:bg-blue-700 transition-all uppercase">
                    + 新增影子账户
                </button>
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-400 font-black text-[10px] uppercase border-b border-slate-100">
                <tr>
                    <th class="px-6 py-4">影子地址</th>
                    <th class="px-6 py-4 text-center">目标排名要求</th>
                    <th class="px-6 py-4 text-center">当前状态</th>
                    <th class="px-6 py-4">生命周期</th>
                    <th class="px-6 py-4 text-right">当前数据 (PnL / ROI / Points)</th>
                    <th class="px-6 py-4 text-right">操作</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50 text-[11px] font-medium">
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <span class="font-mono font-black text-slate-900 block text-[12px]">0x7a8b...C443</span>
                    </td>
                    <td class="px-6 py-4 text-[10px] font-bold space-y-1">
                        <div class="flex justify-between"><span>PnL:</span><span class="text-blue-600">Top 1-3</span></div>
                        <div class="flex justify-between"><span>ROI:</span><span class="text-slate-600">Top 5-10</span></div>
                        <div class="flex justify-between"><span>Points:</span><span class="text-slate-600">Top 50-100</span></div>
                    </td>
                    <td class="px-6 py-4 text-center"><span class="status-tag status-active">活跃</span></td>
                    <td class="px-6 py-4">
                        <div class="w-24 h-1 bg-slate-100 rounded-full mb-1"><div class="bg-blue-500 h-full" style="width: 30%"></div></div>
                        <span class="text-[9px] text-slate-400">Day 10 / 30 (自动继承)</span>
                    </td>
                    <td class="px-6 py-4 text-right space-y-1">
                        <p class="text-green-600 font-black">+$1,240,000</p>
                        <p class="text-slate-900 font-bold">124.52%</p>
                        <p class="text-blue-500 font-bold uppercase">24,500 Pts</p>
                    </td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <button onclick="toggleModal('modal-edit-shadow')" class="text-blue-600 font-black hover:underline">编辑</button>
                        <button onclick="confirm('确认下线？该账户将进入快速衰退并在周期结束时被继承。')" class="text-red-500 font-bold hover:underline">下线</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<!-- 弹窗: 新增/编辑影子账户 -->
<div id="modal-edit-shadow" class="modal-overlay">
    <div class="bg-white w-[650px] rounded-sm shadow-2xl overflow-hidden animate-in zoom-in duration-200">
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-900">
            <h3 class="text-white font-black italic uppercase tracking-widest">影子交易员全量参数配置</h3>
            <button onclick="toggleModal('modal-edit-shadow')" class="text-slate-400 hover:text-white">✕</button>
        </div>

        <div class="p-8 grid grid-cols-2 gap-10">
            <!-- 左侧：多维度目标排名 (固定区间下拉框版) -->
            <div class="space-y-6">
                <h4 class="text-slate-900 font-black border-b pb-2 uppercase tracking-tighter">1. 维度排名区间目标</h4>
                <div class="space-y-5">
                    <!-- PnL 排名 -->
                    <div class="space-y-2">
                        <label class="input-label">收益金额 (PnL Amount) 目标区间</label>
                        <select class="w-full border-b-2 border-slate-200 bg-slate-50 p-2 font-black text-blue-600 outline-none focus:border-blue-600">
                            <option value="1-3">Top 1 - 3 (名额: 3)</option>
                            <option value="4-10">Top 4 - 10 (名额: 7)</option>
                            <option value="11-20">Top 11 - 20 (名额: 10)</option>
                            <option value="21-50">Top 21 - 50 (名额: 30)</option>
                            <option value="51-100">Top 51 - 100 (名额: 50)</option>
                            <option value="101-200">Top 101 - 200 (名额: 100)</option>
                            <option value="201-500">Top 201 - 500 (名额: 300)</option>
                        </select>
                        <p class="text-[9px] text-slate-400 italic">系统将自动校验区间余量，避免重叠</p>
                    </div>

                    <!-- ROI 排名 -->
                    <div class="space-y-2">
                        <label class="input-label">收益率 (ROI %) 目标区间</label>
                        <select class="w-full border-b-2 border-slate-200 bg-slate-50 p-2 font-black text-slate-700 outline-none focus:border-blue-600">
                            <option value="1-3">Top 1 - 3 (名额: 3)</option>
                            <option value="4-10">Top 4 - 10 (名额: 7)</option>
                            <option value="11-20">Top 11 - 20 (名额: 10)</option>
                            <option value="21-50">Top 21 - 50 (名额: 30)</option>
                            <option value="51-100">Top 51 - 100 (名额: 50)</option>
                            <option value="101-200">Top 101 - 200 (名额: 100)</option>
                            <option value="201-500">Top 201 - 500 (名额: 300)</option>
                        </select>
                    </div>

                    <!-- 积分排名 -->
                    <div class="space-y-2">
                        <label class="input-label">获得积分 (Points) 目标区间</label>
                        <select class="w-full border-b-2 border-slate-200 bg-slate-50 p-2 font-black text-slate-700 outline-none focus:border-blue-600">
                            <option value="1-3">Top 1 - 3 (名额: 3)</option>
                            <option value="4-10">Top 4 - 10 (名额: 7)</option>
                            <option value="11-20">Top 11 - 20 (名额: 10)</option>
                            <option value="21-50">Top 21 - 50 (名额: 30)</option>
                            <option value="51-100">Top 51 - 100 (名额: 50)</option>
                            <option value="101-200">Top 101 - 200 (名额: 100)</option>
                            <option value="201-500">Top 201 - 500 (名额: 300)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 右侧：生命周期与性格 -->
            <div class="space-y-6">
                <h4 class="text-slate-900 font-black border-b pb-2 uppercase tracking-tighter">2. 生命周期与人设</h4>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="input-label">活跃时长 (天)</label><input type="number" value="30" class="w-full border border-slate-200 rounded p-2 font-black"></div>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-sm border border-blue-100 flex items-center justify-between">
                        <div><p class="text-[10px] font-black text-blue-600 uppercase">自动继承者逻辑</p><p class="text-[8px] text-blue-400 italic">结束后自动生成新地址承接参数</p></div>
                        <input type="checkbox" checked class="w-5 h-5 accent-blue-600">
                    </div>
                </div>
            </div>
        </div>

        <div class="px-8 py-5 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
            <button onclick="toggleModal('modal-edit-shadow')" class="px-6 py-2 font-bold text-slate-400 uppercase">取消</button>
            <button onclick="alert('影子账号已配置成功，正在同步调度引擎'); toggleModal('modal-edit-shadow')" class="px-10 py-2 bg-blue-600 text-white font-black rounded-sm shadow-xl shadow-blue-600/20 uppercase tracking-widest">保存并应用</button>
        </div>
    </div>
</div>

<script>
    function toggleModal(id) {
        const modal = document.getElementById(id);
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
</script>
</body>
</html>
