<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX Admin - 冻结操作记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar-item-active { background: #1e293b; color: #fff; border-left: 4px solid #3b82f6; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .action-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; background: #fff7ed; color: #ea580c; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-[12px]">

<aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
    <div class="p-6"><span class="text-white font-black text-2xl tracking-tighter italic uppercase">ForX Admin</span></div>
    <nav class="flex-1 px-4 space-y-1">
        <div class="py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">风控与用户</div>
        <a href="用户费率设置.html" class="w-full flex items-center px-4 py-3 text-sm font-medium hover:bg-slate-800 rounded-lg transition-colors">用户费率设置</a>
        <a href="用户冻结设置.html" class="w-full flex items-center px-4 py-3 text-sm font-medium hover:bg-slate-800 rounded-lg transition-colors">用户冻结设置</a>
        <a href="费率操作记录.html" class="w-full flex items-center px-4 py-3 text-sm font-medium hover:bg-slate-800 rounded-lg transition-colors">费率操作记录</a>
        <a href="冻结操作记录.html" class="sidebar-item-active w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg">冻结操作记录</a>
    </nav>
</aside>

<main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
        <div>
            <h1 class="text-xl font-bold text-slate-800">冻结操作记录</h1>
            <p class="text-xs text-slate-400 mt-0.5">冻结配置与风控标签变更的审计日志</p>
        </div>
        <a href="用户冻结设置.html" class="text-xs font-bold text-blue-600 hover:underline">← 返回用户冻结设置</a>
    </header>

    <div class="flex-1 overflow-y-auto p-8 space-y-6">
        <section class="card p-5">
            <div class="grid grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">UID / 钱包</label>
                    <input id="filterUser" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">操作人</label>
                    <input id="filterOperator" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">操作类型</label>
                    <select id="filterAction" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none bg-white">
                        <option value="all">全部</option>
                        <option value="配置冻结">配置冻结</option>
                        <option value="变更风控标签">变更风控标签</option>
                    </select>
                </div>
                <div class="col-span-2 flex gap-2">
                    <button onclick="applyFilters()" class="flex-1 bg-slate-900 text-white py-2.5 rounded-lg text-sm font-bold">查询</button>
                    <button onclick="resetFilters()" class="px-4 py-2.5 border border-slate-200 rounded-lg text-sm font-bold text-slate-600">重置</button>
                </div>
            </div>
        </section>

        <section class="card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-500 uppercase">
                <tr>
                    <th class="px-5 py-3">操作时间</th>
                    <th class="px-4 py-3">操作人</th>
                    <th class="px-4 py-3">目标用户</th>
                    <th class="px-4 py-3">操作类型</th>
                    <th class="px-4 py-3">变更详情</th>
                    <th class="px-5 py-3">备注</th>
                </tr>
                </thead>
                <tbody id="logTableBody" class="divide-y divide-slate-50 text-[12px]"></tbody>
            </table>
        </section>
    </div>
</main>

<script>
    const FREEZE_LOG_KEY = 'forx_freeze_operation_logs';
    const SEED_LOGS = [
        { id: 1, time: '2026/07/21 16:08:22', operator: 'Risk_Admin', uid: '10019833', wallet: '0xd5e2...1a7b', action: '配置冻结', detail: '开启：账户冻结、提现冻结、下单冻结、资金划转冻结；标签：AML 观察', remark: '风控复核异常资金流' },
        { id: 2, time: '2026/07/19 11:42:05', operator: 'Risk_Admin', uid: '10031592', wallet: '0x2b91...4f8a', action: '配置冻结', detail: '开启：下单冻结、API 交易冻结；标签：高频套利', remark: '疑似刷量行为' }
    ];

    let allLogs = [];

    function loadLogs() {
        const stored = JSON.parse(localStorage.getItem(FREEZE_LOG_KEY) || '[]');
        allLogs = [...stored, ...SEED_LOGS.filter(s => !stored.some(x => x.id === s.id))].sort((a, b) => (b.id || 0) - (a.id || 0));
    }

    let filteredLogs = [];

    function renderTable() {
        const tbody = document.getElementById('logTableBody');
        if (!filteredLogs.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">暂无记录</td></tr>';
            return;
        }
        tbody.innerHTML = filteredLogs.map(l => `
            <tr class="hover:bg-slate-50">
                <td class="px-5 py-4 font-mono text-[11px] text-slate-600">${l.time}</td>
                <td class="px-4 py-4 font-bold text-slate-700">${l.operator}</td>
                <td class="px-4 py-4"><div class="font-bold">UID ${l.uid}</div><div class="text-[10px] text-slate-400 font-mono">${l.wallet}</div></td>
                <td class="px-4 py-4"><span class="action-tag">${l.action}</span></td>
                <td class="px-4 py-4 text-[11px] text-slate-600 max-w-[260px]">${l.detail}</td>
                <td class="px-5 py-4 text-[11px] text-slate-500">${l.remark}</td>
            </tr>
        `).join('');
    }

    function applyFilters() {
        const user = document.getElementById('filterUser').value.trim().toLowerCase();
        const operator = document.getElementById('filterOperator').value.trim().toLowerCase();
        const action = document.getElementById('filterAction').value;
        filteredLogs = allLogs.filter(l => {
            if (user && !l.uid.includes(user) && !l.wallet.toLowerCase().includes(user)) return false;
            if (operator && !l.operator.toLowerCase().includes(operator)) return false;
            if (action !== 'all' && l.action !== action) return false;
            return true;
        });
        renderTable();
    }

    function resetFilters() {
        document.getElementById('filterUser').value = '';
        document.getElementById('filterOperator').value = '';
        document.getElementById('filterAction').value = 'all';
        filteredLogs = [...allLogs];
        renderTable();
    }

    loadLogs();
    filteredLogs = [...allLogs];
    renderTable();
</script>
</body>
</html>
