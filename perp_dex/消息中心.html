<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX - 消息中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-card-hover: #232d47;
            --bg-input: #0d1117;
            --border-color: #2a3348;
            --border-light: #363f57;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.5);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        .nav-menu {
            display: flex;
            gap: 4px;
        }

        .nav-menu-item {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-menu-item:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        .nav-menu-item.active {
            color: var(--accent-cyan);
        }

        .navbar-center {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-box {
            width: 320px;
            height: 40px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            color: var(--text-muted);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .wallet-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-status:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        .wallet-icon {
            width: 20px;
            height: 20px;
            background: var(--accent-blue);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wallet-address {
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-blue);
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
        }

        .nav-icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            color: var(--text-secondary);
        }

        .nav-icon-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .nav-icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* 铃铛未读数 */
        .unread-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            min-width: 18px;
            height: 18px;
            background: var(--accent-red);
            border-radius: 9px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* 消息下拉浮层 */
        .message-dropdown {
            position: fixed;
            top: 40px;
            right: 80px;
            width: 380px;
            max-height: 520px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: none;
            flex-direction: column;
            z-index: 1001;
            overflow: hidden;
        }

        .message-dropdown.show {
            display: flex;
        }

        .dropdown-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .dropdown-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dropdown-title {
            font-size: 16px;
            font-weight: 600;
        }

        .dropdown-mark-read {
            font-size: 13px;
            color: var(--accent-cyan);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .dropdown-mark-read:hover {
            opacity: 0.8;
        }

        .dropdown-unread-tip {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .dropdown-unread-tip span {
            color: var(--accent-red);
            font-weight: 500;
        }

        .dropdown-tabs {
            display: flex;
            gap: 4px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .dropdown-tab {
            padding: 6px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            border: none;
        }

        .dropdown-tab:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        .dropdown-tab.active {
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .dropdown-message-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .dropdown-message-list::-webkit-scrollbar {
            width: 4px;
        }

        .dropdown-message-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .dropdown-message-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .dropdown-message-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .dropdown-message-item:hover {
            background: var(--bg-card-hover);
        }

        .dropdown-message-item.unread {
            background: rgba(59, 130, 246, 0.05);
        }

        .dropdown-message-item.p0 {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .dropdown-message-item.p0:hover {
            background: rgba(239, 68, 68, 0.12);
        }

        .dropdown-msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .msg-type-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .msg-type-icon.system { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .msg-type-icon.asset { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .msg-type-icon.contract { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .msg-type-icon.security { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .msg-type-icon.activity { background: rgba(236, 72, 153, 0.2); color: #ec4899; }

        .msg-title {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .risk-tag {
            padding: 2px 6px;
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            font-size: 10px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .msg-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .msg-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .dropdown-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .view-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: white;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-all-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* 遮罩层 */
        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: none;
        }

        .overlay-bg.show {
            display: block;
        }

        /* 主内容区 - 三栏布局 */
        .main-content {
            margin-top: 40px;
            min-height: calc(100vh - 40px);
            background: var(--bg-primary);
            display: none;
        }

        .main-content.show {
            display: block;
        }

        .message-center {
            max-width: 1440px;
            margin: 0 auto;
            height: calc(100vh - 40px);
            display: flex;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧分类栏 */
        .category-sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-item:hover {
            background: var(--bg-card-hover);
        }

        .category-item.active {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .category-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .category-icon.all { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .category-icon.system { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .category-icon.asset { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .category-icon.contract { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .category-icon.security { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .category-icon.activity { background: rgba(236, 72, 153, 0.2); color: #ec4899; }

        .category-name {
            flex: 1;
            font-size: 14px;
        }

        .category-unread {
            padding: 2px 8px;
            background: var(--accent-red);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        /* 中间消息列表 */
        .message-list-panel {
            width: 480px;
            flex-shrink: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .list-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .list-title {
            font-size: 16px;
            font-weight: 600;
        }

        .list-unread-count {
            font-size: 13px;
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .list-tools {
            display: flex;
            gap: 8px;
        }

        .list-search {
            flex: 1;
            position: relative;
        }

        .list-search input {
            width: 100%;
            height: 36px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 12px 0 36px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .list-search input:focus {
            border-color: var(--accent-cyan);
        }

        .list-search .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-btn {
            height: 36px;
            padding: 0 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .filter-btn.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .list-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            height: 32px;
            padding: 0 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .action-btn.danger:hover {
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .message-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .message-list-container::-webkit-scrollbar {
            width: 6px;
        }

        .message-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .message-list-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message-card {
            padding: 14px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .message-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }

        .message-card.selected {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .message-card.p0 {
            border-left: 3px solid var(--accent-red);
        }

        .message-card.unread {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .message-card.unread .message-card-title {
            font-weight: 600;
        }

        .message-card-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .message-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-card-content {
            flex: 1;
            min-width: 0;
        }

        .message-card-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-card-title {
            flex: 1;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .message-card-unread {
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .message-card-body {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .message-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .message-card-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .message-card-more {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .message-card-more:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        /* 分页 */
        .pagination {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .page-btn.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-ellipsis {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        /* 右侧详情区域 */
        .message-detail-panel {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .detail-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-panel-title {
            font-size: 16px;
            font-weight: 600;
        }

        .detail-panel-actions {
            display: flex;
            gap: 8px;
        }

        .detail-action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .detail-action-btn:hover {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .detail-action-btn.danger:hover {
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .detail-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-panel-content::-webkit-scrollbar {
            width: 6px;
        }

        // 格式化地址
        function formatAddress(addr, prefix = 6, suffix = 4) {
            if (!addr || addr.length <= prefix + suffix) return addr;
            return addr.slice(0, prefix) + '...' + addr.slice(-suffix);
        }

        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (mins < 1) return '刚刚';
            if (mins < 60) return `${mins} 分钟前`;
            if (hours < 24) return `${hours} 小时前`;
            if (days < 7) return `${days} 天前`;
            
            return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function formatFullTime(date) {
            return date.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        // 获取分类未读数
        function getUnreadCount(category) {
            if (category === 'all') {
                return state.messages.filter(m => !m.read && m.status !== 'expired' && m.status !== 'revoked').length;
            }
            return state.messages.filter(m => m.type === category && !m.read && m.status !== 'expired' && m.status !== 'revoked').length;
        }

        // 更新未读数显示
        function updateUnreadBadges() {
            document.getElementById('bellBadge').textContent = getUnreadCount('all');
            document.getElementById('dropdownUnreadCount').textContent = getUnreadCount('all');
            CATEGORY_KEYS.forEach(cat => {
                const el = document.getElementById(`cat-unread-${cat}`);
                if (!el) return;
                const count = getUnreadCount(cat);
                el.textContent = count;
                el.style.display = count > 0 ? 'flex' : 'none';
            });
            document.getElementById('listUnreadCount').textContent = `${getUnreadCount(state.currentCategory)} 条未读`;
        }

        // 获取当前筛选后的列表
        function getFilteredMessages() {
            let list = state.messages.filter(m => m.status !== 'expired' && m.status !== 'revoked');
            
            if (state.currentCategory !== 'all') {
                list = list.filter(m => m.type === state.currentCategory);
            }

            if (state.currentCategory === 'announcement' && state.currentAnnouncementSubCategory !== 'all') {
                list = list.filter(m => m.announcementType === state.currentAnnouncementSubCategory);
            }
            
            if (state.currentFilter === 'unread') {
                list = list.filter(m => !m.read);
            } else if (state.currentFilter === 'read') {
                list = list.filter(m => m.read);
            }
            
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                list = list.filter(m => 
                    m.title.toLowerCase().includes(q) ||
                    m.summary.toLowerCase().includes(q) ||
                    (m.businessData && JSON.stringify(m.businessData).toLowerCase().includes(q))
                );
            }
            
            list.sort((a, b) => {
                const p0A = a.priority === 'P0' ? 0 : 1;
                const p0B = b.priority === 'P0' ? 0 : 1;
                if (p0A !== p0B) return p0A - p0B;
                return b.time - a.time;
            });
            
            return list;
        }

        // 渲染下拉浮层列表
        function renderDropdownList() {
            const container = document.getElementById('dropdownMessageList');
            const list = getFilteredMessages().slice(0, 5);
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div style="padding:40px 20px;text-align:center;color:var(--text-muted);">
                        暂无消息
                    </div>
                `;
                return;
            }
            
            container.innerHTML = list.map(msg => `
                <div class="dropdown-message-item ${msg.unread ? 'unread' : ''} ${msg.priority === 'P0' ? 'p0' : ''}" data-id="${msg.id}">
                    <div class="dropdown-msg-header">
                        <div class="msg-type-icon ${MSG_TYPES[msg.type].class}">${MSG_TYPES[msg.type].icon}</div>
                        <div class="msg-title">${msg.title}</div>
                        ${msg.read ? '' : '<div class="unread-dot"></div>'}
                        ${msg.priority === 'P0' ? '<span class="risk-tag">P0</span>' : ''}
                    </div>
                    <div class="msg-summary">${msg.summary}</div>
                    <div class="msg-time">${formatTime(msg.time)}</div>
                </div>
            `).join('');
            
            container.querySelectorAll('.dropdown-message-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    markAsRead(id);
                    enterMainPage();
                    selectMessage(id);
                });
            });
        }

        function getListTitle() {
            if (state.currentCategory === 'announcement' && state.currentAnnouncementSubCategory !== 'all') {
                return `公告 / ${ANNOUNCEMENT_SUB_NAMES[state.currentAnnouncementSubCategory]}`;
            }
            return CATEGORY_NAMES[state.currentCategory] || '消息';
        }

        function renderAnnouncementSubTabs() {
            const subTabs = document.getElementById('announcementSubTabs');
            if (!subTabs) return;
            subTabs.style.display = state.currentCategory === 'announcement' ? 'flex' : 'none';
            subTabs.querySelectorAll('.announcement-subtab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.annSub === state.currentAnnouncementSubCategory);
            });
        }

        // 渲染主列表
        function renderMainList() {
            renderAnnouncementSubTabs();
            document.getElementById('listTitle').textContent = getListTitle();
            document.getElementById('listUnreadCount').textContent = `${getUnreadCount(state.currentCategory)} 条未读`;
            const container = document.getElementById('messageListContainer');
            const list = getFilteredMessages();
            const totalPages = Math.max(1, Math.ceil(list.length / state.pageSize));
            state.currentPage = Math.min(state.currentPage, totalPages);
            
            const start = (state.currentPage - 1) * state.pageSize;
            const pageList = list.slice(start, start + state.pageSize);
            
            if (list.length === 0) {
                let tip = '暂无消息';
                if (state.searchQuery) tip = '未找到相关搜索结果';
                else if (state.currentFilter === 'unread') tip = '暂无未读消息';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <div class="empty-title">${tip}</div>
                    </div>
                `;
            } else {
                container.innerHTML = pageList.map(msg => `
                    <div class="message-card ${msg.read ? '' : 'unread'} ${msg.priority === 'P0' ? 'p0' : ''} ${state.selectedMessageId === msg.id ? 'selected' : ''}" data-id="${msg.id}">
                        <div class="message-card-header">
                            <div class="message-card-icon ${MSG_TYPES[msg.type].class}">${MSG_TYPES[msg.type].icon}</div>
                            <div class="message-card-content">
                                <div class="message-card-title-row">
                                    <div class="message-card-title">${msg.title}</div>
                                    ${msg.read ? '' : '<div class="message-card-unread"></div>'}
                                </div>
                                <div class="message-card-body">${msg.summary}</div>
                                <div class="message-card-footer">
                                    <span class="message-card-time">${formatTime(msg.time)}</span>
                                    <button class="message-card-more" data-delete="${msg.id}" onclick="event.stopPropagation();">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="1"></circle>
                                            <circle cx="19" cy="12" r="1"></circle>
                                            <circle cx="5" cy="12" r="1"></circle>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            container.querySelectorAll('.message-card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    markAsRead(id);
                    selectMessage(id);
                });
            });
            
            container.querySelectorAll('.message-card-more').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = el.dataset.delete;
                    showDeleteConfirm(id);
                });
            });
            
            renderPagination(totalPages);
        }

        // 渲染分页
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let pages = [];
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= state.currentPage - 2 && i <= state.currentPage + 2)) {
                    pages.push(i);
                } else if (pages[pages.length - 1] !== '...') {
                    pages.push('...');
                }
            }
            
            container.innerHTML = `
                <button class="page-btn" ${state.currentPage <= 1 ? 'disabled' : ''} data-page="prev">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                ${pages.map(p => p === '...' 
                    ? '<div class="page-ellipsis">...</div>'
                    : `<button class="page-btn ${p === state.currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`
                ).join('')}
                <button class="page-btn" ${state.currentPage >= totalPages ? 'disabled' : ''} data-page="next">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            `;
            
            container.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.disabled) return;
                    const page = btn.dataset.page;
                    if (page === 'prev') state.currentPage--;
                    else if (page === 'next') state.currentPage++;
                    else state.currentPage = parseInt(page);
                    renderMainList();
                });
            });
        }

        // 渲染详情
        function renderDetail(msgId) {
            const msg = state.messages.find(m => m.id === msgId);
            const detailContent = document.getElementById('detailPanelContent');
            const detailFooter = document.getElementById('detailFooter');
            
            if (!msg) {
                detailContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <div class="empty-title">选择一条消息</div>
                        <div class="empty-desc">在左侧选择一条消息查看详情</div>
                    </div>
                `;
                detailFooter.style.display = 'none';
                return;
            }
            
            if (msg.status === 'expired') {
                detailContent.innerHTML = `
                    <div class="exception-state">
                        <div class="exception-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                        </div>
                        <div class="exception-title">消息已过期</div>
                        <div class="exception-desc">此消息已超过有效期，内容已隐藏</div>
                    </div>
                `;
                detailFooter.style.display = 'none';
                return;
            }
            
            if (msg.status === 'revoked') {
                detailContent.innerHTML = `
                    <div class="exception-state">
                        <div class="exception-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M19.36 2.64a4.87 4.87 0 0 1 0 6.87L12 16.87l-7.36-7.36a4.87 4.87 0 0 1 0-6.87 4.84 4.84 0 0 1 6.86 0l.5.5.5-.5a4.84 4.84 0 0 1 6.86 0z"></path>
                            </svg>
                        </div>
                        <div class="exception-title">消息已撤回</div>
                        <div class="exception-desc">此消息已被撤回，不再展示</div>
                    </div>
                `;
                detailFooter.style.display = 'none';
                return;
            }
            
            let businessCardHtml = '';
            if (msg.businessData) {
                let fields = [];
                const data = msg.businessData;
                switch (msg.subtype) {
                    case 'depositSuccess':
                        fields = [
                            ['币种', data.coin],
                            ['数量', data.amount],
                            ['网络', data.network],
                            ['到账时间', data.arriveTime],
                            ['TxHash', data.txHash, 'hash']
                        ];
                        break;
                    case 'withdrawRequest':
                    case 'withdrawFail':
                        fields = [
                            ['币种', data.coin],
                            ['数量', data.amount],
                            ['网络', data.network],
                            ['提币地址', data.address, 'address'],
                            ['手续费', data.fee],
                            ['提币单号', data.withdrawId, 'orderId'],
                            ['处理状态', data.status]
                        ];
                        break;
                    case 'rewardArrive':
                        fields = [
                            ['奖励类型', data.rewardType],
                            ['奖励金额', data.amount],
                            ['活动名称', data.activityName],
                            ['到账时间', data.arriveTime]
                        ];
                        break;
                    case 'contractLimitDeal':
                    case 'contractMarketDeal':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['杠杆', data.leverage],
                            ['委托价格', data.orderPrice],
                            ['成交价格', data.dealPrice],
                            ['成交数量', data.dealQty],
                            ['订单号', data.orderId, 'orderId'],
                            ['手续费', data.fee],
                            ['成交时间', data.dealTime]
                        ];
                        break;
                    case 'contractOrderCancel':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['委托价格', data.orderPrice],
                            ['委托数量', data.orderQty],
                            ['释放保证金', data.releaseMargin],
                            ['订单号', data.orderId, 'orderId'],
                            ['撤销时间', data.cancelTime]
                        ];
                        break;
                    case 'takeProfitHit':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['触发价格', data.triggerPrice],
                            ['成交价格', data.dealPrice],
                            ['收益金额', data.profit, 'profit'],
                            ['收益率', data.profitRate],
                            ['订单号', data.orderId, 'orderId']
                        ];
                        break;
                    case 'stopLossHit':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['触发价格', data.triggerPrice],
                            ['成交价格', data.dealPrice],
                            ['亏损金额', data.loss, 'loss'],
                            ['收益率', data.lossRate],
                            ['订单号', data.orderId, 'orderId']
                        ];
                        break;
                    case 'fundingFee':
                        fields = [
                            ['合约交易对', data.pair],
                            ['资金费率', data.fundingRate],
                            ['收取/支付', data.amount],
                            ['结算时间', data.settleTime],
                            ['下次结算', data.nextSettleTime]
                        ];
                        break;
                    case 'marginLow':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['当前保证金率', data.currentMarginRate],
                            ['预警阈值', data.warnThreshold],
                            ['可用余额', data.availableBalance],
                            ['建议操作', data.suggestAction]
                        ];
                        break;
                    case 'liquidationRisk':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['杠杆', data.leverage],
                            ['当前保证金率', data.currentMarginRate],
                            ['预估强平价', data.liquidationPrice],
                            ['当前价格', data.currentPrice],
                            ['距离强平', data.distanceToLiq]
                        ];
                        break;
                    case 'liquidationComplete':
                        fields = [
                            ['合约交易对', data.pair],
                            ['方向', data.side],
                            ['强平价格', data.liquidationPrice],
                            ['强平数量', data.liqQty],
                            ['亏损金额', data.loss, 'loss'],
                            ['手续费', data.fee],
                            ['平仓时间', data.liqTime]
                        ];
                        break;
                    case 'walletConnect':
                        fields = [
                            ['钱包地址', data.address, 'address'],
                            ['网络', data.network],
                            ['DApp名称', data.dappName],
                            ['连接权限', data.perms],
                            ['连接时间', data.connectTime]
                        ];
                        break;
                    case 'walletAuthRisk':
                        fields = [
                            ['钱包地址', data.address, 'address'],
                            ['授权合约', data.contract, 'address'],
                            ['合约名称', data.contractName],
                            ['授权权限', data.perms],
                            ['网络', data.network],
                            ['授权时间', data.authTime],
                            ['风险提示', data.riskWarn]
                        ];
                        break;
                    case 'remoteLogin':
                        fields = [
                            ['登录地点', data.loginLocation],
                            ['IP地址', data.ip],
                            ['设备', data.device],
                            ['浏览器', data.browser],
                            ['登录时间', data.loginTime]
                        ];
                        break;
                    case 'newDeviceLogin':
                        fields = [
                            ['设备名称', data.deviceName],
                            ['IP地址', data.ip],
                            ['登录地点', data.loginLocation],
                            ['登录时间', data.loginTime]
                        ];
                        break;
                    case 'activityOnline':
                    case 'activityEnding':
                    case 'activityReward':
                        if (data.activityName) fields.push(['活动名称', data.activityName]);
                        if (data.activityTime) fields.push(['活动时间', data.activityTime]);
                        if (data.prizePool) fields.push(['总奖池', data.prizePool]);
                        if (data.signUpReward) fields.push(['报名奖励', data.signUpReward]);
                        if (data.remainTime) fields.push(['剩余时间', data.remainTime]);
                        if (data.currentRank) fields.push(['当前排名', data.currentRank]);
                        if (data.currentProfit) fields.push(['当前收益', data.currentProfit]);
                        if (data.rankGap) fields.push(['距离上一名', data.rankGap]);
                        if (data.rewardRank) fields.push(['获奖名次', data.rewardRank]);
                        if (data.rewardAmount) fields.push(['奖励金额', data.rewardAmount]);
                        if (data.releaseTime) fields.push(['发放时间', data.releaseTime]);
                        break;
                }
                
                if (fields.length > 0) {
                    businessCardHtml = `
                        <div class="business-card">
                            <div class="business-card-title">业务详情</div>
                            <div class="business-card-list">
                                ${fields.map(([label, value, type]) => {
                                    let val = value;
                                    let cls = '';
                                    if (type === 'hash' || type === 'address' || type === 'orderId') {
                                        val = type === 'address' ? formatAddress(value, 6, 4) : value;
                                        cls = type;
                                    }
                                    if (type === 'profit' && String(val).startsWith('+')) cls = 'profit';
                                    if (type === 'loss' && String(val).startsWith('-')) cls = 'loss';
                                    return `
                                        <div class="business-card-item">
                                            <span class="business-card-label">${label}</span>
                                            <span class="business-card-value ${cls}">${val}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            }
            
            detailContent.innerHTML = `
                <div class="detail-header-info">
                    <div class="detail-icon-big ${MSG_TYPES[msg.type].class}">${MSG_TYPES[msg.type].icon}</div>
                    <div class="detail-info">
                        <div class="detail-title">${msg.title}</div>
                        <div class="detail-tags">
                            <span class="detail-tag type">${MSG_TYPES[msg.type].label}</span>
                            ${PRIORITY_TAGS[msg.priority] ? `<span class="detail-tag ${PRIORITY_TAGS[msg.priority].class}">${PRIORITY_TAGS[msg.priority].label}</span>` : ''}
                            <span class="detail-tag read">${msg.read ? '已读' : '未读'}</span>
                        </div>
                        <div class="detail-time">${formatFullTime(msg.time)}</div>
                    </div>
                </div>
                <div class="detail-body">
                    ${msg.content.map(p => `<p>${p}</p>`).join('')}
                </div>
                ${businessCardHtml}
            `;
            
            const btnConfig = ACTION_BTN_CONFIG[msg.subtype];
            if (btnConfig) {
                detailFooter.style.display = 'flex';
                detailFooter.innerHTML = `
                    <button class="detail-footer-btn" onclick="copyContent()">复制内容</button>
                    <button class="detail-footer-btn primary" onclick="handleAction('${msg.subtype}')">${btnConfig.primary}</button>
                `;
            } else {
                detailFooter.style.display = 'flex';
                detailFooter.innerHTML = `
                    <button class="detail-footer-btn" onclick="copyContent()">复制内容</button>
                `;
            }
        }

        function copyContent() {
            const msg = state.messages.find(m => m.id === state.selectedMessageId);
            if (!msg) return;
            const text = `${msg.title}\n\n${msg.content.join('\n')}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            });
        }

        function handleAction(subtype) {
            const btnConfig = ACTION_BTN_CONFIG[subtype];
            if (btnConfig) {
                showToast(btnConfig.toast, 'success');
            }
        }

        function selectMessage(id) {
            state.selectedMessageId = id;
            renderMainList();
            renderDetail(id);
        }

        function markAsRead(id) {
            const msg = state.messages.find(m => m.id === id);
            if (msg && !msg.read) {
                msg.read = true;
                updateUnreadBadges();
                renderDropdownList();
                renderMainList();
            }
        }

        function showDeleteConfirm(id) {
            state.deleteTargetId = id;
            document.getElementById('deleteModal').classList.add('show');
        }

        function hideDeleteConfirm() {
            document.getElementById('deleteModal').classList.remove('show');
            state.deleteTargetId = null;
        }

        function deleteMessage(id) {
            const idx = state.messages.findIndex(m => m.id === id);
            if (idx > -1) {
                const wasUnread = !state.messages[idx].read;
                state.messages.splice(idx, 1);
                
                if (state.selectedMessageId === id) {
                    const list = getFilteredMessages();
                    if (list.length > 0) {
                        state.selectedMessageId = list[0].id;
                    } else {
                        state.selectedMessageId = null;
                    }
                    renderDetail(state.selectedMessageId);
                }
                
                updateUnreadBadges();
                renderDropdownList();
                renderMainList();
                showToast('消息已删除', 'success');
            }
        }

        function markAllAsReadConfirm() {
            const modal = document.getElementById('markAllReadModal');
            const desc = document.getElementById('markAllReadDesc');
            
            if (state.currentCategory === 'all') {
                desc.textContent = '确定要将所有消息标记为已读吗？';
            } else {
                desc.textContent = `确定要将「${CATEGORY_NAMES[state.currentCategory]}」分类下的所有消息标记为已读吗？`;
            }
            
            modal.classList.add('show');
        }

        function markAllAsRead() {
            let targetList = state.messages.filter(m => m.status !== 'expired' && m.status !== 'revoked');
            if (state.currentCategory !== 'all') {
                targetList = targetList.filter(m => m.type === state.currentCategory);
            }
            targetList.forEach(m => m.read = true);
            
            updateUnreadBadges();
            renderDropdownList();
            renderMainList();
            document.getElementById('markAllReadModal').classList.remove('show');
            showToast('已全部标记为已读', 'success');
        }

        function clearAllConfirm() {
            const modal = document.getElementById('clearAllModal');
            const desc = document.getElementById('clearAllDesc');
            
            if (state.currentCategory === 'all') {
                desc.textContent = '确定要清空所有消息吗？此操作不可撤销。';
            } else {
                desc.textContent = `确定要清空「${CATEGORY_NAMES[state.currentCategory]}」分类下的所有消息吗？此操作不可撤销。`;
            }
            
            modal.classList.add('show');
        }

        function clearAllMessages() {
            if (state.currentCategory === 'all') {
                state.messages = state.messages.filter(m => m.status === 'expired' || m.status === 'revoked');
            } else {
                state.messages = state.messages.filter(m => m.type !== state.currentCategory || m.status === 'expired' || m.status === 'revoked');
            }
            
            state.selectedMessageId = null;
            updateUnreadBadges();
            renderDropdownList();
            renderMainList();
            renderDetail(null);
            document.getElementById('clearAllModal').classList.remove('show');
            showToast('已清空消息', 'success');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastMessage');
            
            text.textContent = msg;
            icon.className = `toast-icon ${type}`;
            icon.innerHTML = type === 'success'
                ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>'
                : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function enterMainPage() {
            state.showMainContent = true;
            document.getElementById('messageDropdown').classList.remove('show');
            document.getElementById('overlayBg').classList.remove('show');
            document.getElementById('mainContent').classList.add('show');
            
            if (!state.selectedMessageId) {
                const list = getFilteredMessages();
                if (list.length > 0) {
                    state.selectedMessageId = list[0].id;
                    if (!list[0].read) list[0].read = true;
                    updateUnreadBadges();
                }
            }
            
            renderDropdownList();
            renderMainList();
            renderDetail(state.selectedMessageId);
        }

        function init() {
            updateUnreadBadges();
            renderDropdownList();
            
            document.getElementById('bellBtn').addEventListener('click', () => {
                const dropdown = document.getElementById('messageDropdown');
                const overlay = document.getElementById('overlayBg');
                if (dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                    overlay.classList.remove('show');
                } else {
                    dropdown.classList.add('show');
                    overlay.classList.add('show');
                }
            });
            
            document.getElementById('overlayBg').addEventListener('click', () => {
                document.getElementById('messageDropdown').classList.remove('show');
                document.getElementById('overlayBg').classList.remove('show');
            });
            
            document.getElementById('viewAllBtn').addEventListener('click', enterMainPage);
            
            document.getElementById('dropdownMarkRead').addEventListener('click', () => {
                markAllAsReadConfirm();
                document.getElementById('messageDropdown').classList.remove('show');
                document.getElementById('overlayBg').classList.remove('show');
            });
            
            document.querySelectorAll('.dropdown-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.dropdown-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.currentCategory = tab.dataset.tab;
                    state.currentAnnouncementSubCategory = 'all';
                    renderDropdownList();
                });
            });
            
            document.querySelectorAll('.category-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    state.currentCategory = item.dataset.category;
                    state.currentAnnouncementSubCategory = 'all';
                    state.currentPage = 1;
                    document.getElementById('listTitle').textContent = getListTitle();
                    document.getElementById('listUnreadCount').textContent = `${getUnreadCount(state.currentCategory)} 条未读`;
                    
                    const list = getFilteredMessages();
                    state.selectedMessageId = list.length > 0 ? list[0].id : null;
                    if (state.selectedMessageId) {
                        const msg = state.messages.find(m => m.id === state.selectedMessageId);
                        if (msg && !msg.read) {
                            msg.read = true;
                            updateUnreadBadges();
                        }
                    }
                    
                    renderMainList();
                    renderDetail(state.selectedMessageId);
                });
            });
            
            document.querySelectorAll('.announcement-subtab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.announcement-subtab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.currentAnnouncementSubCategory = btn.dataset.annSub;
                    state.currentPage = 1;
                    const list = getFilteredMessages();
                    state.selectedMessageId = list.length > 0 ? list[0].id : null;
                    if (state.selectedMessageId) {
                        const msg = state.messages.find(m => m.id === state.selectedMessageId);
                        if (msg && !msg.read) {
                            msg.read = true;
                            updateUnreadBadges();
                        }
                    }
                    renderMainList();
                    renderDetail(state.selectedMessageId);
                });
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.currentFilter = btn.dataset.filter;
                    state.currentPage = 1;
                    renderMainList();
                });
            });
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.searchQuery = e.target.value.trim();
                state.currentPage = 1;
                renderMainList();
            });
            
            document.getElementById('markAllReadBtn').addEventListener('click', markAllAsReadConfirm);
            document.getElementById('clearAllBtn').addEventListener('click', clearAllConfirm);
            document.getElementById('markAsReadBtn').addEventListener('click', () => {
                if (state.selectedMessageId) {
                    markAsRead(state.selectedMessageId);
                    renderDetail(state.selectedMessageId);
                }
            });
            document.getElementById('deleteMsgBtn').addEventListener('click', () => {
                if (state.selectedMessageId) {
                    showDeleteConfirm(state.selectedMessageId);
                }
            });
            
            document.getElementById('deleteCancel').addEventListener('click', hideDeleteConfirm);
            document.getElementById('deleteConfirm').addEventListener('click', () => {
                if (state.deleteTargetId) {
                    deleteMessage(state.deleteTargetId);
                }
                hideDeleteConfirm();
            });
            
            document.getElementById('markAllReadCancel').addEventListener('click', () => {
                document.getElementById('markAllReadModal').classList.remove('show');
            });
            document.getElementById('markAllReadConfirm').addEventListener('click', markAllAsRead);
            
            document.getElementById('clearAllCancel').addEventListener('click', () => {
                document.getElementById('clearAllModal').classList.remove('show');
            });
            document.getElementById('clearAllConfirm').addEventListener('click', clearAllMessages);
            
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('show');
                    }
                });
            });
        }

        init();
    </script>
</body>
</html>
