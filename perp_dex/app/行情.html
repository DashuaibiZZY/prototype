<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-active { color: #000; font-weight: 800; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2.5px; background: #000; border-radius: 2px; }

        /* 排序图标微调 */
        .sort-icon { display: flex; flex-direction: column; margin-left: 2px; line-height: 0; }
        .sort-arrow { width: 0; height: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; margin: 1px 0; }
        .arrow-up { border-bottom: 4px solid #D1D5DB; } /* 默认灰色 */
        .arrow-down { border-top: 4px solid #D1D5DB; }
        .arrow-active-up { border-bottom-color: #000; } /* 激活黑色 */
        .arrow-active-down { border-top-color: #000; }

        /* 網路異常橫幅 */
        .net-error-banner {
            background-color: #FEF2F2;
            color: #EF4444;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* 內置超時彈窗遮罩 */
        .error-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">

        <!-- 1. 頂部搜索框 -->
        <div class="px-5 pt-12 pb-4">
            <div class="relative bg-gray-100 rounded-full px-4 py-2 flex items-center">
                <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" placeholder="搜索交易對" class="bg-transparent border-none text-xs w-full focus:ring-0 outline-none placeholder-gray-400 font-medium">
            </div>
        </div>

        <!-- 2. 交易對 Tab 標籤 (支持橫向滾動) -->
        <div id="market-tabs" class="flex space-x-6 px-5 border-b border-gray-50 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="switchMarketTab('fav')" id="tab-fav" class="tab-active pb-2 text-[13px]">自選</button>
            <button onclick="switchMarketTab('hot')" id="tab-hot" class="text-gray-400 pb-2 text-[13px] font-bold">熱門</button>
            <button onclick="switchMarketTab('new')" id="tab-new" class="text-gray-400 pb-2 text-[13px] font-bold">新幣</button>
            <button onclick="switchMarketTab('tradefi')" id="tab-tradefi" class="text-gray-400 pb-2 text-[13px] font-bold">TradeFi</button>
            <button onclick="switchMarketTab('main')" id="tab-main" class="text-gray-400 pb-2 text-[13px] font-bold">主流幣</button>
            <button onclick="switchMarketTab('ai')" id="tab-ai" class="text-gray-400 pb-2 text-[13px] font-bold">AI</button>
        </div>

        <!-- 3. 表頭字段 (帶排序按鈕) -->
        <div class="flex justify-between items-center px-5 py-3 text-[10px] text-gray-400 font-bold uppercase tracking-wider relative">
            <button class="flex items-center w-1/3 text-left">
                <span>名稱 / 成交額</span>
                <div class="sort-icon"><div class="sort-arrow arrow-up"></div><div class="sort-arrow arrow-down"></div></div>
            </button>

            <button class="flex items-center justify-end flex-1 pr-6">
                <span>最新價</span>
                <div class="sort-icon"><div class="sort-arrow arrow-up"></div><div class="sort-arrow arrow-down"></div></div>
            </button>

            <div class="flex items-center justify-end w-20 space-x-2">
                <span>今日漲跌</span>
                <div class="sort-icon"><div class="sort-arrow arrow-up"></div><div class="sort-arrow arrow-down"></div></div>

                <!-- 【新增】編輯自選按鈕：僅在自選 Tab 顯示 -->
                <a href="编辑自选.html" id="edit-fav-btn" class="inline-block ml-1">
                    <svg class="w-3.5 h-3.5 text-gray-400 hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </a>
            </div>
        </div>

        <!-- 4. 列表信息內容 -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-5">
            <div id="content-list" class="space-y-4 pb-20">
                <!-- Item 1 (使用您提供的結構) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">SOLUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">1.2億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">145.82</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +5.42%
                    </div>
                </a>

                <!-- Item 2 (使用您提供的結構) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">PEPEUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">8,500萬 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">0.0000082</p>
                    </div>
                    <div class="bg-red-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-red-500/20">
                        -12.4%
                    </div>
                </a>

                <!-- 額外 Item 3 (演示排序或長列表) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">BTCUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">42.5億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">64,120.50</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +0.85%
                    </div>
                </a>

                <!-- 額外 Item 4 -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">ETHUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">18.2億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">3,450.12</p>
                    </div>
                    <div class="bg-red-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-red-500/20">
                        -2.15%
                    </div>
                </a>

                <!-- 額外 Item 5 -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">WIFUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">4,200萬 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">2.8415</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +15.20%
                    </div>
                </a>
            </div>

            <!-- 行情異常顯示 (採用卡券中心同款設計) -->
            <div id="market-error-view" class="hidden flex-1 flex flex-col items-center justify-center px-10 text-center pt-32">
                <!-- 插圖容器 -->
                <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-red-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <p class="text-sm font-black text-gray-900 uppercase tracking-tighter">數據加載失敗</p>
                <p class="text-xs text-gray-400 mt-2 font-medium">請檢查您的網路連接並重試</p>

                <!-- 黑色實心按鈕 -->
                <button onclick="location.reload()" class="mt-8 px-10 py-3 bg-black text-white rounded-full text-[11px] font-black uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                    重新加載
                </button>
            </div>
        </div>

        <!-- 5. 底部導航欄 (與首頁保持一致) -->
        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-4 pt-2 pb-8 flex justify-between items-center shrink-0">
            <a href="首页.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-bold">首頁</span>
            </div></a>
            <a href="行情.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-black">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[10px] font-bold">行情</span>
            </div>
            </a>
            <a href="合约交易.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <div class="bg-black rounded-lg p-1.5 -mt-6 shadow-lg shadow-black/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="text-[10px] pt-1">永續合約</span>
            </div></a>
            <a href="奖励.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                <span class="text-[10px]">獎勵</span>
            </div></a>
            <a href="我的.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px]">我的</span>
            </div></a>
        </nav>

        <!-- 超時彈窗 -->
        <div id="modal-timeout" class="hidden error-modal-overlay">
            <div class="bg-white w-[280px] rounded-3xl p-6 shadow-2xl animate-in zoom-in duration-200 text-center">
                <h3 class="text-base font-black mb-2">請求超時</h3>
                <p class="text-xs text-gray-500 leading-relaxed mb-6">請求數據失敗，請檢查網路狀態並重試</p>
                <button onclick="closeTimeoutModal()" class="w-full py-3 bg-black text-white rounded-xl text-xs font-black uppercase active:scale-95 transition-transform">好的</button>
            </div>
        </div>
    </div>
</div>

<!-- 外部懸浮按鈕 -->
<div class="fixed bottom-10 right-10">
    <button onclick="toggleNetworkError()" class="bg-red-600 text-white px-6 py-3 rounded-full text-xs font-black shadow-2xl hover:bg-red-700 transition-all uppercase italic tracking-widest">
        模拟网络异常
    </button>
</div>

<script>
    const marketData = {
        fav: [
            { name: 'BTCUSDT', vol: '42.5億', price: '64,120.50', change: '+1.24%', up: true },
            { name: 'ETHUSDT', vol: '18.2億', price: '3,450.12', change: '-2.15%', up: false }
        ],
        hot: [
            { name: 'SOLUSDT', vol: '1.2億', price: '145.82', change: '+5.42%', up: true },
            { name: 'PEPEUSDT', vol: '8,500萬', price: '0.0000082', change: '-12.4%', up: false }
        ],
        new: [{ name: 'NOTUSDT', vol: '5,500萬', price: '0.0142', change: '+45.2%', up: true }],
        tradefi: [{ name: 'ONDOUSDT', vol: '2,200萬', price: '1.24', change: '+5.1%', up: true }],
        main: [{ name: 'BNBUSDT', vol: '1.5億', price: '592.1', change: '+0.5%', up: true }],
        ai: [{ name: 'RNDRUSDT', vol: '3,200萬', price: '10.24', change: '-3.2%', up: false }]
    };

    function switchMarketTab(tab) {
        //if (isNetError) return; // 網路異常時禁止切換 Tab
        const tabs = ['fav', 'hot', 'new', 'tradefi', 'main', 'ai'];
        const listContainer = document.getElementById('content-list');
        const editBtn = document.getElementById('edit-fav-btn');

        // 1. 切換 Tab 樣式
        tabs.forEach(t => {
            const el = document.getElementById('tab-' + t);
            if (t === tab) {
                el.className = "tab-active pb-2 text-[13px]";
            } else {
                el.className = "text-gray-400 pb-2 text-[13px] font-bold";
            }
        });

        // 2. 顯示/隱藏編輯按鈕
        editBtn.style.display = (tab === 'fav') ? 'block' : 'none';

        // 3. 渲染數據
        const data = marketData[tab] || [];
        listContainer.innerHTML = data.map(item => `
        <a href="行情详情.html" class="flex justify-between items-center py-1 fade-in">
            <div>
                <p class="font-black text-sm text-gray-900">${item.name}</p>
                <p class="text-[10px] text-gray-400 font-medium">${item.vol} USDT</p>
            </div>
            <div class="text-right flex-1 pr-6">
                <p class="font-bold text-sm text-gray-900">${item.price}</p>
            </div>
            <div class="${item.up ? 'bg-green-500' : 'bg-red-500'} text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm">
                ${item.change}
            </div>
        </a>
    `).join('');
    }

    // 初始加載
    switchMarketTab('fav');

    let isNetError = false;

    function toggleNetworkError() {
        isNetError = !isNetError;

        const listContent = document.getElementById('content-list');
        const errorView = document.getElementById('market-error-view');
        const timeoutModal = document.getElementById('modal-timeout');
        const tabContainer = document.getElementById('market-tabs'); // Tab標籤容器

        if (isNetError) {
            // 1. 隱藏正常列表與Tab
            listContent.classList.add('hidden');
            if(tabContainer) tabContainer.classList.add('opacity-20', 'pointer-events-none');

            // 2. 顯示新版錯誤視圖
            errorView.classList.remove('hidden');

            // 3. 彈出超時通知
            timeoutModal.classList.remove('hidden');
        } else {
            // 恢復正常
            errorView.classList.add('hidden');
            listContent.classList.remove('hidden');
            if(tabContainer) tabContainer.classList.remove('opacity-20', 'pointer-events-none');
            timeoutModal.classList.add('hidden');
            switchMarketTab('fav');
        }
    }

    function closeTimeoutModal() {
        document.getElementById('modal-timeout').classList.add('hidden');
    }
</script>

</body>
</html>
