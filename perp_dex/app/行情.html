<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-active { color: #000; font-weight: 800; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2.5px; background: #000; border-radius: 2px; }

        /* 排序图标微调 */
        .sort-icon { display: flex; flex-direction: column; margin-left: 2px; line-height: 0; }
        .sort-arrow { width: 0; height: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; margin: 1px 0; }
        .arrow-up { border-bottom: 4px solid #D1D5DB; } /* 默认灰色 */
        .arrow-down { border-top: 4px solid #D1D5DB; }
        .arrow-active-up { border-bottom-color: #000; } /* 激活黑色 */
        .arrow-active-down { border-top-color: #000; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">

        <!-- 1. 頂部搜索框 -->
        <div class="px-5 pt-12 pb-4">
            <div class="relative bg-gray-100 rounded-full px-4 py-2 flex items-center">
                <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" placeholder="搜索交易對" class="bg-transparent border-none text-xs w-full focus:ring-0 outline-none placeholder-gray-400 font-medium">
            </div>
        </div>

        <!-- 2. 交易對 Tab 標籤 (支持橫向滾動) -->
        <div class="flex space-x-6 px-5 border-b border-gray-50 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button class="text-gray-400 pb-2 text-[13px] font-bold">自選</button>
            <button class="tab-active pb-2 text-[13px]">熱門</button>
            <button class="text-gray-400 pb-2 text-[13px] font-bold">新幣</button>
            <button class="text-gray-400 pb-2 text-[13px] font-bold">TradeFi</button>
            <button class="text-gray-400 pb-2 text-[13px] font-bold">主流幣</button>
            <button class="text-gray-400 pb-2 text-[13px] font-bold">AI</button>
        </div>

        <!-- 3. 表頭字段 (帶排序按鈕) -->
        <div class="flex justify-between items-center px-5 py-3 text-[10px] text-gray-400 font-bold uppercase tracking-wider">
            <!-- 名稱/成交額 -->
            <button class="flex items-center w-1/3 text-left">
                <span>名稱 / 成交額</span>
                <div class="sort-icon">
                    <div class="sort-arrow arrow-up"></div>
                    <div class="sort-arrow arrow-down"></div>
                </div>
            </button>

            <!-- 最新價 -->
            <button class="flex items-center justify-end flex-1 pr-6">
                <span>最新價</span>
                <div class="sort-icon">
                    <div class="sort-arrow arrow-up"></div>
                    <div class="sort-arrow arrow-down"></div>
                </div>
            </button>

            <!-- 今日漲跌 -->
            <button class="flex items-center justify-end w-20">
                <span>今日漲跌</span>
                <div class="sort-icon">
                    <div class="sort-arrow arrow-up"></div>
                    <div class="sort-arrow arrow-down"></div>
                </div>
            </button>
        </div>

        <!-- 4. 列表信息內容 -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-5">
            <div id="content-list" class="space-y-4 pb-20">
                <!-- Item 1 (使用您提供的結構) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">SOLUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">1.2億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">145.82</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +5.42%
                    </div>
                </a>

                <!-- Item 2 (使用您提供的結構) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">PEPEUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">8,500萬 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">0.0000082</p>
                    </div>
                    <div class="bg-red-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-red-500/20">
                        -12.4%
                    </div>
                </a>

                <!-- 額外 Item 3 (演示排序或長列表) -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">BTCUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">42.5億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">64,120.50</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +0.85%
                    </div>
                </a>

                <!-- 額外 Item 4 -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">ETHUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">18.2億 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">3,450.12</p>
                    </div>
                    <div class="bg-red-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-red-500/20">
                        -2.15%
                    </div>
                </a>

                <!-- 額外 Item 5 -->
                <a href="行情详情.html" class="flex justify-between items-center py-1">
                    <div>
                        <p class="font-black text-sm text-gray-900">WIFUSDT</p>
                        <p class="text-[10px] text-gray-400 font-medium">4,200萬 USDT</p>
                    </div>
                    <div class="text-right flex-1 pr-6">
                        <p class="font-bold text-sm text-gray-900">2.8415</p>
                    </div>
                    <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg shadow-sm shadow-green-500/20">
                        +15.20%
                    </div>
                </a>
            </div>
        </div>

        <!-- 5. 底部導航欄 (與首頁保持一致) -->
        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-4 pt-2 pb-8 flex justify-between items-center shrink-0">
            <a href="首页.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-bold">首頁</span>
            </div></a>
            <a href="行情.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-black">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[10px] font-bold">行情</span>
            </div>
            </a>
            <a href="合约交易.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <div class="bg-black rounded-lg p-1.5 -mt-6 shadow-lg shadow-black/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="text-[10px] pt-1">永續合約</span>
            </div></a>
            <a href="奖励.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                <span class="text-[10px]">獎勵</span>
            </div></a>
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px]">我的</span>
            </div>
        </nav>

    </div>
</div>

</body>
</html>
