<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX APP Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-h-screen; margin: 0; }

        /* 手机模型外壳 */
        .phone-shell {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 4px solid #333;
        }

        /* 屏幕容器 */
        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-active { color: #000; font-weight: 800; border-bottom: 2px solid #000; }

        /* 动画 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<!-- 模拟手机 -->
<div class="phone-shell">
    <div class="screen" id="app-content">

        <!-- 1. 开屏页 (Splash Screen) -->
        <div id="page-splash" class="absolute inset-0 z-50 bg-white flex flex-col items-center justify-center">
            <div class="w-20 h-20 bg-black rounded-2xl flex items-center justify-center mb-4">
                <span class="text-white text-4xl font-black italic">F</span>
            </div>
            <h1 class="text-2xl font-black tracking-tighter">ForX</h1>
            <p class="text-gray-400 text-xs mt-2">Next-Gen Perp DEX</p>
        </div>

        <!-- 2. APP 首页 (Main Home) -->
        <div id="page-home" class="hidden flex flex-col h-full fade-in">
            <!-- 顶部导航栏 -->
            <header class="flex justify-between items-center px-6 pt-12 pb-4 shrink-0">
                <button class="p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 class="font-black text-lg">ForX</h2>
                <button class="p-1 relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
            </header>

            <!-- 滚动区域 -->
            <div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-20">

                <!-- 登录状态区分区域 -->
                <section id="hero-section" class="mb-6">
                    <!-- 未登录状态 -->
                    <div id="status-logged-out" class="bg-gray-900 rounded-2xl p-6 text-white relative overflow-hidden">
                        <div class="relative z-10">
                            <h3 class="text-xl font-black mb-2 leading-tight">新人啟航禮：<br>100 積分福利限時放送</h3>
                            <p class="text-xs text-gray-400 mb-4 font-mono">獎勵失效倒計時：<span class="text-yellow-400">47:42:53</span></p>
                            <button class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold">立即領取</button>
                        </div>
                        <!-- 装饰背景图标 -->
                        <div class="absolute -right-4 -bottom-4 opacity-20">
                            <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 12h3v9h6v-6h4v6h6v-9h3L12 2z"/></svg>
                        </div>
                    </div>

                    <!-- 登录状态：优化后的紧凑版 -->
                    <div id="status-logged-in" class="hidden bg-black rounded-xl p-4 text-white">
                        <div class="flex justify-between items-center">
                            <!-- 左侧：权益信息 -->
                            <div class="space-y-1">
                                <!-- 标题与眼睛 -->
                                <div class="flex items-center space-x-2 text-gray-400">
                                    <span class="text-[10px] uppercase font-bold tracking-wider">賬戶總權益 (USDT)</span>
                                    <button onclick="toggleEye()" class="focus:outline-none">
                                        <svg id="eye-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                    </button>
                                </div>
                                <!-- 权益金额 (独占一行) -->
                                <div id="asset-amount" class="text-2xl font-black leading-tight">12,450.82</div>
                                <!-- 今日盈亏 (金额底下) -->
                                <div class="text-[11px] font-bold text-green-400">
                                    +$420.15 <span class="ml-1 opacity-90">+3.42%</span>
                                </div>
                            </div>
                            <!-- 右侧：充值按钮 -->
                            <button class="bg-yellow-400 text-black px-4 py-1.5 rounded-lg text-[11px] font-bold shadow-lg shadow-yellow-400/20">充值</button>
                        </div>
                    </div>
                </section>

                <!-- Banner 轮播图感 -->
                <section class="mb-6">
                    <div class="relative overflow-hidden">
                        <!-- Banner 卡片 -->
                        <div class="flex space-x-3">
                            <div class="min-w-full h-24 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-4 text-white flex items-center justify-between shadow-sm">
                                <div>
                                    <p class="font-bold">ForX 交易大賽</p>
                                    <p class="text-[10px] opacity-80">贏取最高 50,000 USDT 獎池</p>
                                </div>
                                <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                </div>
                            </div>
                        </div>

                        <!-- 轮播指示器（小圆点） -->
                        <div class="flex justify-center space-x-1.5 mt-2.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-black"></div> <!-- 激活态 -->
                            <div class="w-1.5 h-1.5 rounded-full bg-gray-200"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-gray-200"></div>
                        </div>
                    </div>
                </section>

                <!-- 行情列表区域 -->
                <!-- 行情列表区域 -->
                <section>
                    <!-- Tabs：增加 id 和 onclick -->
                    <div class="flex space-x-6 border-b border-gray-100 mb-4 no-scrollbar overflow-x-auto whitespace-nowrap">
                        <button onclick="switchMarketTab('fav')" id="tab-fav" class="tab-active pb-2 text-[13px] transition-all">收藏</button>
                        <button onclick="switchMarketTab('hot')" id="tab-hot" class="text-gray-400 pb-2 text-[13px] transition-all">熱門</button>
                        <button onclick="switchMarketTab('hot')" class="text-gray-400 pb-2 text-[13px]">漲幅榜</button>
                        <button onclick="switchMarketTab('hot')" class="text-gray-400 pb-2 text-[13px]">跌幅榜</button>
                    </div>

                    <!-- 容器1：收藏卡片展示 (默认显示) -->
                    <div id="content-fav" class="grid grid-cols-2 gap-3 mb-6">
                        <div class="border border-gray-100 rounded-xl p-3 flex flex-col justify-between relative shadow-sm">
                            <div class="flex justify-between items-start">
                                <span class="font-black text-sm">BTCUSDT</span>
                                <input type="checkbox" checked class="accent-black">
                            </div>
                            <div class="mt-4">
                                <p class="text-lg font-black leading-none">64,231.5</p>
                                <p class="text-green-500 text-[10px] font-bold mt-1">+1.24%</p>
                            </div>
                        </div>
                        <div class="border border-gray-100 rounded-xl p-3 flex flex-col justify-between relative shadow-sm">
                            <div class="flex justify-between items-start">
                                <span class="font-black text-sm">ETHUSDT</span>
                                <input type="checkbox" checked class="accent-black">
                            </div>
                            <div class="mt-4">
                                <p class="text-lg font-black leading-none">3,452.1</p>
                                <p class="text-red-500 text-[10px] font-bold mt-1">-0.82%</p>
                            </div>
                        </div>
                    </div>

                    <!-- 容器2：列表内容 (默认隐藏) -->
                    <div id="content-list" class="hidden space-y-4">
                        <!-- Item 1 -->
                        <div class="flex justify-between items-center py-1">
                            <div>
                                <p class="font-black text-sm">SOLUSDT</p>
                                <p class="text-[10px] text-gray-400">1.2億 USDT</p>
                            </div>
                            <div class="text-right flex-1 pr-6">
                                <p class="font-bold text-sm">145.82</p>
                            </div>
                            <div class="bg-green-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg">
                                +5.42%
                            </div>
                        </div>
                        <!-- Item 2 -->
                        <div class="flex justify-between items-center py-1">
                            <div>
                                <p class="font-black text-sm">PEPEUSDT</p>
                                <p class="text-[10px] text-gray-400">8,500萬 USDT</p>
                            </div>
                            <div class="text-right flex-1 pr-6">
                                <p class="font-bold text-sm">0.0000082</p>
                            </div>
                            <div class="bg-red-500 text-white text-[11px] font-bold py-1.5 w-20 text-center rounded-lg">
                                -12.4%
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 底部导航栏 (Tab Bar) -->
            <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-4 pt-2 pb-8 flex justify-between items-center shrink-0">
                <div class="flex flex-col items-center space-y-1 px-3">
                    <svg class="w-6 h-6 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span class="text-[10px] font-bold">首頁</span>
                </div>
                <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    <span class="text-[10px]">行情</span>
                </div>
                <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                    <div class="bg-black rounded-lg p-1.5 -mt-6 shadow-lg shadow-black/20">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                    <span class="text-[10px] pt-1">永續合約</span>
                </div>
                <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                    <span class="text-[10px]">獎勵</span>
                </div>
                <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="text-[10px]">我的</span>
                </div>
            </nav>
        </div>
    </div>
</div>

<!-- 控制悬浮按钮 -->
<div class="fixed bottom-10 right-10 space-y-4">
    <button onclick="simulateSplash()" class="block bg-gray-800 text-white px-4 py-2 rounded-full text-xs shadow-xl">重置开屏动画</button>
    <button id="toggle-login" class="block bg-blue-600 text-white px-4 py-2 rounded-full text-xs shadow-xl font-bold">切换登录状态</button>
</div>

<script>
    // 1. 开屏逻辑
    setTimeout(() => {
        simulateSplash();
    }, 500);

    function simulateSplash() {
        document.getElementById('page-splash').classList.remove('hidden');
        document.getElementById('page-home').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('page-splash').classList.add('hidden');
            document.getElementById('page-home').classList.remove('hidden');
        }, 1500);
    }

    // 2. 登录状态切换逻辑
    let isLoggedIn = false;
    document.getElementById('toggle-login').addEventListener('click', () => {
        isLoggedIn = !isLoggedIn;
        const loggedOutEl = document.getElementById('status-logged-out');
        const loggedInEl = document.getElementById('status-logged-in');

        if(isLoggedIn) {
            loggedOutEl.classList.add('hidden');
            loggedInEl.classList.remove('hidden');
            document.getElementById('toggle-login').innerText = "切换为：未登录";
        } else {
            loggedOutEl.classList.remove('hidden');
            loggedInEl.classList.add('hidden');
            document.getElementById('toggle-login').innerText = "切换为：已登录";
        }
    });

    // 3. 资产隐藏/显示
    let isHidden = false;
    const realAmount = "12,450.82";
    function toggleEye() {
        isHidden = !isHidden;
        const amountEl = document.getElementById('asset-amount');
        const eyeIcon = document.getElementById('eye-icon');

        if(isHidden) {
            amountEl.innerText = "******";
            eyeIcon.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>`;
        } else {
            amountEl.innerText = realAmount;
            eyeIcon.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
        }
    }

    // 行情 Tab 切换逻辑
    function switchMarketTab(tab) {
        const favTab = document.getElementById('tab-fav');
        const hotTab = document.getElementById('tab-hot');
        const favContent = document.getElementById('content-fav');
        const listContent = document.getElementById('content-list');

        if (tab === 'fav') {
            // 激活收藏 Tab
            favTab.className = "tab-active pb-2 text-[13px] transition-all";
            hotTab.className = "text-gray-400 pb-2 text-[13px] transition-all";
            // 显示卡片，隐藏列表
            favContent.classList.remove('hidden');
            listContent.classList.add('hidden');
        } else {
            // 激活热门 Tab
            hotTab.className = "tab-active pb-2 text-[13px] transition-all";
            favTab.className = "text-gray-400 pb-2 text-[13px] transition-all";
            // 隐藏卡片，显示列表
            favContent.classList.add('hidden');
            listContent.classList.remove('hidden');
        }
    }
</script>

</body>
</html>
