<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ForX 消息中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #12182a;
            --bg-card: #1a2035;
            --bg-card-hover: #222a42;
            --text-primary: #ffffff;
            --text-secondary: #8a94a6;
            --text-muted: #5a6275;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
            --border-color: #2a3148;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-primary);
            position: relative;
        }

        /* 首页顶部导航 */
        .home-header {
            background: linear-gradient(180deg, #0f1524 0%, var(--bg-primary) 100%);
            padding: 12px 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .home-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .search-box {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .search-box svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        .bell-btn {
            position: relative;
            width: 40px;
            height: 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bell-btn:active {
            transform: scale(0.95);
            background: var(--bg-card);
        }

        .bell-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }

        .bell-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--bg-primary);
        }

        .bell-badge.show {
            display: flex;
            animation: badgePulse 0.3s ease;
        }

        @keyframes badgePulse {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 首页占位内容 */
        .home-content {
            padding: 20px 16px;
        }

        .home-placeholder {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .home-placeholder-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-placeholder-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .home-placeholder h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .home-placeholder p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 消息中心页面 */
        .message-center {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .message-center.active {
            display: block;
        }

        .mc-header {
            background: linear-gradient(180deg, #0f1524 0%, var(--bg-primary) 100%);
            padding: 12px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mc-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: var(--bg-card);
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
            color: var(--text-primary);
        }

        .mc-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            padding-right: 36px;
        }

        .mark-all-btn {
            font-size: 13px;
            color: var(--accent-blue);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .mark-all-btn:active {
            background: var(--bg-card);
        }

        .mark-all-btn.disabled {
            color: var(--text-muted);
            pointer-events: none;
        }

        .unread-summary {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .unread-summary.all-read {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .unread-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .unread-summary.all-read .unread-icon {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
        }

        .unread-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .unread-text {
            flex: 1;
        }

        .unread-text .count {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .unread-summary.all-read .unread-text .count {
            color: var(--accent-green);
        }

        .unread-text .label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Tab 栏 */
        .tabs-container {
            background: var(--bg-primary);
            position: sticky;
            top: 100px;
            z-index: 99;
            border-bottom: 1px solid var(--border-color);
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 0 12px;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex-shrink: 0;
            padding: 14px 12px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 2px;
        }

        .tab .tab-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            background: var(--bg-card);
            border-radius: 9px;
            font-size: 11px;
            margin-left: 4px;
            padding: 0 5px;
        }

        .tab.active .tab-count {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
        }

        /* 消息列表 */
        .message-list {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 20px));
        }

        .message-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 16px;
            padding-left: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .message-card:active {
            transform: scale(0.98);
            background: var(--bg-card-hover);
        }

        .message-card.unread {
            border-color: rgba(59, 130, 246, 0.2);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.05) 100%);
        }

        .message-card.unread .msg-title {
            font-weight: 700;
        }

        .message-card.read {
            opacity: 0.65;
        }

        .message-card.p0 {
            border-color: rgba(239, 68, 68, 0.3);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.12) 0%, rgba(139, 92, 246, 0.05) 100%);
        }

        .message-card.p0.unread {
            animation: p0Glow 2s ease-in-out infinite;
        }

        @keyframes p0Glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
            50% { box-shadow: 0 0 20px 0 rgba(239, 68, 68, 0.2); }
        }

        .message-card.p0::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent-red) 0%, #dc2626 100%);
        }

        .message-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .msg-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .msg-icon svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .msg-icon.system { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
        .msg-icon.asset { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .msg-icon.contract { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .msg-icon.risk { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .msg-icon.security { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .msg-icon.activity { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .msg-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .msg-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .msg-tag.risk {
            background: rgba(239, 68, 68, 0.25);
            color: #ff6b6b;
        }

        .msg-tag.priority {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-orange);
        }

        .msg-tag.category {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .msg-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .msg-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .msg-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .message-card.unread .unread-dot {
            display: block;
        }

        .message-card:not(.unread) .unread-dot {
            display: none;
        }

        /* 空状态 */
        .empty-state {
            display: none;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state.show {
            display: block;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
        }

        .empty-icon.success svg {
            color: var(--accent-green);
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 消息详情页 */
        .message-detail {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .message-detail.active {
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            background: linear-gradient(180deg, #0f1524 0%, var(--bg-primary) 100%);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0));
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .detail-back:active {
            background: var(--bg-card);
        }

        .detail-back svg {
            width: 22px;
            height: 22px;
            color: var(--text-primary);
        }

        .detail-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
        }

        .detail-actions {
            display: flex;
            gap: 4px;
        }

        .detail-action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .detail-action-btn:active {
            background: var(--bg-card);
        }

        .detail-action-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: 100px;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .detail-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .detail-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .detail-meta-info {
            flex: 1;
            min-width: 0;
        }

        .detail-meta-info h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .detail-meta-info .time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .detail-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--accent-green);
            margin-top: 4px;
        }

        .detail-status.unread {
            color: var(--accent-blue);
        }

        /* 详情信息卡片 */
        .detail-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .detail-card-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .detail-card-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-card-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .detail-card-row:first-child {
            padding-top: 0;
        }

        .detail-card-label {
            font-size: 13px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .detail-card-value {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            word-break: break-all;
            margin-left: 12px;
        }

        .detail-card-value.highlight {
            color: var(--accent-blue);
        }

        .detail-card-value.danger {
            color: var(--accent-red);
        }

        .detail-card-value.success {
            color: var(--accent-green);
        }

        .detail-card-value.mono {
            font-family: monospace;
            font-size: 12px;
        }

        /* 详情正文 */
        .detail-content-text {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .detail-content-text p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .detail-content-text p:last-child {
            margin-bottom: 0;
        }

        .detail-content-text p.key-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* 风险提示卡片 */
        .risk-alert-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .risk-alert-card .alert-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-red);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .risk-alert-card .alert-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .risk-alert-card .alert-label {
            color: var(--text-secondary);
        }

        .risk-alert-card .alert-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .risk-alert-card .alert-value.danger {
            color: var(--accent-red);
            font-weight: 700;
        }

        /* 底部固定按钮 */
        .detail-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 375px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 12px));
            z-index: 100;
        }

        .detail-action-btn-text {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .detail-action-btn-text:active {
            opacity: 0.85;
        }

        .detail-action-btn-text.secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .detail-action-btn-text.danger {
            background: var(--accent-red);
        }

        /* 异常状态页 */
        .error-state {
            display: none;
            padding: 60px 20px;
            text-align: center;
        }

        .error-state.show {
            display: block;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon svg {
            width: 40px;
            height: 40px;
            color: var(--accent-red);
        }

        .error-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--accent-red);
        }

        .error-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px 20px 0px 0;
            width: 100%;
            max-width: 375px;
            padding: 24px 20px;

            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            border: none;
        }

        .modal-btn.cancel {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .modal-btn.cancel:active {
            background: var(--bg-card-hover);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
        }

        .modal-btn.confirm:active {
            opacity: 0.9;
        }

        .modal-btn.danger {
            background: var(--accent-red);
            color: white;
        }

        /* Action Sheet */
        .action-sheet {
            padding: 16px 0;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 16px));
        }

        .action-sheet-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 0;
        }

        .action-sheet-item:active {
            background: var(--bg-card);
        }

        .action-sheet-item svg {
            width: 20px;
            height: 20px;
        }

        .action-sheet-item.primary {
            color: var(--accent-blue);
        }

        .action-sheet-item.danger {
            color: var(--accent-red);
        }

        .action-sheet-item.cancel {
            color: var(--text-primary);
            font-weight: 600;
            margin-top: 8px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-left: 16px;
            margin-right: 16px;
        }

        .action-sheet-item + .action-sheet-item {
            border-top: 1px solid var(--border-color);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast.success svg {
            color: var(--accent-green);
        }

        .toast.error {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .toast.error svg {
            color: var(--accent-red);
        }

        .toast.info {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .toast.info svg {
            color: var(--accent-blue);
        }

        .toast svg {
            width: 18px;
            height: 18px;
        }

        /* 首页隐藏 */
        .home-page.hidden {
            display: none;
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-in {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        }

        /* 箭头图标 */

        // 渲染 Tab
        function renderTabs() {
            const counts = {};
            categories.forEach(cat => {
                if (cat.id === 'all') {
                    counts[cat.id] = messages.filter(m => m.unread && !m.hidden).length;
                } else {
                    counts[cat.id] = messages.filter(m => m.category === cat.name && m.unread && !m.hidden).length;
                }
            });

            tabs.innerHTML = categories.map(cat => `
                <div class="tab ${cat.id === currentTab ? 'active' : ''}" data-tab="${cat.id}">
                    ${cat.name}
                    ${counts[cat.id] > 0 ? `<span class="tab-count">${counts[cat.id] > 99 ? '99+' : counts[cat.id]}</span>` : ''}
                </div>
            `).join('');

            tabs.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    renderTabs();
                    renderMessages();
                    updateMarkAllBtn();
                });
            });
        }

        // 更新全部已读按钮状态
        function updateMarkAllBtn() {
            const currentUnread = getCurrentCategoryUnreadCount();
            if (currentUnread === 0) {
                markAllBtn.classList.add('disabled');
            } else {
                markAllBtn.classList.remove('disabled');
            }
        }

        // 获取当前分类未读数
        function getCurrentCategoryUnreadCount() {
            if (currentTab === 'all') {
                return messages.filter(m => m.unread && !m.hidden).length;
            } else {
                const catName = categories.find(c => c.id === currentTab).name;
                return messages.filter(m => m.category === catName && m.unread && !m.hidden).length;
            }
        }

        // 渲染消息列表
        function renderMessages() {
            let filtered = messages.filter(m => !m.hidden);
            if (currentTab !== 'all') {
                const catName = categories.find(c => c.id === currentTab).name;
                filtered = filtered.filter(m => m.category === catName);
            }

            // 排序
            filtered = filtered.sort((a, b) => {
                if (a.unread !== b.unread) return b.unread - a.unread;
                if (a.priority !== b.priority) return a.priority - b.priority;
                return b.id - a.id;
            });

            const currentUnread = getCurrentCategoryUnreadCount();

            if (filtered.length === 0) {
                messageList.innerHTML = '';
                emptyState.classList.add('show');
                emptyIcon.classList.remove('success');
                emptyTitle.textContent = '暂无消息';
                emptyDesc.textContent = '当前分类下没有消息';
            } else {
                emptyState.classList.remove('show');
                messageList.innerHTML = filtered.map(msg => createMessageCard(msg)).join('');
                bindMessageCardEvents();
            }

            updateUnreadSummary();
        }

        // 创建消息卡片 HTML
        function createMessageCard(msg) {
            const isP0 = msg.priority === 0;

            return `
                <div class="message-card ${msg.unread ? 'unread' : 'read'} ${isP0 ? 'p0' : ''}" data-id="${msg.id}">
                    <div class="message-card-header">
                        <div class="msg-icon ${msg.type}">
                            ${icons[msg.type]}
                        </div>
                        <div class="msg-content">
                            <div class="msg-title">
                                ${escapeHtml(msg.title)}
                                <div class="msg-tags">
                                    ${isP0 && msg.unread ? '<span class="msg-tag risk">风险</span>' : ''}
                                    ${msg.priority === 1 && msg.unread ? '<span class="msg-tag priority">重要</span>' : ''}
                                </div>
                            </div>
                            <div class="msg-summary">${escapeHtml(msg.summary)}</div>
                            <div class="msg-footer">
                                <span class="msg-time">${msg.time}</span>
                                <div style="display: flex; align-items: center; gap: 8px;">

                                    <span class="msg-arrow">›</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化钱包地址
        function formatAddress(address) {
            if (!address) return '';
            if (address.length <= 12) return address;
            return address.slice(0, 6) + '...' + address.slice(-4);
        }

        // 绑定消息卡片事件
        function bindMessageCardEvents() {
            messageList.querySelectorAll('.message-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    openDetail(id);
                });
            });
        }

        // 更新未读汇总
        function updateUnreadSummary() {
            const totalUnread = messages.filter(m => m.unread && !m.hidden).length;

            unreadCount.textContent = totalUnread;

            if (totalUnread === 0) {
                unreadSummary.classList.add('all-read');
                unreadLabel.textContent = '暂无未读消息';
            } else {
                unreadSummary.classList.remove('all-read');
                unreadLabel.textContent = '条未读消息';
            }
        }

        // 更新未读数
        function updateUnreadCount() {
            const count = messages.filter(m => m.unread && !m.hidden).length;
            unreadCount.textContent = count;
            if (count > 0) {
                bellBadge.textContent = count > 99 ? '99+' : count;
                bellBadge.classList.add('show');
            } else {
                bellBadge.classList.remove('show');
            }
            updateUnreadSummary();
        }

        // 打开详情
        function openDetail(id) {
            const msg = messages.find(m => m.id === id);
            if (!msg) {
                showError('notFound');
                return;
            }

            // 检查异常状态
            if (msg.status === 'expired') {
                showError('expired');
                return;
            }
            if (msg.status === 'revoked') {
                showError('revoked');
                return;
            }
            if (msg.status === 'notFound') {
                showError('notFound');
                return;
            }

            currentMessageId = id;

            // 标记已读
            if (msg.unread) {
                msg.unread = false;
                updateUnreadCount();
                renderTabs();
                renderMessages();
                showToast('已标记为已读', 'info');
            }

            // 隐藏错误状态
            errorState.classList.remove('show');
            detailContent.style.display = 'block';

            // 渲染详情
            renderDetailContent(msg);

            // 显示页面
            homePage.addClass('hidden');
            messageCenter.classList.remove('active');
            messageDetail.classList.add('active');
            messageDetail.classList.add('slide-in');

            // 更新更多菜单状态
            updateActionSheetItems(msg);
        }

            detailContent.style.display = 'none';
            detailFooter.style.display = 'none';

            if (type === 'expired') {
                errorTitle.textContent = '消息已过期';
                errorDesc.textContent = '该活动消息已过期，不再展示';
            } else if (type === 'revoked') {
                errorTitle.textContent = '消息已撤回';
                errorDesc.textContent = '该公告已被撤回';
            } else if (type === 'notFound') {
                errorTitle.textContent = '消息不存在';
                errorDesc.textContent = '相关业务记录不存在或已删除';
            } else {
                errorTitle.textContent = '消息不存在';
                errorDesc.textContent = '该消息可能已被删除';
            }

            homePage.addClass('hidden');
            messageCenter.classList.remove('active');
            messageDetail.classList.add('active');
            messageDetail.classList.remove('slide-in');

                            <span class="detail-card-value">${bd.startTime} - ${bd.endTime}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">总奖池</span>
                            <span class="detail-card-value highlight">${bd.prizePool}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">报名奖励</span>
                            <span class="detail-card-value success">${bd.signupReward}</span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-title">奖项设置</div>
                        ${bd.rewards.map(r => `
                            <div class="detail-card-row">
                                <span class="detail-card-label">${r.rank}</span>
                                <span class="detail-card-value">${r.reward}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (type === 'activityEnding') {
                html = `
                    <div class="detail-card">
                        <div class="detail-card-title">${bd.activityName}</div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">结束时间</span>
                            <span class="detail-card-value">${bd.endTime}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">剩余时间</span>
                            <span class="detail-card-value danger">${bd.remaining}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">当前排名</span>
                            <span class="detail-card-value">${bd.currentRank}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">当前收益</span>
                            <span class="detail-card-value">${bd.currentProfit}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">距${bd.targetRank}</span>
                            <span class="detail-card-value danger">${bd.targetDistance}</span>
                        </div>
                    </div>
                `;
            } else if (type === 'activityReward') {
                html = `
                    <div class="detail-card">
                        <div class="detail-card-title">活动奖励发放</div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">活动名称</span>
                            <span class="detail-card-value">${bd.activityName}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">获奖名次</span>
                            <span class="detail-card-value">${bd.rank}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">奖励金额</span>
                            <span class="detail-card-value success" style="font-size: 16px; font-weight: 700;">${bd.amount}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">发放时间</span>
                            <span class="detail-card-value">${bd.time}</span>
                        </div>
                    </div>
                `;
            } else if (type === 'ticketReply') {
                html = `
                    <div class="detail-card">
                        <div class="detail-card-title">工单信息</div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">工单编号</span>
                            <span class="detail-card-value mono">${bd.ticketId}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">工单主题</span>
                            <span class="detail-card-value">${bd.subject}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">处理状态</span>
                            <span class="detail-card-value success">${bd.status}</span>
                        </div>
                        <div class="detail-card-row">
                            <span class="detail-card-label">回复时间</span>
                            <span class="detail-card-value">${bd.replyTime}</span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-title">客服回复</div>
                        <p style="color: var(--text-secondary); font-size: 13px; line-height: 1.6;">${bd.reply}</p>
                    </div>
                `;
            }
            // 系统类
            else if (msg.category === '系统') {
                if (bd.maintainTime) {
                    html = `
                        <div class="detail-card">
                            <div class="detail-card-title">维护安排</div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">维护时间</span>
                                <span class="detail-card-value danger">${bd.maintainTime}</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-card-title">受影响功能</div>
                            ${bd.affectedServices.map(s => `
                                <div class="detail-card-row">
                                    <span class="detail-card-label">• ${s}</span>
                                    <span class="detail-card-value danger">暂停</span>
                                </div>
                            `).join('')}
                        </div>
                        ${bd.notice ? `
                        <div class="detail-card">
                            <div class="detail-card-title">温馨提示</div>
                            <p style="color: var(--text-secondary); font-size: 13px; line-height: 1.6;">${bd.notice}</p>
                        </div>
                        ` : ''}
                    `;
                } else if (bd.adjustments) {
                    html = `
                        <div class="detail-card">
                            <div class="detail-card-title">规则调整</div>
                            ${bd.adjustments.map(a => `
                                <div class="detail-card-row">
                                    <span class="detail-card-label">${a.pair}</span>
                                    <span class="detail-card-value">${a.change}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="detail-card">
                            <div class="detail-card-title">生效时间</div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">执行时间</span>
                                <span class="detail-card-value">${bd.effectiveTime}</span>
                            </div>
                        </div>
                    `;
                } else if (bd.pair) {
                    html = `
                        <div class="detail-card">
                            <div class="detail-card-title">新合约上线</div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">交易对</span>
                                <span class="detail-card-value highlight">${bd.pair}</span>
                            </div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">最高杠杆</span>
                                <span class="detail-card-value">${bd.maxLeverage}</span>
                            </div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">资金费率</span>
                                <span class="detail-card-value">${bd.fundingFee}</span>
                            </div>
                            <div class="detail-card-row">
                                <span class="detail-card-label">上市价格</span>
                                <span class="detail-card-value">${bd.launchPrice}</span>
                            </div>
                        </div>
                    `;
                }
            }

            return html;
        }

        // 更新 Action Sheet 项目
        function updateActionSheetItems(msg) {
            if (msg.unread) {
                markReadItem.style.display = 'flex';
            } else {
                markReadItem.style.display = 'none';
            }
        }

        // 显示 Toast
        function showToast(text, type = 'success') {
            toastText.textContent = text;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 业务跳转
        function doBusinessAction(actionType) {
            const jumpMap = {
                viewDeposit: '正在跳转充值记录...',
                viewWithdraw: '正在跳转提现记录...',
                viewReward: '正在跳转奖励记录...',
                viewContractOrder: '正在跳转合约订单详情...',
                viewPosition: '正在跳转合约持仓...',
                viewTPSL: '正在跳转止盈止损订单...',
                viewFundingFee: '正在跳转资金费记录...',
                viewSecurity: '正在跳转账户安全...',
                viewWalletAuth: '正在跳转钱包授权管理...',
                viewActivity: '正在跳转活动详情...',
                viewTicket: '正在跳转工单详情...'
            };

            if (actionType === 'none' || actionType === 'system') {
                return;
            }

            const msg = jumpMap[actionType];
            if (msg) {
                showToast(msg, 'info');
            }
        }

        // 绑定事件
        function bindEvents() {
            // 点击铃铛
            bellBtn.addEventListener('click', () => {
                homePage.addClass('hidden');
                messageCenter.classList.add('active');
                messageCenter.classList.add('fade-in');
                renderTabs();
                renderMessages();
                updateMarkAllBtn();
            });

            // 返回
            backBtn.addEventListener('click', () => {
                messageCenter.classList.remove('active');
                homePage.classList.remove('hidden');
            });

            detailBack.addEventListener('click', () => {
                messageDetail.classList.remove('active');
                messageDetail.classList.remove('slide-in');
                messageCenter.classList.add('active');
                renderTabs();
                renderMessages();
                updateMarkAllBtn();
                currentMessageId = null;
            });

            // 底部操作按钮
            actionBtn.addEventListener('click', () => {
                const msg = messages.find(m => m.id === currentMessageId);
                if (msg) {
                    if (msg.actionType === 'none' || msg.actionType === 'system') {
                        // 关闭详情页
                        messageDetail.classList.remove('active');
                        messageDetail.classList.remove('slide-in');
                        messageCenter.classList.add('active');
                    } else {
                        doBusinessAction(msg.actionType);
                    }
                }
            });

            // 更多按钮
            moreBtn.addEventListener('click', () => {
                const msg = messages.find(m => m.id === currentMessageId);
                if (msg) {
                    updateActionSheetItems(msg);
                    actionSheet.classList.add('show');
                }
            });

            // Action Sheet 项目
            markReadItem.addEventListener('click', () => {
                const msg = messages.find(m => m.id === currentMessageId);
                if (msg && msg.unread) {
                    msg.unread = false;
                    updateUnreadCount();
                    renderTabs();
                    renderMessages();
                    updateActionSheetItems(msg);
                    showToast('已标记为已读');
                }
                actionSheet.classList.remove('show');
            });

            deleteItem.addEventListener('click', () => {
                actionSheet.classList.remove('show');
                deleteModal.classList.add('show');
            });

            cancelItem.addEventListener('click', () => {
                actionSheet.classList.remove('show');
            });

            // 全部已读
            markAllBtn.addEventListener('click', () => {
                const currentUnread = getCurrentCategoryUnreadCount();
                if (currentUnread === 0) {
                    showToast('暂无更多消息', 'error');
                    return;
                }

                if (currentTab === 'all') {
                    markAllDesc.textContent = '确定要将所有消息标记为已读吗？';
                } else {
                    const catName = categories.find(c => c.id === currentTab).name;
                    markAllDesc.textContent = `确定要将「${catName}」分类下的所有消息标记为已读吗？`;
                }
                markAllModal.classList.add('show');
            });

            document.getElementById('markAllCancel').addEventListener('click', () => {
                markAllModal.classList.remove('show');
            });

            document.getElementById('markAllConfirm').addEventListener('click', () => {
                if (currentTab === 'all') {
                    messages.forEach(m => { if (!m.hidden) m.unread = false; });
                } else {
                    const catName = categories.find(c => c.id === currentTab).name;
                    messages.forEach(m => {
                        if (m.category === catName && !m.hidden) m.unread = false;
                    });
                }
                updateUnreadCount();
                renderTabs();
                renderMessages();
                updateMarkAllBtn();
                markAllModal.classList.remove('show');
                showToast('已全部标记为已读');
            });

            // 删除消息
            document.getElementById('deleteCancel').addEventListener('click', () => {
                deleteModal.classList.remove('show');
            });

            document.getElementById('deleteConfirm').addEventListener('click', () => {
                if (currentMessageId) {
                    messages = messages.filter(m => m.id !== currentMessageId);
                    updateUnreadCount();
                    renderTabs();
                    renderMessages();
                    updateMarkAllBtn();
                    deleteModal.classList.remove('show');
                    messageDetail.classList.remove('active');
                    messageDetail.classList.remove('slide-in');
                    messageCenter.classList.add('active');
                    currentMessageId = null;
                    showToast('消息已删除');
                }
            });

            // 点击遮罩关闭
            markAllModal.addEventListener('click', (e) => {
                if (e.target === markAllModal) {
                    markAllModal.classList.remove('show');
                }
            });

            deleteModal.addEventListener('click', (e) => {
                if (e.target === deleteModal) {
                    deleteModal.classList.remove('show');
                }
            });

            actionSheet.addEventListener('click', (e) => {
                if (e.target === actionSheet) {
                    actionSheet.classList.remove('show');
                }
            });
        }

        // 添加类名的辅助函数
        Element.prototype.addClass = function(className) {
            if (className) this.classList.add(className);
        };

        Element.prototype.removeClass = function(className) {
            if (className) this.classList.remove(className);
        };

        // 启动
        init();
    </script>
</body>
</html>
