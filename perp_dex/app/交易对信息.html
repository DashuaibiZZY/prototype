<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX 交易對信息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">
        <header class="pt-12 pb-4 px-5 flex items-center border-b border-gray-50 shrink-0">
            <button onclick="window.location.href='合约交易.html'" class="p-1 -ml-1 text-gray-400 active:opacity-60">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h1 class="flex-1 text-center font-black text-[15px] pr-6">交易對信息</h1>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-6">
            <div class="flex items-center justify-between mb-8">
                <h2 id="pair-title" class="text-xl font-black italic tracking-tighter text-gray-900">BTCUSDT 永續</h2>
                <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-sm uppercase">交易規則</span>
            </div>

            <div class="grid grid-cols-2 gap-y-6 gap-x-8">
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">市場</p>
                    <p id="info-market" class="text-[13px] font-black text-gray-900">BTCUSDT</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">最大槓桿</p>
                    <p class="text-[13px] font-black text-gray-900">100x</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">最小價格增量</p>
                    <p class="text-[13px] font-black text-gray-900">$0.1</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">限價單單筆最大訂單數量</p>
                    <p class="text-[13px] font-black text-gray-900">100.000 BTC</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">最小交易單位</p>
                    <p class="text-[13px] font-black text-gray-900">0.003 BTC</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">市價單單筆最大訂單數量</p>
                    <p class="text-[13px] font-black text-gray-900">10.000 BTC</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">清算費率</p>
                    <p class="text-[13px] font-black text-gray-900">1%</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">最大倉位</p>
                    <p class="text-[13px] font-black text-gray-900">200.000 BTC</p>
                </div>
            </div>

            <a href="风险限额.html" class="mt-10 flex items-center justify-between py-4 border-t border-gray-100 active:opacity-70">
                <span class="text-[12px] font-bold text-gray-700">查看風險限額</span>
                <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
            </a>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const pair = params.get('pair') || 'BTCUSDT';
    document.getElementById('pair-title').textContent = pair + ' 永續';
    document.getElementById('info-market').textContent = pair;
</script>
</body>
</html>
