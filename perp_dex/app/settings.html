<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX Settings Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: screen; margin: 0; padding: 20px; }

        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 页面切换动画 */
        .page { position: absolute; inset: 0; background: white; transition: transform 0.3s ease-in-out; z-index: 10; }
        .page-hidden { transform: translateX(100%); }
        .page-active { transform: translateX(0); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .setting-row:active { background-color: #f5f5f5; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">

        <!-- 1. 设置主页面 -->
        <div id="page-main" class="page page-active flex flex-col">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="window.history.back()" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-bold text-lg pr-6">设置中心</h2>
            </header>

            <div class="flex-1 overflow-y-auto no-scrollbar">
                <div onclick="openPage('page-language')" class="setting-row">
                    <span class="text-sm font-medium text-gray-700">语言设置</span>
                    <span class="text-sm text-gray-400">简体中文 <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></span>
                </div>
                <div onclick="openPage('page-theme')" class="setting-row">
                    <span class="text-sm font-medium text-gray-700">主题模式</span>
                    <span class="text-sm text-gray-400">日间模式 <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></span>
                </div>
                <div onclick="window.open('#')" class="setting-row">
                    <span class="text-sm font-medium text-gray-700">隐私政策</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="window.open('#')" class="setting-row">
                    <span class="text-sm font-medium text-gray-700">服务条款</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="openPage('page-about')" class="setting-row">
                    <span class="text-sm font-medium text-gray-700">关于ForX</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
            </div>

            <!-- 底部社交媒体 -->
            <footer class="pb-12 pt-6 flex justify-center space-x-8 border-t border-gray-50">
                <a href="#" class="text-gray-400 hover:text-black">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
                </a>
                <a href="#" class="text-gray-400 hover:text-black">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                </a>
                <a href="#" class="text-gray-400 hover:text-black">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2s-.21-.05-.3-.03c-.14.03-2.29 1.45-6.46 4.26-.61.42-1.16.63-1.65.61-.54-.01-1.58-.31-2.35-.57-.95-.31-1.7-.48-1.63-.1.04.19.43.39 1.15.69 4.45 1.93 7.42 3.21 8.91 3.82 4.23 1.74 5.11 2.04 5.69 2.05.13 0 .41-.03.6-.19.16-.14.21-.33.23-.47.05-.31.05-1.08.01-1.62z"/></svg>
                </a>
            </footer>
        </div>

        <!-- 2. 语言设置页面 -->
        <div id="page-language" class="page page-hidden flex flex-col">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="closePage('page-language')" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-bold text-lg pr-6">语言设置</h2>
            </header>
            <div class="flex-1">
                <label class="setting-row">
                    <span class="text-sm font-medium">English</span>
                    <input type="radio" name="lang" class="w-4 h-4 accent-black">
                </label>
                <label class="setting-row">
                    <span class="text-sm font-medium">繁體中文</span>
                    <input type="radio" name="lang" class="w-4 h-4 accent-black">
                </label>
                <label class="setting-row">
                    <span class="text-sm font-medium">简体中文</span>
                    <input type="radio" name="lang" checked class="w-4 h-4 accent-black">
                </label>
                <label class="setting-row">
                    <span class="text-sm font-medium">日本語</span>
                    <input type="radio" name="lang" class="w-4 h-4 accent-black">
                </label>
            </div>
        </div>

        <!-- 3. 主题模式页面 -->
        <div id="page-theme" class="page page-hidden flex flex-col">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="closePage('page-theme')" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-bold text-lg pr-6">主题模式</h2>
            </header>
            <div class="flex-1">
                <label class="setting-row">
                    <span class="text-sm font-medium">日间模式</span>
                    <input type="radio" name="theme" checked class="w-4 h-4 accent-black">
                </label>
                <label class="setting-row">
                    <span class="text-sm font-medium">夜间模式</span>
                    <input type="radio" name="theme" class="w-4 h-4 accent-black">
                </label>
            </div>
        </div>

        <!-- 4. 关于 ForX 页面 -->
        <div id="page-about" class="page page-hidden flex flex-col">
            <header class="pt-12 pb-4 px-6 flex items-center">
                <button onclick="closePage('page-about')" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
            </header>

            <div class="flex-1 flex flex-col pt-4">
                <!-- 居中 Logo 与 版本 -->
                <div class="flex flex-col items-center justify-center space-y-3 mb-10">
                    <div class="w-20 h-20 bg-black rounded-2xl flex items-center justify-center shadow-xl">
                        <span class="text-white text-4xl font-black italic">F</span>
                    </div>
                    <h3 class="text-xl font-black">ForX</h3>
                    <p class="text-gray-400 text-xs font-medium">版本：v1.1.0</p>
                </div>

                <!-- 设置项列表 -->
                <div class="border-t border-gray-50">
                    <div class="setting-row">
                        <span class="text-sm font-medium text-gray-700">检查更新</span>
                        <div class="flex items-center space-x-2">
                            <!-- 灰色版本号信息 -->
                            <span class="text-xs text-gray-400">v1.1.0</span>
                            <!-- New 标签 -->
                            <span class="text-[9px] bg-red-500 text-white px-1.5 py-0.5 rounded-full font-bold uppercase tracking-wider">New</span>
                        </div>
                    </div>
                    <div class="setting-row cursor-default bg-white active:bg-white">
                        <span class="text-sm font-medium text-gray-700">电子邮件</span>
                        <span class="text-sm text-gray-400">support@forx.fi</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 页面路由管理
    function openPage(pageId) {
        document.getElementById(pageId).classList.remove('page-hidden');
        document.getElementById(pageId).classList.add('page-active');
    }

    function closePage(pageId) {
        document.getElementById(pageId).classList.remove('page-active');
        document.getElementById(pageId).classList.add('page-hidden');
    }
</script>

</body>
</html>
