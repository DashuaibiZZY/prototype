<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯自選</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen bg-white">

        <!-- 1. 頂部狀態欄 -->
        <div class="px-6 pt-4 pb-2 flex justify-between items-center text-[11px] font-bold text-gray-900">
            <span></span>
            <span></span>
        </div>

        <!-- 2. 導航欄 -->
        <header class="flex items-center px-4 h-12 shrink-0 border-b border-gray-50">
            <button onclick="window.history.back()" class="p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="flex-1 text-center font-black text-[15px] pr-8">編輯自選</h1>
        </header>

        <!-- 3. 表頭 / 功能說明欄 -->
        <div class="px-6 py-3 flex justify-between items-center text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50/50">
            <span>市場</span>
            <div class="flex space-x-8">
                <span>置頂</span>
                <span>拖動</span>
            </div>
        </div>

        <!-- 4. 列表主體 -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-6">
            <div class="space-y-0 divide-y divide-gray-50">

                <!-- 條目 1 -->
                <div class="flex items-center py-4">
                    <input type="checkbox" class="w-4 h-4 accent-black rounded">
                    <span class="flex-1 ml-4 font-black text-[13px] text-gray-900">BTC/USDT</span>
                    <div class="flex items-center space-x-10">
                        <button class="text-gray-300 hover:text-black transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                        <button class="text-gray-300 cursor-grab"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 12h16M4 16h16"></path></svg></button>
                    </div>
                </div>

                <!-- 條目 2 -->
                <div class="flex items-center py-4">
                    <input type="checkbox" class="w-4 h-4 accent-black rounded">
                    <span class="flex-1 ml-4 font-black text-[13px] text-gray-900">ETH/USDT</span>
                    <div class="flex items-center space-x-10">
                        <button class="text-gray-300 hover:text-black"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                        <button class="text-gray-300 cursor-grab"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 12h16M4 16h16"></path></svg></button>
                    </div>
                </div>

                <!-- 條目 3 (已勾選示例) -->
                <div class="flex items-center py-4">
                    <input type="checkbox" checked class="w-4 h-4 accent-black rounded">
                    <span class="flex-1 ml-4 font-black text-[13px] text-gray-900">STAR/USDT</span>
                    <div class="flex items-center space-x-10">
                        <button class="text-gray-300 hover:text-black"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                        <button class="text-gray-300 cursor-grab"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 12h16M4 16h16"></path></svg></button>
                    </div>
                </div>

                <!-- 條目 4 -->
                <div class="flex items-center py-4">
                    <input type="checkbox" class="w-4 h-4 accent-black rounded">
                    <span class="flex-1 ml-4 font-black text-[13px] text-gray-900">SOL/USDT</span>
                    <div class="flex items-center space-x-10">
                        <button class="text-gray-300 hover:text-black"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                        <button class="text-gray-300 cursor-grab"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 12h16M4 16h16"></path></svg></button>
                    </div>
                </div>

            </div>
        </div>

        <!-- 5. 底部操作欄 -->
        <div class="px-6 py-6 border-t border-gray-100 flex justify-between items-center bg-white shrink-0 pb-10">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" class="w-4 h-4 accent-black rounded">
                <span class="ml-2 text-[12px] font-black text-gray-900 uppercase">全選</span>
            </label>
            <button class="bg-red-500 text-white px-8 py-2.5 rounded-xl font-black text-[12px] uppercase shadow-lg shadow-red-500/20 active:scale-95 transition-all">
                刪除
            </button>
        </div>

    </div>
</div>

</body>
</html>
