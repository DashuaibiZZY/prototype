<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX APP - 直邀好友明细</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen flex flex-col">

        <!-- 1. 顶部导航 -->
        <header class="flex justify-between items-center px-6 pt-12 pb-4 shrink-0 bg-white border-b border-gray-50">
            <button onclick="window.history.back()" class="active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h2 class="font-black text-base uppercase tracking-tighter">直邀好友明细</h2>
            <div class="w-6"></div>
        </header>

        <!-- 2. 头部汇总与搜索 -->
        <div class="shrink-0 bg-white px-5 py-4 space-y-4 shadow-sm border-b border-gray-100">
            <div class="flex divide-x divide-gray-100">
                <div class="flex-1 px-2">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">总计邀请</p>
                    <p class="text-xl font-black text-gray-900">124 <small class="text-[10px] font-normal opacity-50">人</small></p>
                </div>
                <div class="flex-1 px-4">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">本周活跃</p>
                    <p class="text-xl font-black text-green-500">18 <small class="text-[10px] font-normal opacity-50">人</small></p>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="flex items-center space-x-3">
                <div class="flex-1 relative bg-gray-100 rounded-xl px-4 py-2 flex items-center">
                    <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
                    <input type="text" placeholder="搜索地址或UID" class="bg-transparent border-none text-[12px] w-full focus:ring-0 outline-none placeholder-gray-400 font-medium">
                </div>
                <div class="flex items-center space-x-1.5 bg-gray-50 px-3 py-2 rounded-xl border border-gray-100">
                    <input type="checkbox" class="w-3 h-3 rounded-sm accent-black">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">活跃</span>
                </div>
            </div>
        </div>

        <!-- 3. 好友列表 (可滚动) -->
        <div class="flex-1 overflow-y-auto no-scrollbar bg-slate-50">
            <div class="divide-y divide-gray-100 bg-white">

                <!-- 模拟条目 1 -->
                <div class="p-5 flex flex-col space-y-3 active:bg-gray-50 transition-colors">
                    <div class="flex justify-between items-start">
                        <div class="space-y-0.5">
                            <p class="text-[13px] font-black text-gray-900 font-mono">0xd593...2Dd2</p>
                            <p class="text-[10px] text-gray-400 font-medium">注册时间: 2024-05-22 14:20</p>
                        </div>
                        <span class="bg-green-100 text-green-600 text-[9px] font-black px-1.5 py-0.5 rounded-sm uppercase tracking-widest">Active</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-3 border-t border-gray-50">
                        <div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase mb-0.5">期间交易额</p>
                            <p class="text-[12px] font-black text-gray-800">$1,240,000</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-400 font-bold uppercase mb-0.5">贡献返佣</p>
                            <p class="text-[12px] font-black text-blue-600">+$124.00</p>
                        </div>
                    </div>
                </div>

                <!-- 模拟条目 2 -->
                <div class="p-5 flex flex-col space-y-3 active:bg-gray-50 transition-colors">
                    <div class="flex justify-between items-start">
                        <div class="space-y-0.5">
                            <p class="text-[13px] font-black text-gray-900 font-mono">0x88e1...4F42</p>
                            <p class="text-[10px] text-gray-400 font-medium">注册时间: 2024-05-20 09:12</p>
                        </div>
                        <span class="text-gray-300 text-[9px] font-black px-1.5 py-0.5 rounded-sm uppercase tracking-widest">Inactive</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-3 border-t border-gray-50">
                        <div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase mb-0.5">期间交易额</p>
                            <p class="text-[12px] font-bold text-gray-400">$45,000</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-400 font-bold uppercase mb-0.5">贡献返佣</p>
                            <p class="text-[12px] font-bold text-gray-400">+$4.50</p>
                        </div>
                    </div>
                </div>

                <!-- 模拟条目 3 -->
                <div class="p-5 flex flex-col space-y-3">
                    <div class="flex justify-between items-start">
                        <div class="space-y-0.5">
                            <p class="text-[13px] font-black text-gray-900 font-mono">0x3f5c...882E</p>
                            <p class="text-[10px] text-gray-400 font-medium">注册时间: 2024-05-18 18:30</p>
                        </div>
                        <span class="bg-green-100 text-green-600 text-[9px] font-black px-1.5 py-0.5 rounded-sm uppercase">Active</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-3 border-t border-gray-50">
                        <div><p class="text-[9px] text-gray-400 font-bold uppercase">期间交易额</p><p class="text-[12px] font-black">$12,000</p></div>
                        <div class="text-right"><p class="text-[9px] text-gray-400 font-bold uppercase">贡献返佣</p><p class="text-[12px] font-black text-blue-600">+$1.20</p></div>
                    </div>
                </div>

            </div>

            <!-- 列表底部 -->
            <div class="py-12 text-center">
                <span class="text-[10px] font-bold text-gray-300 uppercase tracking-[0.3em]">No More Friends</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
