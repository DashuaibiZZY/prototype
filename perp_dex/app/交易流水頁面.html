<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 標籤樣式 */
        .tab-primary { color: #9ca3af; font-weight: 700; padding-bottom: 8px; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; font-size: 13px; }
        .tab-primary.active { color: #000; border-color: #000; font-weight: 900; }

        .tab-secondary { color: #9ca3af; font-weight: 700; font-size: 12px; transition: all 0.2s; }
        .tab-secondary.active { color: #000; font-weight: 900; position: relative; }

        /* 通用卡片 */
        .order-card { background: white; border-bottom: 1px solid #f3f4f6; padding: 16px 20px; transition: background 0.2s; }
        .order-card:active { background: #f9fafb; }

        /* 篩選按鈕 */
        .filter-btn { display: flex; items-center; background: #f3f4f6; border-radius: 4px; padding: 4px 8px; font-size: 10px; font-weight: 800; color: #6b7280; }

        /* 底部抽屜基礎樣式 */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 110;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .bottom-sheet.active { transform: translateY(0); }

        /* 模擬日期滾輪 */
        .picker-wheel {
            height: 120px;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
        }

        /* 選項按鈕狀態 */
        .filter-option-btn {
            border: 1px solid #f3f4f6;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-weight: 800;
            font-size: 11px;
            color: #6b7280;
            position: relative;
        }
        .filter-option-btn.active {
            border-color: #000;
            color: #000;
            background-color: #f9fafb;
        }

        /* 多選角標 */
        .check-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #000;
            color: #fff;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }
    </style>
</head>

                    'posStatus': ['全部', '部分平倉', '已平倉']
                };
                return `
                <h3 class="text-center font-black text-sm mb-8 uppercase tracking-widest">${titles[type]}</h3>
                <div class="grid grid-cols-2 gap-3 pb-10">
                    ${options[type].map((o, i) => `<div class="filter-option-btn ${i === 0 ? 'active' : ''}">${o}</div>`).join('')}
                </div>
            `;
        }
    }

    function openSharePnl() {
        document.getElementById('modal-share-pnl').classList.remove('hidden');
    }
    function closeSharePnl() {
        document.getElementById('modal-share-pnl').classList.add('hidden');
    }

    // 初始加載
    switchPrimary('current');
</script>

</body>
</html>
