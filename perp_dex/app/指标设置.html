<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX 指標設置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .page { position: absolute; inset: 0; background: white; transition: transform 0.3s ease-in-out; z-index: 10; display: flex; flex-direction: column; }
        .page-hidden { transform: translateX(100%); }
        .page-active { transform: translateX(0); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f9f9f9; }
        .param-input { width: 60px; background: #f3f4f6; border: none; border-radius: 4px; padding: 4px 8px; font-weight: 800; text-align: center; font-size: 12px; outline: none; }
        .param-input:focus { background: #e5e7eb; border: 1px solid #000; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">

        <!-- 1. 指標主列表 -->
        <div id="page-list" class="page page-active">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="window.history.back()" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-black text-lg pr-6 uppercase italic">指标设置</h2>
            </header>

            <div class="flex-1 overflow-y-auto">
                <div class="bg-gray-50 px-6 py-2 text-[10px] font-black text-gray-400 uppercase tracking-widest">主圖指標 (Main)</div>
                <div onclick="openPage('page-ma')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">MA (移動平均線)</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
                <div onclick="openPage('page-ema')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">EMA (指數移動平均)</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
                <div onclick="openPage('page-boll')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">BOLL (布林帶)</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>

                <div class="bg-gray-50 px-6 py-2 mt-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">副圖指標 (Sub)</div>
                <div onclick="openPage('page-vol')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">VOL (成交量)</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
                <div onclick="openPage('page-macd')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">MACD</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
                <div onclick="openPage('page-kdj')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">KDJ</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
                <div onclick="openPage('page-rsi')" class="setting-row cursor-pointer active:bg-gray-50">
                    <span class="text-sm font-bold">RSI</span>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
                </div>
            </div>
        </div>

        <!-- 2. MA 具體設置頁 -->
        <div id="page-ma" class="page page-hidden">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="closePage('page-ma')" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-black text-lg pr-6">MA 設置</h2>
            </header>
            <div class="flex-1">
                <div class="setting-row">
                    <div class="flex items-center"><div class="w-3 h-3 bg-yellow-400 rounded-full mr-3"></div><span class="text-sm font-bold">MA1</span></div>
                    <input type="number" value="5" class="param-input">
                </div>
                <div class="setting-row">
                    <div class="flex items-center"><div class="w-3 h-3 bg-purple-500 rounded-full mr-3"></div><span class="text-sm font-bold">MA2</span></div>
                    <input type="number" value="10" class="param-input">
                </div>
                <div class="setting-row">
                    <div class="flex items-center"><div class="w-3 h-3 bg-blue-400 rounded-full mr-3"></div><span class="text-sm font-bold">MA3</span></div>
                    <input type="number" value="20" class="param-input">
                </div>
                <div class="setting-row opacity-50">
                    <div class="flex items-center"><div class="w-3 h-3 bg-gray-200 rounded-full mr-3"></div><span class="text-sm font-bold">MA4</span></div>
                    <input type="number" value="60" class="param-input">
                </div>
            </div>
        </div>

        <!-- 3. MACD 具體設置頁 -->
        <div id="page-macd" class="page page-hidden">
            <header class="pt-12 pb-4 px-6 flex items-center border-b border-gray-50">
                <button onclick="closePage('page-macd')" class="p-1 -ml-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="flex-1 text-center font-black text-lg pr-6">MACD 設置</h2>
            </header>
            <div class="flex-1 px-6 py-4 space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-500">快線週期 (Fast)</span>
                    <input type="number" value="12" class="param-input">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-500">慢線週期 (Slow)</span>
                    <input type="number" value="26" class="param-input">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-500">訊號週期 (Signal)</span>
                    <input type="number" value="9" class="param-input">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function openPage(id) {
        document.getElementById(id).classList.remove('page-hidden');
        document.getElementById(id).classList.add('page-active');
    }
    function closePage(id) {
        document.getElementById(id).classList.remove('page-active');
        document.getElementById(id).classList.add('page-hidden');
    }
</script>

</body>
</html>
