<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX 偏好設置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .toggle-track { width: 36px; height: 20px; background: #e5e7eb; border-radius: 999px; position: relative; transition: background .2s; }
        .toggle-track.on { background: #111827; }
        .toggle-thumb { width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
        .toggle-track.on .toggle-thumb { transform: translateX(16px); }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">
        <header class="pt-12 pb-4 px-5 flex items-center border-b border-gray-50 shrink-0">
            <button onclick="window.location.href='合约交易.html'" class="p-1 -ml-1 text-gray-400 active:opacity-60">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h1 class="flex-1 text-center font-black text-[15px] pr-6 uppercase tracking-widest">偏好設置</h1>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar p-5 space-y-8">
            <section class="space-y-4">
                <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-tighter">下單確認</h2>
                <div class="space-y-5">
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-bold text-gray-700">限价 订单</span>
                        <button type="button" class="toggle-track on" onclick="this.classList.toggle('on')"><span class="toggle-thumb"></span></button>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-bold text-gray-700">市价 订单</span>
                        <button type="button" class="toggle-track on" onclick="this.classList.toggle('on')"><span class="toggle-thumb"></span></button>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-bold text-gray-700">止盈止損 订单</span>
                        <button type="button" class="toggle-track" onclick="this.classList.toggle('on')"><span class="toggle-thumb"></span></button>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-tighter">消息通知</h2>
                <div class="flex items-center justify-between">
                    <span class="text-[12px] font-bold text-gray-700">成交提示音</span>
                    <button type="button" class="toggle-track on" onclick="this.classList.toggle('on')"><span class="toggle-thumb"></span></button>
                </div>
            </section>
        </div>

        <div class="p-5 border-t border-gray-50 bg-gray-50/30 shrink-0">
            <button class="w-full py-2.5 text-[11px] font-black uppercase text-gray-400 active:text-black">恢复至默认设置</button>
        </div>
    </div>
</div>

</body>
</html>
