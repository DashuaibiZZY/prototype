<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForX Markets - Rewards Placeholder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .phone-shell { width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #fff; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 骨架屏動畫，增加一點臨時感 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .placeholder-hint { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="screen">

        <!-- 1. 頂部標題與臨時說明 -->
        <div class="px-6 pt-14 pb-6">
            <h1 class="text-2xl font-black text-gray-900">獎勵中心</h1>
            <div class="mt-4 p-4 bg-yellow-50 border border-yellow-100 rounded-2xl">
                <p class="text-yellow-700 text-xs font-bold leading-relaxed placeholder-hint">
                    ⚠️ 臨時展示頁面：<br>
                    此頁面僅供開發期間功能路徑測試（邀請、積分、活動），後續將更新正式的美化設計。
                </p>
            </div>
        </div>

        <!-- 2. 功能入口列表 -->
        <div class="flex-1 px-6 space-y-4">

            <!-- 邀請返佣 -->
            <a href="邀请好友.html" class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">邀請返佣</p>
                        <p class="text-[11px] text-gray-400">邀請好友賺取高額佣金</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </a>

            <!-- 積分中心 -->
            <a href="积分中心.html" class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">積分中心</p>
                        <p class="text-[11px] text-gray-400">完成任務領取積分禮包</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </a>

            <!-- 活動入口 -->
            <a href="活动中心+活动详情.html" class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.167a2.405 2.405 0 010-1.542l2.147-6.167a1.76 1.76 0 013.417.592zm3.606 1.225a5 5 0 010 5.786m2.394-8.18a9 9 0 010 10.574"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">熱門活動</p>
                        <p class="text-[11px] text-gray-400">參與平台最新專屬活動</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </a>

            <!-- 活動入口 -->
            <a href="活动中心+活动详情.html" class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.167a2.405 2.405 0 010-1.542l2.147-6.167a1.76 1.76 0 013.417.592zm3.606 1.225a5 5 0 010 5.786m2.394-8.18a9 9 0 010 10.574"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">熱門活動</p>
                        <p class="text-[11px] text-gray-400">參與平台最新專屬活動</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </a>

        </div>

        <!-- 3. 底部導航欄 (獎勵設為黑色激活態) -->
        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-4 pt-2 pb-8 flex justify-between items-center shrink-0">
            <a href="首页.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-bold">首頁</span>
            </div></a>
            <a href="行情.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[10px] font-bold">行情</span>
            </div></a>
            <a href="合约交易.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <div class="bg-gray-200 rounded-lg p-1.5 -mt-6">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="text-[10px] pt-1">永續合約</span>
            </div></a>
            <a href="奖励.html">
            <div class="flex flex-col items-center space-y-1 px-3 text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                <span class="text-[10px] font-bold">獎勵</span>
            </div></a>
            <div class="flex flex-col items-center space-y-1 px-3 text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px]">我的</span>
            </div>
        </nav>

    </div>
</div>

</body>
</html>
