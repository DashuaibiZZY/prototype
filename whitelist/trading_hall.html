<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexus Trade | 交易大厅 - 内测激活</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/echarts.min.5.4.3.js"></script>
<style>
        .glass-morphism {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .order-book-red { color: #ef4444; }
        .order-book-green { color: #10b981; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="bg-[#0b0e11] text-gray-200 font-sans h-screen overflow-hidden">
<!-- 顶栏导航 -->
<header class="h-14 border-b border-gray-800 flex items-center justify-between px-4 bg-[#161a1e]">
<div class="flex items-center space-x-6">
<div class="flex items-center space-x-2">
<iconify-icon icon="logos:ethereum" width="24"></iconify-icon>
<span class="text-xl font-bold text-white tracking-tight">NEXUS TRADE</span>
</div>
<nav class="hidden md:flex space-x-4 text-sm font-medium">
<a class="text-yellow-400 border-b-2 border-yellow-400 h-14 flex items-center" href="#">现货交易</a>
<a class="hover:text-yellow-400 h-14 flex items-center transition-colors" href="#">合约交易</a>
<a class="hover:text-yellow-400 h-14 flex items-center transition-colors" href="#">数据看板</a>
<a class="text-blue-400 h-14 flex items-center hover:underline" href="admin_dashboard.html">进入管理后台</a>
</nav>
</div>
<div class="flex items-center space-x-4">
<div class="text-right">
<div class="text-xs text-gray-500">2026-04-17 14:30:22</div>
<div class="text-sm font-mono">BTC/USDT <span class="text-green-500">+2.45%</span></div>
</div>
<button class="bg-yellow-400 hover:bg-yellow-500 text-black px-4 py-1.5 rounded font-bold text-sm transition-all" onclick="showConnectModal()">
                连接钱包
            </button>
</div>
</header>
<!-- 主体内容布局 -->
<main class="flex h-[calc(100vh-56px)]">
<!-- 左侧 K线图 -->
<div class="flex-grow flex flex-col border-r border-gray-800">
<div class="h-10 border-b border-gray-800 flex items-center px-4 space-x-4 text-xs">
<span class="text-gray-400">时间:</span>
<button class="bg-gray-800 px-2 py-0.5 rounded">15m</button>
<button class="hover:text-white">1h</button>
<button class="hover:text-white">4h</button>
<button class="hover:text-white">1d</button>
<div class="w-px h-3 bg-gray-700 mx-2"></div>
<span class="text-gray-400">指标:</span>
<button class="hover:text-white">MA</button>
<button class="hover:text-white">EMA</button>
<button class="hover:text-white">BOLL</button>
</div>
<div class="flex-grow w-full" id="kline-chart"></div>
</div>
<!-- 中间 订单簿 -->
<div class="w-72 border-r border-gray-800 flex flex-col bg-[#161a1e]">
<div class="p-3 text-xs font-bold border-b border-gray-800">订单簿</div>
<div class="flex-1 overflow-hidden flex flex-col">
<!-- 卖盘 -->
<div class="flex-1 overflow-hidden py-2">
<div class="flex justify-between px-3 text-[10px] text-gray-500 mb-1">
<span>价格(USDT)</span>
<span>数量(BTC)</span>
<span>累计</span>
</div>
<div class="space-y-0.5 text-xs" id="asks-list"></div>
</div>
<!-- 中间价 -->
<div class="py-2 px-3 bg-gray-800/50 flex items-center space-x-2">
<span class="text-lg font-bold text-green-500">68,432.50</span>
<iconify-icon class="text-green-500" icon="mdi:arrow-up"></iconify-icon>
<span class="text-xs text-gray-400">≈ $68,432.50</span>
</div>
<!-- 买盘 -->
<div class="flex-1 overflow-hidden py-2">
<div class="space-y-0.5 text-xs" id="bids-list"></div>
</div>
</div>
</div>
<!-- 右侧 交易面板 -->
<div class="w-80 flex flex-col bg-[#161a1e]">
<div class="flex border-b border-gray-800">
<button class="flex-1 py-3 text-sm font-bold border-b-2 border-yellow-400 text-yellow-400">现货</button>
<button class="flex-1 py-3 text-sm font-bold text-gray-500">逐仓 5x</button>
</div>
<div class="p-4 space-y-4">
<div class="flex space-x-2">
<button class="flex-1 py-1 bg-green-500/10 text-green-500 rounded text-xs font-bold border border-green-500/20">买入</button>
<button class="flex-1 py-1 text-gray-500 rounded text-xs font-bold">卖出</button>
</div>
<div class="space-y-2">
<label class="text-xs text-gray-500">价格</label>
<div class="relative">
<input class="w-full bg-[#2b2f36] border border-transparent focus:border-yellow-400 rounded p-2 text-sm outline-none" type="text" value="68432.50"/>
<span class="absolute right-2 top-2 text-xs text-gray-500">USDT</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs text-gray-500">数量</label>
<div class="relative">
<input class="w-full bg-[#2b2f36] border border-transparent focus:border-yellow-400 rounded p-2 text-sm outline-none" placeholder="0.00" type="text"/>
<span class="absolute right-2 top-2 text-xs text-gray-500">BTC</span>
</div>
</div>
<div class="grid grid-cols-4 gap-2">
<button class="bg-[#2b2f36] py-1 rounded text-[10px] text-gray-400">25%</button>
<button class="bg-[#2b2f36] py-1 rounded text-[10px] text-gray-400">50%</button>
<button class="bg-[#2b2f36] py-1 rounded text-[10px] text-gray-400">75%</button>
<button class="bg-[#2b2f36] py-1 rounded text-[10px] text-gray-400">100%</button>
</div>
<button class="w-full py-3 bg-gray-700 text-gray-400 rounded font-bold mt-4 cursor-not-allowed" disabled="">请先连接钱包并激活</button>
</div>
</div>
</main>
<!-- 激活内测模态框 (强制弹出) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center glass-morphism" id="activation-overlay">
<div class="bg-[#1e2329] w-[420px] rounded-2xl shadow-2xl border border-gray-700 p-8 space-y-6">
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center w-16 h-16 bg-yellow-400/10 rounded-full mb-2">
<iconify-icon class="text-3xl text-yellow-400" icon="mdi:shield-lock"></iconify-icon>
</div>
<h2 class="text-2xl font-bold text-white">欢迎开启ForX 交易之旅</h2>
<p class="text-sm text-gray-400">ForX 目前处于受邀内测阶段<br/>请输入激活码以继续</p>
</div>
<div class="space-y-4" id="step-connect-wallet">
<button class="w-full flex items-center justify-between p-4 bg-[#2b3139] hover:bg-[#333942] rounded-xl border border-gray-700 transition-all" onclick="nextStep()">
<div class="flex items-center space-x-3">
<iconify-icon icon="logos:metamask-icon" width="28"></iconify-icon>
<span class="font-medium">MetaMask</span>
</div>
<span class="text-xs bg-yellow-400/20 text-yellow-500 px-2 py-0.5 rounded">常用</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-[#2b3139] hover:bg-[#333942] rounded-xl border border-gray-700 transition-all" onclick="nextStep()">
<div class="flex items-center space-x-3">
<iconify-icon icon="logos:walletconnect" width="28"></iconify-icon>
<span class="font-medium">WalletConnect</span>
</div>
</button>
</div>
<div class="hidden space-y-4" id="step-activation-code">
<div class="space-y-2">
<label class="text-xs text-gray-500 ml-1">受邀激活码</label>
<input class="w-full bg-[#0b0e11] border border-gray-700 focus:border-yellow-400 rounded-xl p-4 text-center tracking-[0.5em] font-mono text-xl outline-none uppercase transition-all" id="invite-code" placeholder="输入 8 位内测代码" type="text"/>
</div>
<button class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-black font-bold rounded-xl shadow-lg shadow-yellow-400/10 transition-all flex items-center justify-center space-x-2" id="submit-btn" onclick="validateCode()">
<span id="btn-text">立即激活</span>
</button>
<div class="hidden flex items-center justify-center space-x-1 text-red-500 text-xs" id="error-msg">
<iconify-icon icon="mdi:alert-circle"></iconify-icon>
<span>该激活码无效或已超过使用上限</span>
</div>
</div>
<div class="text-center">
<a class="text-xs text-gray-500 hover:text-yellow-400 underline" href="#">如何获得激活码？</a>
</div>
</div>
</div>
<!-- 成功提示 -->
<div class="hidden fixed top-20 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl z-[200] flex items-center space-x-2 animate-bounce" id="success-toast">
<iconify-icon class="text-xl" icon="mdi:check-circle"></iconify-icon>
<span class="font-bold">激活成功！欢迎加入 Nexus Trade</span>
</div>
<script>
        // 渲染 K 线图
        const chart = echarts.init(document.getElementById('kline-chart'));
        const kData = [];
        let baseTime = new Date(2026, 3, 17, 8, 0, 0).getTime();
        for (let i = 0; i < 60; i++) {
            let open = 68000 + Math.random() * 500;
            let close = open + (Math.random() - 0.5) * 400;
            kData.push([
                echarts.format.formatTime('hh:mm', baseTime + i * 60000),
                open, close, open - 100, close + 100
            ]);
        }

        const option = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
            grid: { left: '3%', right: '3%', bottom: '5%', top: '5%', containLabel: true },
            xAxis: { type: 'category', data: kData.map(d => d[0]), axisLine: { lineStyle: { color: '#334155' } } },
            yAxis: { scale: true, position: 'right', axisLine: { show: false }, splitLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#64748b' } },
            series: [{
                type: 'candlestick',
                data: kData.map(d => [d[1], d[2], d[3], d[4]]),
                itemStyle: {
                    color: '#10b981', color0: '#ef4444',
                    borderColor: '#10b981', borderColor0: '#ef4444'
                }
            }]
        };
        chart.setOption(option);
        window.onresize = chart.resize;

        // 渲染订单簿
        const asksList = document.getElementById('asks-list');
        const bidsList = document.getElementById('bids-list');
        for (let i = 0; i < 15; i++) {
            const price = 68432.50 + (15 - i) * 2.5;
            const amount = (Math.random() * 2).toFixed(4);
            const total = (Math.random() * 10).toFixed(2);
            asksList.innerHTML += `
                <div class="flex justify-between px-3 relative h-5 items-center group cursor-pointer hover:bg-red-500/5">
                    <div class="absolute right-0 top-0 bottom-0 bg-red-500/10" style="width: ${Math.random() * 100}%"></div>
                    <span class="order-book-red z-10">${price.toLocaleString()}</span>
                    <span class="z-10">${amount}</span>
                    <span class="text-gray-600 z-10">${total}</span>
                </div>`;
        }
        for (let i = 0; i < 15; i++) {
            const price = 68432.50 - i * 2.5;
            const amount = (Math.random() * 2).toFixed(4);
            const total = (Math.random() * 10).toFixed(2);
            bidsList.innerHTML += `
                <div class="flex justify-between px-3 relative h-5 items-center group cursor-pointer hover:bg-green-500/5">
                    <div class="absolute right-0 top-0 bottom-0 bg-green-500/10" style="width: ${Math.random() * 100}%"></div>
                    <span class="order-book-green z-10">${price.toLocaleString()}</span>
                    <span class="z-10">${amount}</span>
                    <span class="text-gray-600 z-10">${total}</span>
                </div>`;
        }

        // 交互逻辑
        function nextStep() {
            document.getElementById('step-connect-wallet').classList.add('hidden');
            document.getElementById('step-activation-code').classList.remove('hidden');
        }

        function validateCode() {
            const code = document.getElementById('invite-code').value.trim().toUpperCase();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btnText.innerHTML = '<iconify-icon icon="line-md:loading-twotone-loop" class="text-xl"></iconify-icon>';

            setTimeout(() => {
                if (code === 'NEXUS666' || code === 'ALPHA2026') {
                    document.getElementById('activation-overlay').classList.add('hidden');
                    document.getElementById('success-toast').classList.remove('hidden');
                    setTimeout(() => {
                        document.getElementById('success-toast').classList.add('hidden');
                    }, 3000);
                } else {
                    btn.disabled = false;
                    btnText.innerText = '立即激活';
                    errorMsg.classList.remove('hidden');
                }
            }, 1500);
        }
    </script>
</body>
</html>
